 precursor_coprean: "Coprean Constitution"
 precursor_sless: "Sless Alliance"
 precursor_vinarii: "V'inarii"
 precursor_znkar: "Z'nkar"

 precursor_alshigans_desc: "An avian species of galactic explorers capable of settling a variety of planets, although hindered by their unique but inefficient FTL technology."
 precursor_astanine_desc: "A civilization possessing highly advanced holographic technology, projecting holograms more convincing than reality."
 precursor_coprean_desc: "Torn by civil wars, this fallen republic once stood for equality - until its ideals collapsed beneath the weight of endless strife."
 precursor_sless_desc: "They rewrote life itself in pursuit of perfection. But when every flaw must be erased, what future remains?"
 precursor_vinarii_desc: "They sought eternal life and defied death itself. Now only their ghosts haunt their icy cities."
 precursor_znkar_desc: "A once militaristic society crippled by an unseen foe with superior cloaking technology."
