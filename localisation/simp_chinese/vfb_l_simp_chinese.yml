  tech_building_vfb_plastic_facility_c: "气溶胶蒸馏技术"
  tech_building_vfb_plastic_facility_c_desc: "我们已经开发出了一种通过利用低压糖分离网络来制造类似Zro化合物的合成方法。通过气溶胶积累和先进的蒸馏技术，这些设施以降低的效率和增加的废物产生提取有价值的化合物。"

  tech_building_vfb_plastic_facility_d: "认知危害诱导技术"
  tech_building_vfb_plastic_facility_d_desc: "通过对纳米机器人输入-处理规划的全新、完全超现实的方法，可以诱导复杂的生物物质排列，以利用纳米机器人复制通道，从而实现纳米机器人的受控批量生产。这一先进过程需要精确的生物物质管理和仔细的监督，以确保其稳定性。"

  tech_building_vfb_fusion_complex_c: "切向普里马科夫技术"
  tech_building_vfb_fusion_complex_c_desc: "通过模拟黑洞附近的极端条件，可以制造和收获暗物质。这一过程虽然资源密集，但通过先进的光子操控和胶子场共振，允许提取这种难以捉摸的物质。"

  tech_building_vfb_asteroid_hub_c: "超气动注射技术"
  tech_building_vfb_asteroid_hub_c_desc: "我们可以建造专门的设施，通过在极端条件下分解宏观原子结构来生产活体金属。这一过程尽管代价高昂，但为这种稀有而宝贵的资源提供了稳定的供应，对先进的建筑和研究至关重要。"

  bombardment_vfb_kinectic: "动能"
  bombardment_vfb_kinectic_desc:3 "动能轰炸利用牵引波束技术将小行星拖入针对敌对行星的碰撞轨道。\n- 对§Y军队§!造成§R巨大的§!伤害\n- 对§Y行星§!造成§R巨大的§!伤害\n- 对§Y人口（每200-400人）§!造成§RGargantuan§!伤害\n- 将轰炸未防御的行星\n- 可将行星减少为无生命的墓地世界\n- 当地面战斗开始时，轰炸将停止"
  orbital_bombardment_vfb_kinectic: "动能轰炸"
  orbital_bombardment_vfb_kinectic_desc:1 "动能轰炸利用牵引波束技术将小行星拖入针对敌对行星的碰撞轨道。\n- 对§Y军队§!造成§R巨大的§!伤害\n- 对§Y行星§!造成§R巨大的§!伤害\n- 对§Y人口（每200-400人）§!造成§RGargantuan§!伤害\n- 将轰炸未防御的行星\n- 可将行星减少为无生命的墓地世界\n- 当地面战斗开始时，轰炸将停止"
  orbital_bombardment_vfb_kinectic_name: "动能轰炸"
  tech_building_vfb_asteroid_station_tooltip: "解锁§YKinectic Bombardment§!姿态"
  building_vfb_administration:0 "Civil Service"
  building_vfb_administration_desc:0 "The burden of public administration is certainly not an easy one to bear. Our space expansion has seen some degree of decentralization in this regard. However, what we've gained in flexibility, we have lost in coordination. A dedicated office interlinking the many departmental commissions, local administrative parks, and elected—or imposed—leadership will surely enhance the stability and efficiency of the government, albeit at the cost of more paychecks and an even more influential bureaucracy.\n\n§YBureaucrat output stacks for every Bureaucratic building or upgrades built, up to 5.§!"
  building_vfb_base:0 "Polar Worksite"
  building_vfb_base_desc:0 "To turn a lush (or barren, for that matter) wildland into a center for production and the subsequent advancement of our civilization requires major infrastructural investment. If we are to build grand structures to harbour our resource acquisition and managment projects we ought to make grand yard to accrue them on. Unfortunately, the execution of grand projects is made nigh impossible by most planets' gravitational pull and rotation, which create adverse conditions for construction and maintainance outside regions close to the poles. Fortunately, the poles are where most trans-planetary geosynchronous infrastructure is built. \n\n§YAllows for the construction of multiple buildings as upgrades.§!\n\n§GThe following buildings can be built as upgrades to this Worksite:\n\n - Beta Bridge\n - Circumstellar Causeway\n - Polymer Palletizer\n - Central Logistical Hubs\n - Integrated Orbital Hubs\n - Tetra-Siderurgies\n - Lyceum\n - Sanctuary Hubs\n - Paradise Resorts\n - Atelier\n - Museum\n - Civil Service§!"
  building_vfb_comms_a:0 "深空网络"
  building_vfb_comms_a_desc:0 "深空网络是由光学和无线通信阵列、激光雷达、雷达和望远镜组成的地表网络，允许我们监测太空并协调我们的星际内部行动。它还以每秒数百兆振荡的吞吐量，为我们提供对周围宇宙的些许洞察。"
  tech_building_vfb_comms_a:0 "射电天文学"
  tech_building_vfb_comms_a_desc:0 "射电望远镜是顶级设备，能让我们监控星际内与近星际局势，并略窥广袤太空的一角。"
  building_vfb_comms_b:0 "超光速通信网络"
  building_vfb_comms_b_desc:0 "超光速通信网络利用先进的曲速技术，在浩瀚的星际距离间实现超光速通信。通过在我们的星球上建立光学中继网络，我们可以以前所未有的速度传输数据，极大提升星际通信的安全性、吞吐量和延迟，或许可达每秒数百太赫振荡。"
  tech_building_vfb_comms_b:0 "自毁式光子封装"
  tech_building_vfb_comms_b_desc:0 "超光速航行既然早已成为太空旅行的既定现实，我们大多数星际通信需求都依赖亚空间通信。这种耗能高、安全性低、吞吐量低的通信方式并不理想，但对于那些我们无法精确定位、因而无法从其他星球上准确“瞄准”的遥远舰船和空间站来说，它仍是我们最好的解决方案，而且它们还能从任何地方接收信号。幸运的是，我们想到了一种将曲速技术用于通信的办法：在各个星球建立光学中继网络。本质上，我们会把光子封装在一个可曲速的外壳——SDPC——中，让它在到达另一端天线前几纳米自行打开。质子稳定结构可由接收端绘制，并可被“重建”为数据包。这样，我们实际上就在星辰之间铺设光纤。这将极大改善星际通信的安全性、吞吐量和延迟。"
  building_vfb_comms_c:0 "纠缠通信网络"
  building_vfb_comms_c_desc:0 "纠缠通信网络是一种尖端通信系统，利用量子纠缠实现跨越浩瀚星际距离的瞬时通信。通过制造纠缠粒子对并将其分布到我们的各个星球上，我们可以无视发送者与接收者之间的距离，瞬时传递信息。这项革命性技术有望重塑我们的星际通信，以每秒数百拍振荡的速率，提供无与伦比的可靠性和几乎无法穿透的点对点安全性。"
  tech_building_vfb_comms_c:0 "纠缠传收粒子"
  tech_building_vfb_comms_c_desc:0 "我们宇宙的一个基本属性是它并非局域真实。这意味着纠缠粒子的状态会彼此瞬间影响，无论它们相距多远。尽管信息本身超光速就已经带来了许多许多影响，但若能可靠制造彼此量子纠缠的粒子，我们就能分发完全彼此互斥、完全无法拦截且无法追踪的双向通信器，使其几乎能以我们通过观测修改其量子态的同样速度传递信息。由于接收粒子的观测会触发发送粒子量子态的另一重变化，这种方法几乎没有冗余，还能省去多路握手，最大限度降低丢包，并使其与最不稳定、最移动的地点无缝通信。"
  building_vfb_comms_d:0 "超维通信网络"
  building_vfb_comms_d_desc:0 "超维通信网络是一种革命性的通信系统，它操控高维空间来调制并分配可纠缠粒子，以跨越浩瀚星际距离，同时还能存储和处理来自数十亿设备的数据。面向太空互联网的行星数据中心！"
  tech_building_vfb_comms_d:0 "超维粒子配对" 
  tech_building_vfb_comms_d_desc:0 "通过操控高维空间，我们可以将可纠缠粒子跨越浩瀚星际距离连接起来，而不受其初始配对的限制。这当然意义重大。这不仅意味着发射对不必成对制造、且若丢失其中一颗就必须整组报废，还意味着我们可以每秒多次将每个发射器与其他发射器连接或断开，使去中心化通信网络能够通过地址、协议、握手等方式运作。实际上，这意味着我们能够拥有一个遍布银河、完全去中心化、点对点、无法拦截、无法追踪、瞬时的通信网络，其速度可达每秒数百艾萨振荡，几乎就像当前的行星内通信一样。"
  building_vfb_constructor:0 "Atelier"
  building_vfb_constructor_desc:0 "The decentralization and adoption of modern industrial techniques for the production of most—if not all—of our empire's consumer goods has been an unquestionable success. However, leaving the task of designing prototypes to our on-site manufacturers has led to inefficiencies with redundant designs. The Atelier creates blueprints for our most desired products and frees up space in high-demand sites for increased production. \n\n §YArtisan output stacks for every Civilian Factory or equivalent upgrade built, up to 5.§!"
  building_vfb_dockyard:0 "Sidereal Bays"
  building_vfb_dockyard_desc:0 "These alternating, free-floating, merry-go-rounding bays expand docking space in Space Lifts and Space Elevators without major infraestructural expansions. They are low-cost, low-importance, and highly disposable.\n\n§BRequires the Space Lift or the Space Elevator to be built§!\n\n§YEffects scale up with higher requirement building levels.§!"
  building_vfb_lyceum:0 "Lyceum"
  building_vfb_lyceum_desc:0 "While Academia and Research Facilities are spread around our citizen planets, as a general rule, these centres of learning are too disperse and too focused on their research to work together and provide insights into each other's work. By inter-linking these intelectual nucleii - wherever they're relevant - through informational infrastructure we will not only quicken research by emergence, but provide additional opportunities - seen that this network requires physical infrastructure - for archivists, professors and even phisolophers to work confortably in a dedicated space; the Lyceum. \n\n§YResearcher output stacks for every Research Lab or equivalent upgrade built, up to 5.§!"
  building_vfb_museum:0 "Museum"
  building_vfb_museum_desc:0 "The expansion of planetary academia in the form of the Lyceum - and the educational capabilities it concentrates - has turn his planet into a nucleii for innovation and knowledge. As we expand across we galaxy, finding ever more Artifacts and wonders of older ages, we realise you much of a waste is it just to explore them in the field and store them away afterwards. There's a lot to be learn just from analysis, and we can draw deeper conclusions from these items by dedicating research personel in archaeological investigation facilities. We can even open less groundbreaking discoveries for the public to see!.\n\n§YDiscovers Minor Artifacts while costing Research Points§!"
  job_vfb_accretion_drone:0 "Supplementary Drone"
  job_vfb_accretion_drone_plural:0 "Supplementary Drones"
  job_vfb_accretion_drone_desc:0 "Supplementary Drones are the designation for our grouped, miscellaneous units and detachments. Flexible in their purpose, they coordinate minor field operations, prospect, pioneer, act as sappers for the expansion of our consciousness, and maintain planet-side operations running smoothly."
  job_vfb_accretion_drone_effect_desc:0 "£job_vfb_accretion_drone£ $job_vfb_accretion_drone_plural$ fulfill various supplementary functions."
  mod_job_vfb_accretion_drone_add:0 "$job_vfb_accretion_drone$ Jobs"
  mod_job_vfb_accretion_drone_per_pop:0 "§G+1§! $job_vfb_accretion_drone$ Job per $VALUE$ Pops"
  mod_job_vfb_accretion_drone_per_pop_short:0 "\n§G+1§! £mod_job_vfb_accretion_drone_add£ per $VALUE$ £pop£"
  mod_job_clerk_automated_workforce_mult:0 "£job_clerk£ 文书的自动化劳动力"
  vfb.1:0 "VF's Buildings is §Gactive§!"
  vfb.1.name:0 "VF's Buildings is §Gactive§!"
  vfb.1.desc:0 "§YGreat to see you here! Thank you for subscribing to and installing VF's Buildings!§! This is pretty much here to tell the game (and you) that this mod is up and running!\n\nAnyway, have a great Xeno cleansing/befriending/both. All the best!"
  vfb.1.a:0 "§B(No Starting Techs at all)§! Cool!"
  vfb.1.a.tooltip:0 "Cool! Have fun I guess."
  vfb.1.b:0 "§Y(All Starting Techs)§! Hey, while I'm here, could you give me and the galaxy the §Btechs§!?"
  vfb.1.b.tooltip:0 "Sure, knock yourself out, champ.\n\n§YEvery empire in the Galaxy will be able to start building all the mod's buildings right away.§!"
  vfb.1.c:0 "§G(Just Armory - Recommended)§! I think only the Armory should be available at the beginning."
  vfb.1.c.tooltip:0 "This will make the Armory the only building available at the start of the game, and will allow you to build it right away.\n\n§YThis is the recommended option for a more balanced experience.§!"
  vfb.1.d:0 "§R(Skip Customization)§!By the way, can we not have any customization events right now? I just want to play the game."
  vfb.1.d.tooltip:0 "This option will not fire any customization event, so you won't be able to change the limits of the mod's buildings. If you want to customize anything later on, just type 'event vfb.2' into the console and the three customizations will be available again."
  vfb.2:0 "(VFB)  Set Polar Capacity"
  vfb.2.name:0 "(VFB) Set Polar Capacity"
  vfb.2.desc:0 "§YBefore you go§!, you have the option of how many Polar Worksite evolutions you can build per planet. This can get crazy, as Polar Worksite evolutions are designed to be ultimate planetary specializations, so don't get angry if 2 isn't balanced, but it will probably be fun.\n\nOh, this decision is permanent and affects the AI!"
  vfb.2.a:0 "§G(Intended Experience)§! Keep is as one per planet!"
  vfb.2.a.tooltip:0 "This option keeps your Planetary Limit for main builds at 1. This is the intended experience, and it is recommended for a more balanced game."
  vfb.2.b:0 "§Y(Potentially Unbalanced)§! Well, every planet does have two poles... Right?"
  vfb.2.b.tooltip:0 "This option bumps your Planetary Limit for main builds to 2. This is very fun. You still won't be able to build two of the same building, it would just break everything up."
  vfb.2.c:0 "§R(Legacy Colonial Version)§! Actually, I just want the small buildings. No Polar Worksites."
  vfb.2.c.tooltip:0 "VFB started as a mod to add two small buildings, the Armory and the Workshop, to make the first years where you have a lot of unproductive recently-colonized planets easier. With this, you'll be able to build both, the Refinery, and the Wharf in its two evolutions. In case you might want it, here you go!"
  vfb.3:0 "(VFB) Set Polar Empire Limit"
  vfb.3.name:0 "(VFB) Set Polar Empire Limit"
  vfb.3.desc:0 "§YOh, just another thing§!, you have the option of how many Polar Worksite evolutions you can build per empire. Why? A lot of people are requesting this. I personally dislike this option, but well, I'm a man of the people.\n\n This is also permanent and affects the AI!"
  vfb.3.a:0 "§G(Intended Experience)§! No limits!"
  vfb.3.a.tooltip:0 "By selecting this you'll still be able to build as many Polar Worksites and their evolutions as you want in total. This is the intended experience."
  vfb.3.b:0 "§Y(1)§! 1 Polar Worksites per Empire."
  vfb.3.b.tooltip:0 "By selecting this you'll be able to build up to 1 Polar Worksites and their evolutions in total."
  vfb.3.c:0 "§Y(2)§! 2 Polar Worksites per Empire."
  vfb.3.c.tooltip:0 "By selecting this you'll be able to build up to 2 Polar Worksites and their evolutions in total."
  vfb.3.d:0 "§Y(3)§! 3 Polar Worksites per Empire."
  vfb.3.d.tooltip:0 "By selecting this you'll be able to build up to 3 Polar Worksites and their evolutions in total."
  vfb.3.e:0 "§Y(5)§! 5 Polar Worksites per Empire."
  vfb.3.e.tooltip:0 "By selecting this you'll be able to build up to 5 Polar Worksites and their evolutions in total."
  vfb.3.f:0 "§Y(10)§! 10 Polar Worksites per Empire."
  vfb.3.f.tooltip:0 "By selecting this you'll be able to build up to 10 Polar Worksites and their evolutions in total."
  vfb.4:0 "(VFB) Set Resource Add-On Limit"
  vfb.4.name:0 "(VFB) Set Resource Add-On Limit"
  vfb.4.desc:0 "§YI swear I'm almost done§!, you have the option of how many Resource Add-Ons you can build per planet. This can get pretty crazy pretty quick, but I now I learned how to code these limits and I'm having fun with it. 2 for basic resources and 1 for advanced resources is what you are used to if you have played this mod before, but I think most people would say 1-1 is more balanced. I personally play with 3-2.!\n\nThis is the build limit per planet for the Meteorite Mills, Thermal Transformers and Saccharide Separators (basic resources), Neonate Nomograms, Drag Distillers, Lattice Liquidators and Resonant Revetments (advanced resources). This is also permanent and affects the AI!"
  vfb.4.a:0 "§Y(Most Balanced)§! 1-1, 1 basic resource and 1 advanced resource per planet."
  vfb.4.a.tooltip:0 "This is the most boring option, and the one I recommend if you're more of a serious player. It allows you to build 1 Meteorite Mill, 1 Thermal Transformer or 1 Saccharide Separator, and 1 Neonate Nomogram, 1 Drag Distiller, 1 Lattice Liquidator and 1 Resonant Revetment per planet."
  vfb.4.b:0 "§G(Recommended)§! 2-1, 2 basic resources and 1 advanced resource per planet."
  vfb.4.b.tooltip:0 "This is the recommended option in regards to how I envison how the economy should work in Stellaris. It allows you to build 2 Meteorite Mills, 2 Thermal Transformers or 2 Saccharide Separators, and 1 Neonate Nomograms, 1 Drag Distillers, 1 Lattice Liquidators or 1 Resonant Revetments per planet."
  vfb.4.c:0 "§R(Most Fun)§! 3-2, 3 basic resources and 2 advanced resources per planet."
  vfb.4.c.tooltip:0 "This is the most fun option, and the one I recommend if you're more of a casual player, want to take on FEs quickly or are playing one of those mods that you have to use Dark Matter for everything. It allows you to build 3 Meteorite Mills, 3 Thermal Transformers or 3 Saccharide Separators, and 2 Neonate Nomograms, 2 Drag Distillers, 2 Lattice Liquidators or 2 Resonant Revetments per planet."
