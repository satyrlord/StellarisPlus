  tech_building_vfb_plastic_facility_c:0 "Técnicas de Destilação de Aerossol"
  tech_building_vfb_plastic_facility_c_desc:0 "Desenvolvemos uma maneira de fabricar uma síntese de compostos semelhantes ao Zro aproveitando redes de Separação de Sacarídeos em baixa pressão. Através da acumulação de aerossóis e técnicas avançadas de destilação, essas instalações extraem compostos valiosos à custa de eficiência reduzida e aumento da geração de resíduos."

  tech_building_vfb_plastic_facility_d:0 "Técnicas de Indução de Cognitopatias"
  tech_building_vfb_plastic_facility_d_desc:0 "Com uma nova abordagem completamente surreal para o planejamento de entrada-processamento em nanites, é possível induzir um alinhamento intricado da biomassa para explorar caminhos de replicação de nanites, permitindo a produção controlada em lote de nanites. Esse processo avançado exige um gerenciamento preciso da biomassa e uma supervisão cuidadosa para garantir a estabilidade."

  tech_building_vfb_fusion_complex_c:0 "Técnicas Primakoff Tangenciais"
  tech_building_vfb_fusion_complex_c_desc:0 "É possível fabricar e colher Matéria Escura simulando as condições extremas encontradas próximas a buracos negros. Esse processo, embora intensivo em recursos, permite a extração desse material elusivo através da manipulação avançada de fótons e ressonância de campo de gluons."

  tech_building_vfb_asteroid_hub_c:0 "Técnicas de Injeção Ultrapneumática"
  tech_building_vfb_asteroid_hub_c_desc:0 "Podemos construir instalações especializadas projetadas para produzir Metal Vivo quebrando estruturas macro-atômicas sob condições extremas. Esse processo, embora caro, fornece um suprimento constante desse recurso raro e valioso, essencial para construção e pesquisa avançadas."

  bombardment_vfb_kinectic:0 "Cinético"
  bombardment_vfb_kinectic_desc:3 "O Bombardeio Cinético emprega tecnologia de feixe tractor para arrastar asteroides em rotas de colisão destinadas a planetas hostis.\n- §R Dano Massivo§! para §YExércitos§!\n- §R Dano Massivo§! para §YPlaneta§!\n- §RGargantuesco§! dano para §YPops (200-400/m)§!\n- Bombardeará planetas desprotegidos\n- Pode reduzir planetas a Mundos Tumba sem vida\n- O bombardeio cessará quando o combate em solo começar"
  orbital_bombardment_vfb_kinectic:0 "Bombardeio Cinético"
  orbital_bombardment_vfb_kinectic_desc:1 "O Bombardeio Cinético emprega tecnologia de feixe tractor para arrastar asteroides em rotas de colisão destinadas a planetas hostis.\n- §R Dano Massivo§! para §YExércitos§!\n- §R Dano Massivo§! para §YPlaneta§!\n- §RGargantuesco§! dano para §YPops (200-400/m)§!\n- Bombardeará planetas desprotegidos\n- Pode reduzir planetas a Mundos Tumba sem vida\n- O bombardeio cessará quando o combate em solo começar"
  orbital_bombardment_vfb_kinectic_name:0 "Bombardeio Cinético"
  tech_building_vfb_asteroid_station_tooltip:0 "Desbloqueia a §YKinectic Bombardment§! Stance"
  building_vfb_comms_a:0 "Deep Space Network"
  building_vfb_comms_a_desc:0 "The Deep Space Network is a surface-based network of optical and radio communication arrays, lidars, radars, and telescopes that allows for the monitoring of space and the coordination of our intra-stellar operations. It also provides a modest insight into the surrounding cosmos, at a throughput of about hundreds of mega-oscillations per second."
  tech_building_vfb_comms_a:0 "Radio Astronomy"
  tech_building_vfb_comms_a_desc:0 "Radio Telescopes are top-of-the-line equipment that allow us to monitor our intrastellar and near-interstellar situation, and peek a little bit in the vastness of space."
  building_vfb_comms_b:0 "Superluminal Communications Network"
  building_vfb_comms_b_desc:0 "The Superluminal Communications Network leverages advanced warp technology to enable faster-than-light communication across vast interstellar distances. By establishing a network of optical repeaters on our planets, we can transmit data at unprecedented speeds, vastly improving the security, throughput, and latency of our interstellar communications, at possibly a few hundred tera-oscillations per second."
  tech_building_vfb_comms_b:0 "Self-Destructing Photonic Containment"
  tech_building_vfb_comms_b_desc:0 "Superluminal Travel being a long-standing reality of Space Travel has us relying on subspace communications for most of our interstellar communication needs. This energy-intensive, low-security, low-throughput communication method is not ideal, but our best solution for far-flung vessels and stations which we don't have the precise locations for and so can't accurately 'aim at' from other planets, and can recieve signals from anywhere. Fortunately, we've arrived the idea of utilizing our Warp Technology for communications by establishing a network of optical repeaters throughout our planets. Essentially, we'd be packaging photons in a warp-able envelope, the SDPC, which can be will open itself a few nanometers before reaching the other antenna. The stable structure of the proton can be mapped by a reciever, and can be "rebuilt" as a data-package. This way, we'll be effectively running fibre optics between the stars. This will vastly improve the security, throughput and latency of our interstellar communications."
  building_vfb_comms_c:0 "Entangled Communications Network"
  building_vfb_comms_c_desc:0 "The Entangled Communications Network is a cutting-edge communication system that utilizes quantum entanglement to enable instantaneous communication across vast interstellar distances. By creating pairs of entangled particles and distributing them across our planets, we can transmit information instantaneously, regardless of the distance between the sender and receiver. This revolutionary technology has the potential to transform our interstellar communications, providing unparalleled reliability and virtually impenetrable peer-to-peer security, at hundreds of Peta-oscillations per second."
  tech_building_vfb_comms_c:0 "Entangled Transceiving Particles"
  tech_building_vfb_comms_c_desc:0 "One fundamental property of our universe is that it's not locally real. This means that the state of entangled particles will instantaneously affect each other, regardless of the distance between them. While information being superluminous by itself has many, many repercussions, reliable manufacturing of particles quantum-entangled to each other means we can distributor two-way communicators that are completely mutually exclusive to each other, fully non-interceptable and non-traceable, which can relay information virtually as fast as we are able to modify their quantum state through observation. At very little redundancy, as observation of the recieving particle triggers another change in the quantum state of the transmitting particle, this method also dispenses multiple-way handshakes as method of minimizing packet loss and allows for communication with the most unreliable and moving locations seamlessly."
  building_vfb_comms_d:0 "Rede de Comunicação Hiperdimensional"
  building_vfb_comms_d_desc:0 "A Rede de Comunicação Hiperdimensional é um sistema de comunicação revolucionário que opera e manipula o espaço de dimensões superiores para modular e atribuir reparo a partículas prontas para emaranhamento a grandes distâncias interestelares, além de armazenar e processar dados de bilhões de dispositivos. Um centro de dados planetário para uma internet espacial!"
  tech_building_vfb_comms_d:0 "Pareamento Hiperdimensional de Partículas" 
  tech_building_vfb_comms_d_desc:0 "Por meio da manipulação do espaço de dimensões superiores, podemos ligar partículas prontas para emaranhamento a grandes distâncias interestelares, independentemente de seus pareamentos iniciais. Isso, claro, é enorme. Isso não apenas significa que pares transmissores não terão de ser fabricados juntos nem descartados se um deles se perder, como também que podemos ligar e desligar cada transmissor a outro muitas vezes por segundo, permitindo que uma rede descentralizada de comunicações opere por meio de endereços, protocolos, apertos de mão etc. Na prática, isso significa que podemos ter uma rede de comunicação totalmente descentralizada, peer-to-peer, não interceptável, não rastreável e instantânea por toda a galáxia, a centenas de exa-oscilação por segundo, muito parecida com as comunicações intraplanetárias atuais."
  mod_job_clerk_automated_workforce_mult:0 "£job_clerk£ Força de trabalho automatizada dos escriturários"
