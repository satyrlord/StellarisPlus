 starfleet_tng_shipset_desc:0 "A late 24th-century Starfleet shipset with advanced hull shaping and multi-role fleet elements."
 terran_nx_shipset_desc:0 "A mirror-era shipset with militarized styling and an uncompromising, authoritarian aesthetic."

 terrahuman_01_shipset_desc:0 "A human-adjacent shipset built for adaptable, general-purpose fleets."
 biomass_01_shipset_desc:0 "An organic, biomass-themed shipset with unsettling silhouettes and living-hull aesthetics."
 salvager_01_shipset_desc:0 "A salvager shipset assembled from recovered hulls and pragmatic retrofit work."

 chaos_01_shipset_desc:0 "A baroque, war-torn shipset defined by brutal profiles and ominous ornamentation."
 chaos_02_shipset_desc:0 "A variant Chaos shipset with imposing silhouettes and heavy, aggressive styling."

 wain_01_shipset_desc:0 "An imperial fleet shipset emphasizing disciplined lines and naval tradition."
