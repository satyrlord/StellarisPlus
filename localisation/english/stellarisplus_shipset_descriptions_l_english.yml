 # Shipset descriptions (shown in the ship appearance selector)

 borg_shipset_desc:0 "A relentless cybernetic collective shipset, optimized for adaptation and assimilation."
 klingon_shipset_desc:0 "A warship-focused shipset designed for aggressive doctrine, heavy armor, and intimidation."
 romulan_shipset_desc:0 "A sleek shipset emphasizing stealth, precision, and disciplined fleet design."
 vulcan_shipset_desc:0 "A disciplined shipset featuring refined geometry, balanced performance, and restrained design."

 starfleet_nx_shipset_desc:0 "An early Starfleet-era shipset built around exploration cruisers and practical, rugged silhouettes."
