l_german:

  building_vfb_wharf:0 "Stellare Werft"
  building_vfb_wharf_desc:0 "Während normale Kolonien auf transorbitale Transporte und zerlegte Schiffspioniere setzen, können wir auf strategisch wichtigen Planeten einen Schritt weiter gehen. Stellare Werften sind riesige Bauwerke, die den Treibstoffverbrauch von Schiffen senken, den Betrieb von Außenorbit-Schiffen erleichtern, den Weltraum überwachen, die Marine-Ankerplätze zentralisieren und die planetaren Zollämter beherbergen. Sie verbinden den Außenorbit mit dem Innenorbit und dienen als Docks für Raumschiffe und als Andockstellen für Produktionsströme. Als Kontrollturm und Flugfeld zugleich konzentriert die Stellare Werft alle atmosphärischen Einflüsse auf unseren Planeten."

  building_vfb_harbor:0 "Interstellare Hafen"
  building_vfb_harbor_desc:0 "Das exponentielle Wachstum unserer planetaren Infrastruktur, des Handels, der Produktion und des Ressourcenflusses hat unsere Stellaren Werften überholt. Unsere Aufgaben gehen nun über die Überwachung atmosphärischer Einflüsse hinaus und umfassen die Unterstützung unserer Stationen bei der Verwaltung der äußeren Weltraumwirtschaft, die äußerst profitabel und reich geworden ist. Der Interstellare Hafen besteht aus einer Reihe von orbitalen Erweiterungen unserer bereits bedeutenden vertikalen Infrastruktur. Standard-Dockprotokolle, öffentlicher Transport zwischen Station und Planet, Eskorten und schnelle Flottilleneinsätze, fortschrittliche Gesundheitsversorgung, die auf Stationen nicht verfügbar ist, und die Koordination von Raumschiffen im System sind einige der neuen Aufgaben. Wie Werften verbinden unsere Häfen den Außen-Innenorbit-Transport und bündeln alle lokalen Station-Planet-Ströme."

  building_vfb_workshop:0 "Modulare Werkstätten"
  building_vfb_workshop_desc:0 "Ausgestattet mit Schmieden, Druckern und Vorlagen erfüllt eine modulare Werkstatt die besonderen Bedürfnisse jedes Kolonisten und stellt alle Ausrüstungs- und Reparaturmaterialien bereit. Überschussproduktion kann ebenfalls exportiert werden."

  building_vfb_logistichub:0 "Zentrale Logistikhubs"
  building_vfb_logistichub_desc:0 "Diese großen Terminals verbinden und steuern ein planetenweites Netz von Hyperloops und Magnetschwebebahnen, verteilen schnell Vorräte und sorgen dafür, dass alle Produktionszentren mit maximaler Effizienz arbeiten. Die zentralen Logistikhubs regulieren auch die meisten suborbitalen Luftfrachttransporte und verbinden unser ständig wachsendes planetarisches Netz von Solarerntemaschinen, Nährstoffreplikatoren und Erzförderern, sodass keine überschüssige Energie, Mineralien oder Nahrung verschwendet wird."

  building_vfb_orbitalhub:0 "Integrierte Orbitalhubs"
  building_vfb_orbitalhub_desc:0 "Aufbauend auf der bestehenden Infrastruktur unserer Interstellaren Häfen erweitern die integrierten Orbitalhubs die Mission ihrer Vorgänger, die Effizienz der Transportprotokolle durch Nutzung der planetaren Rotation zu maximieren. Neben der Optimierung dieser Protokolle zentralisiert dieses Vorhaben unsere planetaren Stromnetze, Mineralienreinigungsanlagen und Lebensmittelverarbeitungszentren, erhöht die Produktion von Rohstoffen und verarbeiteten Ressourcen und reduziert den Abfall erheblich. Allerdings ist dies extrem teuer."

  building_vfb_plaza:0 "Bürgerplätze"
  building_vfb_plaza_desc:0 "Während wir auf unserer Heimatwelt Jahrtausende Zeit hatten, die öffentliche Infrastruktur zu entwickeln, fehlt unseren Kolonien dieser Luxus. Unsere neuen Planeten benötigen dringend eine zentrale Regierungspräsenz, haben aber nicht die Zeit, diese natürlich entstehen zu lassen. Bürgerplätze bündeln die Wohlfahrts- und Verwaltungsaufgaben des Staates in zentralen planetaren Einrichtungen, die sorgfältig organisiert sind, um maximale Effizienz der öffentlichen Dienste zu gewährleisten. Diese Gebäude beherbergen die planetaren Gendarmen, sanitäre Einrichtungen, Bauämter und den Zivildienst, um Sicherheit, Gesundheit, Infrastruktur und Stabilität für alle Bürger gleichzeitig zu gewährleisten."

  building_vfb_manufactory:0 "Fertigungsanlagen"
  building_vfb_manufactory_desc:0 "Diese großen Produktionszentren vereinen 3D-Drucker, Schmieden, Docks, Rohstofflager, Bauvorlagen und andere Fertigungsnotwendigkeiten. Für alle zugänglich, ermöglicht eine Fertigungsanlage den Bürgern, alles zu produzieren, was ihre Häuser und Docks benötigen, auf ihren eigenen Planeten und mit ihren eigenen oder spezialisierten Händen, und verspricht, die traditionelle Industrie unserer Heimatwelt zu ersetzen."

  building_vfb_residence:0 "Strukturelle Wohnanlagen"
  building_vfb_residence_desc:0 "Die großen Bögen und Legierungswände unserer Lebensräume bieten reichlich Platz für den Bau von Häusern."

  building_vfb_refinery:0 "Raffineriestationen"
  building_vfb_refinery_desc:0 "Da wir nun das Potenzial seltener Ressourcen erkannt haben, sollten wir deren Produktion in speziellen Raffineriestationen konzentrieren, um sicherzustellen, dass alle Kolonien Zugang zu lokalen Vorräten dieser wertvollen Güter haben."

  building_vfb_resort:0 "Paradies-Resorts"
  building_vfb_resort_desc:0 "Während unser Imperium normalerweise nur einen einzigen Resort-Planeten finanzieren kann, können wir helfen, große Resorts auf vielen Planeten zu etablieren, um Touristen Unterhaltung, exzellentes Essen und ansprechende kulturelle und Freizeitaktivitäten zu bieten."

  building_vfb_preserve:0 "Schutzhubs"
  building_vfb_preserve_desc:0 "Die zunehmende Urbanisierung und der aufkommende wirtschaftliche Wohlstand haben die Ökosysteme unserer Planeten stark gefährdet. Der Schutz der natürlichen Tier- und Pflanzenwelt, unabhängig davon, wie außergewöhnlich die einheimische Fauna und Flora ist, und sogar die Einrichtung von Zoos zum Schutz der Ökosysteme unserer weiter entwickelten Kolonien, wird unser Gewissen beruhigen, dafür sorgen, dass kein Ökosystem in einer Kolonie dauerhaft ausstirbt, und wertvolle Einblicke in xeno-wildlife bieten."

  building_vfb_siderurgy:0 "Tetra-Siderurgie"
  building_vfb_siderurgy_desc:0 "Die Tetra-Siderurgie ist ein fortschrittliches Schmelz- und Verarbeitungszentrum, das kleinere Legierungswerke verbindet, deren Materialzufluss und Wärmegeneratoren bündelt und mit unseren Legierungsschmieden verknüpft. So können große Mengen wertvoller Metallkomponenten mit relativ wenig Personal und geringem Materialverbrauch und Abfall hergestellt werden, wenn auch mit hohem Energieaufwand. Je mehr Schmieden wir auf Planeten mit dieser Anlage haben, desto intensiver sind die Schmelzöfen und desto mehr Ressourcen produzieren wir.\n\n§YMetallurgen-Ertrag stapelt sich für jede Legierungsschmiede oder gleichwertiges Upgrade, bis zu 5.§!"

  building_vfb_asteroid_station:0 "Zirkumstellare Zufahrt"
  building_vfb_asteroid_station_desc:0 "Indem wir zirkumstellares Material im Weltraum umleiten und fragmentieren und es in unsere planetaren Umlaufbahnen bringen, können wir große Mengen dringend benötigter Materialien gewinnen, ohne die Kruste unserer Oberflächen zu beschädigen. Es ist jedoch ein kostspieliges und riskantes Unterfangen."
  building_vfb_asteroid_hub:0 "Zirkumstellare Zufahrtsanlage"
  building_vfb_asteroid_hub_desc:0 "Indem wir zirkumstellares Material im Weltraum umleiten und fragmentieren und es in unsere planetaren Umlaufbahnen bringen, können wir große Mengen dringend benötigter Materialien gewinnen, ohne die Kruste unserer Oberflächen zu beschädigen. Es ist jedoch ein kostspieliges und riskantes Unterfangen.\n\n§YDiese verbesserte Anlage bietet Platz für zusätzliche Prospektor-Raumfahrzeug-Buchten und kann mit Meteoritenmühlen für noch mehr Produktionsausstoß ausgestattet werden.§!"
  building_vfb_asteroid_hub_b:0 "Meteoritenmühlen" 
  building_vfb_asteroid_hub_b_desc:0 "Diese Erweiterungseinrichtungen für die Dockanlagen für zirkumstellare Materie verarbeiten niedergegangene Meteoriten. Ihre Einrichtungen entlasten unsere Dockteams von dieser Aufgabe, sodass sie sich besser auf wichtige outer-orbital Aufgaben, hauptsächlich die Asteroidenbergung, konzentrieren können. Darüber hinaus haben die Bodenmannschaften mehr Zeit, ihre Ressourcen zu durchsuchen und das Maximale aus dem herauszuholen, was ihre Himmelskollegen bringen. \n\n§BErfordert den Bau einer Zirkumstellaren Zufahrtsanlage.§!"
  building_vfb_asteroid_hub_c:0 "Gitter-Liquidator"
  building_vfb_asteroid_hub_c_desc:0 "Gitter-Liquidatoren sind Einrichtungen, die neben unserer Zirkumstellaren Zufahrtsanlage gebaut werden, um lebende Metalle zu erzeugen und zu ernten. Mit Hilfe aktueller Proben von lebendem Metall als Ausgangsmaterial unterziehen wir große Mengen Materie extremen Druck- und Temperaturbedingungen, brechen ihre makro-atomaren Strukturen auf und verflüssigen ihre Gitter. Unter ähnlichem Druck dehnen sich unsere lebenden Metallstarter nach außen aus, integrieren dieses entgitterte Material in ihre Struktur. Dies erfordert ein empfindliches Gleichgewicht der metallischen Elemente in der Gesamtzusammensetzung und liefert im Vergleich zur ursprünglichen Materieinvestition relativ geringe Mengen an überschüssigem lebendem Metall.\n\n§BErfordert den Bau von mindestens einer Meteoritenmühle.§!"

  building_vfb_fusion_plant:0 "Beta-Brücke"
  building_vfb_fusion_plant_desc:0 "Während unsere Technologie zur Umwandlung von Materie in Energie bei weitem nicht so effizient ist, wie sie voraussichtlich sein wird, können wir dies bereits tun, indem wir Atomkerne mit hoher Geschwindigkeit kollidieren und die dabei freigesetzte Wärmeenergie zur Erregung von Wärme-Recycling-Zellen nutzen. Im Gegensatz zu fusionsbetriebenen Anlagen gibt dieser Prozess - Beta-Ernte - keine verbleibende feste Materie ab, was ihn viel effizienter macht. Er wird eine angemessene Menge Energie erzeugen, zu einem angemessenen Materieaufwand für die Durchführung von Beta-Kollisionen."

  building_vfb_fusion_complex:0 "Beta-Brücken-Anlage"
  building_vfb_fusion_complex_desc:0 "Während unsere Technologie zur Umwandlung von Materie in Energie bei weitem nicht so effizient ist, wie sie voraussichtlich sein wird, können wir dies bereits tun, indem wir Atomkerne mit hoher Geschwindigkeit kollidieren und die dabei freigesetzte Wärmeenergie zur Erregung von Wärme-Recycling-Zellen nutzen. Im Gegensatz zu fusionsbetriebenen Anlagen gibt dieser Prozess - Beta-Ernte - keine verbleibende feste Materie ab, was ihn viel effizienter macht. Er wird eine angemessene Menge Energie erzeugen, zu einem angemessenen Materieaufwand für die Durchführung von Beta-Kollisionen.\n\n§YDiese verbesserte Anlage bietet Platz für zusätzliche Beschleuniger und kann mit Wärmeübertragungsstationen für noch mehr Produktionsausstoß ausgestattet werden.§!"
  building_vfb_fusion_complex_b:0 "Wärmeübertragungsstationen"
  building_vfb_fusion_complex_b_desc:0 "Diese Erweiterungseinrichtungen für die Beta-Tunnel-Anlagen, die um die großen Sprünge der Tunnel installiert sind, fügen viele physische Materie-Einschubstellen hinzu - ähnlich wie Synchrotronen - um die Anlagen herum und etablieren ein Netzwerk von Wärme-Recycling-Stationen, die eine Steigerung der Effizienz und des Volumens der Energieerzeugungsaktivitäten durch Wärme-Recycling ermöglichen.\n\n§BErfordert den Bau einer Beta-Brücken-Anlage.§!"
  building_vfb_fusion_complex_c:0 "Resonante Verkleidung"
    building_vfb_fusion_complex_c_desc:0 "Resonante Verkleidungen (sic, nicht Verkleidung, sondern Verkleidung) sind optionale Modifikationen unserer Beta-Brücken-Anlagen, die die Erzeugung und Ernte von Dunkler Materie ermöglichen. Durch unsere aktuelle Infrastruktur können wir Photonen beschleunigen, züchten und in eine sekundäre Schleife von Brücken einspeisen, die durch magnetisch aktive, nukleus-dichte Verkleidungen von ihren Hauptmaterie-Kollidern getrennt sind. Aus diesen Energiefeldern auf diesen Verkleidungen transmutieren die Photonen zu Axionen, einem niedermolekularen, niederegie-rungsaktiven Teilchen, das gebündelt und in Dunkle Materie-Reaktoren verarbeitet werden kann. Um zu verhindern, dass diese Axione sofort wieder in Photonen und Energie zerfallen, was eine gewaltsame Expansion thermischer Energie erzeugen würde, sieben wir sie durch ein Gluonenfeld bis zu einer resonanten Kammer. So wird Dunkle Materie derzeit an den Akkretionsscheiben von schwarzen Löchern extrahiert, wo sie diesen Effekt durch ihre eigene Rotationsinertie und Materie-Kollisionen in der Nähe ihrer Ereignishorizonte simulieren. Es versteht sich von selbst, dass dies sehr energie- und ressourcenintensiv ist. Dies wird uns auch zwingen, die Sicherheitsgrenzen unserer Beta-Brücke auf strengere Parameter zu bringen, was ihre Betriebseffizienz verringert.\n\n§BErfordert den Bau von mindestens einer Wärmeübertragungsstation.§!"

  building_vfb_plastic_plant:0 "Polymer-Palettierer"
  building_vfb_plastic_plant_desc:0 "Unsere Abhängigkeit von boden-extrahierten, bodenschädigenden Mineralien war schon immer ein Problem in unseren Bemühungen um Umweltschutz und Ressourcenausstoßquoten. Unsere Agro-Ingenieure haben kürzlich eine Lösung gefunden; Basierend auf unserer früheren Nutzung von erdölbasierten Feststoffen wären neue Zusammensetzungen von Bio-Kunststoffen ein effizienter Ersatz für extrahierte Mineralien zur Herstellung von Legierungsplatten und Konsumgütern. Vollständig umweltfreundlich, biologisch abbaubar und omni-recycelbar, wird auch der Abfallbiomasse aus den Raffinerieprozessen dieser Bio-Kunststoffe in Methanol, Ethanol und andere Kraftstoffalternativen für unsere Kolonien aufgewertet."
  building_vfb_plastic_facility:0 "Polymer-Palettisierungs-Anlage"
  building_vfb_plastic_facility_desc:0 "Optimierungen bei der Synthese, Formgebung und dem Recycling von Biomasse und Bio-Kunststoffen haben eine neue Grenze für unseren Rohwarenmarkt eröffnet. Durch die Verteilung unserer Polymerisationsanlagen auf lokale Werke können wir sicherstellen, dass die meisten kolonialen Gemeinschaften eine saubere und effiziente Alternative zu Konsumgütern aus extrahierten Mineralien haben.\n\n§YDiese verbesserte Anlage bietet Platz für zusätzliche Zucker-Recycling-Anlagen und kann mit Saccharideseparatoren für noch mehr Produktionsausstoß ausgestattet werden.§Y!"
  building_vfb_plastic_facility_b:0 "Saccharideseparatoren"
  building_vfb_plastic_facility_b_desc:0 "Bestimmte molekulare Anordnungen sind chemisch einfacher für organische Prozesse, um Zucker zu erzeugen. Diese Verbindungen erfordern jedoch mehr Arbeit für unsere Polymerisationsanlagen, um sie zu zersetzen. Indem wir die Bioprozessierungsstufen, die exklusiv für diese weit verbreiteten, aber schwer zu knackenden Kohlenhydrate sind, in separate Anlagen leiten, können wir unsere Hauptanlage ausschließlich für die Stufen widmen, die in allen Zersetzungsprozessen üblich sind, was das Volumen der gleichzeitig verarbeiteten Biomasse erhöht.\n\n§BErfordert den Bau einer Polymer-Palettisierungs-Anlage.§!"

  building_vfb_plastic_facility_c:0 "Drag-Destillierer"
  building_vfb_plastic_facility_c_desc:0 "Drag-Destillierer sind optionale Modifikationen unseres Netzwerks zur Saccharideseparation. Normalerweise unterstützt der hohe Druck in den Trennbehältern den Prozess des Kohlenstoffabbaus, beschleunigt die Saccharidzusammensetzung in verwertbare, wieder polymerisierbare Materie. Durch die Verbindung dieser Behälter untereinander in einem Niederdrucksystem und die Einführung von künstlichem Luftstrom können wir jedoch die Ansammlung von Aerosolen, die aus dem Abbau dieser Saccharide stammen, induzieren und dann ihre Niederschlagung erzwingen, indem wir sie durch feine Destillierer ziehen. Nach diesem Prozess können wir eine Vielzahl von Destillationsprozessen in diesem Aerosol durchführen, bis wir eine Kombination von Verbindungen erreichen, die der in extrahiertem Zro ähnelt. Dies reduziert natürlich die Effizienz des Saccharideseparationsprozesses erheblich und erzeugt zusätzlichen Abfall. \n\n§BErfordert den Bau von mindestens einem Saccharideseparator.§!"
  building_vfb_plastic_facility_d:0 "Neonat-Nomogramm"
  building_vfb_plastic_facility_d_desc:0 "Neonat-Nomogramme sind optionale Einrichtungen, die funktionieren, indem sie Biomasse fein in einem Raster komplexer Muster ausrichten, sowohl physisch als auch in ihrem genetischen Material. Da Naniten Maschinen sind, die physikalische Eingaben aus der Welt sammeln und verarbeiten, können wir durch diese Muster Hintertüren in ihrer Eingabe-zu-Verarbeitungs-Schnittstelle ausnutzen, um einen Hintertürzugang in einen einzigen Naniten zu installieren und ihn dann zur Selbstreplikation zu zwingen. Der Haken ist, dass wir einen Fortpflanzungszyklus nur initiieren können, indem wir sie mit derselben Biomasse füttern, was bedeutet, dass wir in Chargen arbeiten müssen, anstatt sie unbewacht und unzeremoniell Materie konsumieren zu lassen. \n\n§BErfordert den Bau von mindestens einem Saccharideseparator.§!"

  building_vfb_lyceum:0 "Lyzeum"
  building_vfb_lyceum_desc:0 "Während Akademien und Forschungseinrichtungen über unsere Bürgerplaneten verteilt sind, sind diese Lernzentren im Allgemeinen zu verstreut und zu sehr auf ihre Forschung fokussiert, um zusammenzuarbeiten und Einblicke in die Arbeiten des jeweils anderen zu geben. Durch die Vernetzung dieser intellektuellen Nukleus - wo immer sie relevant sind - durch Informationsinfrastrukturen werden wir nicht nur die Forschung durch Emergenz beschleunigen, sondern auch zusätzliche Möglichkeiten schaffen - da dieses Netzwerk physische Infrastruktur erfordert - für Archivare, Professoren und sogar Philosophen, um komfortabel in einem dedizierten Raum zu arbeiten; dem Lyzeum. \n\n§YForscher-Ertrag stapelt sich für jedes Forschungslabor oder gleichwertiges Upgrade, bis zu 5.§!"
  
  building_vfb_museum:0 "Museum"
  building_vfb_museum_desc:0 "Die Expansion der planetaren Akademie in Form des Lyzeums - und der Bildungsfähigkeiten, die es konzentriert - hat diesen Planeten zu einem Nukleus für Innovation und Wissen gemacht. Während wir in der Galaxie expandieren und immer mehr Artefakte und Wunder älterer Zeiten entdecken, wird uns bewusst, wie verschwenderisch es ist, sie nur im Feld zu erkunden und danach zu lagern. Es gibt viel zu lernen, nur durch Analyse, und wir können tiefere Schlussfolgerungen aus diesen Gegenständen ziehen, indem wir Forschungspersonal in archäologischen Untersuchungsanlagen widmen. Wir können sogar weniger bahnbrechende Entdeckungen der Öffentlichkeit zugänglich machen!.\n\n§YEntdeckt Minderartefakte, während Forschungspunkte kosten§!"
  
  building_vfb_base:0 "Polare Baustelle"
  building_vfb_base_desc:0 "Um ein üppiges (oder karges, um das klarzustellen) Wildland in ein Zentrum für Produktion und den anschließenden Fortschritt unserer Zivilisation zu verwandeln, sind erhebliche infrastrukturelle Investitionen erforderlich. Wenn wir große Strukturen bauen wollen, um unsere Ressourcenbeschaffungs- und Verwaltungsprojekte zu beherbergen, sollten wir große Baustellen einrichten, um sie darauf zu lagern. Leider wird die Ausführung großer Projekte durch die Schwerkraft und Rotation der meisten Planeten, die ungünstige Bedingungen für den Bau und die Instandhaltung außerhalb der Regionen in der Nähe der Pole schaffen, nahezu unmöglich gemacht. Glücklicherweise sind die Pole die Orte, an denen die meisten transplanetaren geosynchronen Infrastrukturen gebaut werden. \n\n§YErmöglicht den Bau mehrerer Gebäude als Upgrades.§!\n\n§GDie folgenden Gebäude können als Upgrades für diese Baustelle gebaut werden:\n\n - Beta-Brücke\n - Zirkumstellare Zufahrt\n - Polymer-Palettierer\n - Zentrale Logistikhubs\n - Integrierte Orbitalhubs\n - Tetra-Siderurgien\n - Lyzeum\n - Schutzhubs\n - Paradies-Resorts\n - Atelier\n - Museum\n - Zivildienst§!"

  
  building_vfb_constructor:0 "Atelier"
  building_vfb_constructor_desc:0 "Die Dezentralisierung und Einführung moderner industrieller Techniken für die Produktion der meisten - wenn nicht aller - Konsumgüter unseres Imperiums war ein unbestreitbarer Erfolg. Doch die Aufgabe, Prototypen zu entwerfen, unseren vor Ort tätigen Herstellern zu überlassen, hat zu Ineffizienzen mit redundanten Designs geführt. Das Atelier erstellt Blaupausen für unsere gefragtesten Produkte und schafft Platz an stark nachgefragten Standorten für eine erhöhte Produktion. \n\n §YArtisan-Ertrag stapelt sich für jede Zivilfabrik oder gleichwertiges Upgrade, bis zu 5.§!"
    
  building_vfb_administration:0 "Zivildienst"
  building_vfb_administration_desc:0 "Die Last der öffentlichen Verwaltung ist sicherlich keine leichte, die man tragen kann. Unsere Raumerweiterung hat in dieser Hinsicht zu einer gewissen Dezentralisierung geführt. Doch was wir an Flexibilität gewonnen haben, haben wir an Koordination verloren. Ein dediziertes Büro, das die vielen Abteilungskommissionen, lokalen Verwaltungsparks und gewählten - oder auferlegten - Führungen miteinander verbindet, wird sicherlich die Stabilität und Effizienz der Regierung verbessern, wenn auch auf Kosten von mehr Gehältern und einer noch einflussreicheren Bürokratie.\n\n§YBürokrat-Ertrag stapelt sich für jedes bürokratische Gebäude oder Upgrade, bis zu 5.§!"
  
  building_vfb_dockyard:0 "Sidereal-Buchten"
  building_vfb_dockyard_desc:0 "Diese alternierenden, frei schwebenden, Karussell-Buchten erweitern den Dockraum in Stellaren Werften und Interstellaren Häfen, ohne dass umfangreiche infrastrukturelle Erweiterungen erforderlich sind. Sie sind kostengünstig, von geringer Bedeutung und hochgradig entsorgbar.\n\n§BErfordert den Bau der Stellaren Werft oder des Interstellaren Hafens§!\n\n§YDie Effekte skalieren mit höheren Anforderungen an die Gebäudeebenen.§!"
  
  job_vfb_accretion_drone:0 "Zusätzlicher Drohne"
  job_vfb_accretion_drone_plural:0 "Zusätzliche Drohnen"
  job_vfb_accretion_drone_desc:0 "Zusätzliche Drohnen sind die Bezeichnung für unsere gruppierten, gemischten Einheiten und Abteilungen. Flexibel in ihrem Zweck koordinieren sie kleinere Feldoperationen, prospektieren, pionieren, fungieren als Pioniere für die Erweiterung unseres Bewusstseins und halten die planetaren Operationen reibungslos am Laufen."
  job_vfb_accretion_drone_effect_desc:0 "£job_vfb_accretion_drone£ $job_vfb_accretion_drone_plural$ erfüllen verschiedene ergänzende Funktionen."
  mod_job_vfb_accretion_drone_add:0 "$job_vfb_accretion_drone$ Jobs"
  mod_job_vfb_accretion_drone_per_pop:0 "§G+1§! $job_vfb_accretion_drone$ Job pro $VALUE$ Pops"
  mod_job_vfb_accretion_drone_per_pop_short:0 "\n§G+1§! £mod_job_vfb_accretion_drone_add£ pro $VALUE$ £pop£"

  vfb.1:0 "VF's Buildings is §Gactive§!"
  vfb.1.name:0 "VF's Buildings is §Gactive§!"
  vfb.1.desc:0 "§YSchön, Sie hier zu sehen! Vielen Dank, dass Sie sich für VF's Buildings entschieden und es installiert haben!§! Dies dient im Grunde dazu, dem Spiel (und Ihnen) mitzuteilen, dass dieses Mod aktiv ist!\n\nWie auch immer, viel Spaß beim Xeno-Befreunden/-Vernichten/beidem. Alles Gute!"
  vfb.1.a:0 "§B(Keine Starttechnologien)§! Cool!"
  vfb.1.a.tooltip:0 "Cool! Viel Spaß, schätze ich."
  vfb.1.b:0 "§Y(Allgemeine Starttechnologien)§!Hey, während ich hier bin, könntest du mir und der Galaxie die §BTechnologien§! geben?"
  vfb.1.b.tooltip:0 "Klar, leg los, Champion.\n\n§YJedes Imperium in der Galaxie wird sofort in der Lage sein, alle Gebäude des Mods zu bauen.§!"
  vfb.1.c:0 "§G(Starter-Arsenal - Empfohlen)§! Ich denke, nur das Arsenal sollte zu Beginn des Spiels verfügbar sein."
  vfb.1.c.tooltip:0 "Dadurch wird das Arsenal zum einzigen verfügbaren Gebäude zu Beginn des Spiels, und Sie können es sofort bauen.\n\n§YDies ist die empfohlene Option für ein ausgewogeneres Erlebnis.§!"
  vfb.1.d:0 "§R(Kundalisierung überspringen)§!Übrigens, können wir gerade keine Anpassungsereignisse haben? Ich möchte nur das Spiel spielen."
  vfb.1.d.tooltip:0 "Diese Option löst kein Anpassungsereignis aus, sodass Sie die Grenzen der Gebäude des Mods nicht ändern können. Wenn Sie später etwas anpassen möchten, geben Sie einfach 'event vfb.2' in die Konsole ein, und die drei Anpassungen werden wieder verfügbar sein."

  vfb.2:0 "(VFB)  Polare Kapazität festlegen"
  vfb.2.name:0 "(VFB) Polare Kapazität festlegen"
  vfb.2.desc:0 "§YBevor Sie gehen§!, haben Sie die Möglichkeit, wie viele Evolutionsstufen der Polararbeitsplätze Sie pro Planet bauen können. Das kann verrückt werden, da die Evolutionsstufen der Polararbeitsplätze als ultimative planetarische Spezialisierungen gedacht sind. Seien Sie also nicht verärgert, wenn 2 nicht ausgewogen ist, es wird wahrscheinlich aber Spaß machen.\n\nOh, diese Entscheidung ist dauerhaft und betrifft auch die KI!"
  vfb.2.a:0 "§G(Intendiertes Erlebnis)§! Lassen Sie es bei einem pro Planet!"
  vfb.2.a.tooltip:0 "Diese Option hält Ihr planetarisches Limit für Hauptgebäude bei 1. Dies ist das beabsichtigte Erlebnis und wird für ein ausgewogeneres Spiel empfohlen."
  vfb.2.b:0 "§Y(Möglicherweise unausgewogen)§! Nun, jeder Planet hat ja zwei Pole... oder?"
  vfb.2.b.tooltip:0 "Diese Option erhöht Ihr planetarisches Limit für Hauptgebäude auf 2. Das macht sehr viel Spaß. Sie werden immer noch nicht in der Lage sein, zwei derselben Gebäude zu bauen, es würde nur alles aufteilen."
  vfb.2.c:0 "§R(Version für alte Kolonien)§! Eigentlich möchte ich nur die kleinen Gebäude. Keine Polararbeitsplätze."
  vfb.2.c.tooltip:0 "VFB begann als Mod, um zwei kleine Gebäude, das Arsenal und die Werkstatt, hinzuzufügen, um die ersten Jahre, in denen Sie viele unproduktive, kürzlich kolonialisierte Planeten haben, zu erleichtern. Damit können Sie sowohl die Raffinerie als auch die Werft in ihren beiden Evolutionsstufen bauen. Für den Fall, dass Sie es möchten, hier haben Sie es!"

  vfb.3:0 "(VFB) Polare Imperiumsgrenze festlegen"
  vfb.3.name:0 "(VFB) Polare Imperiumsgrenze festlegen"
  vfb.3.desc:0 "§YOh, noch etwas§!, Sie haben die Möglichkeit, wie viele Evolutionsstufen der Polararbeitsplätze Sie pro Imperium bauen können. Warum? Viele Leute wünschen sich das. Persönlich mag ich diese Option nicht, aber ich bin nun mal ein Mann des Volkes.\n\n Dies ist ebenfalls dauerhaft und betrifft die KI!"
  vfb.3.a:0 "§G(Intendiertes Erlebnis)§! Keine Grenzen!"
  vfb.3.a.tooltip:0 "Wenn Sie dies auswählen, können Sie weiterhin so viele Polararbeitsplätze und deren Evolutionsstufen bauen, wie Sie möchten. Dies ist das beabsichtigte Erlebnis."
  vfb.3.b:0 "§Y(1)§! 1 Polararbeitsplatz pro Imperium."
  vfb.3.b.tooltip:0 "Wenn Sie dies auswählen, können Sie insgesamt bis zu 1 Polararbeitsplatz und dessen Evolutionsstufen bauen."
  vfb.3.c:0 "§Y(2)§! 2 Polararbeitsplätze pro Imperium."
  vfb.3.c.tooltip:0 "Wenn Sie dies auswählen, können Sie insgesamt bis zu 2 Polararbeitsplätze und deren Evolutionsstufen bauen."
  vfb.3.d:0 "§Y(3)§! 3 Polararbeitsplätze pro Imperium."
  vfb.3.d.tooltip:0 "Wenn Sie dies auswählen, können Sie insgesamt bis zu 3 Polararbeitsplätze und deren Evolutionsstufen bauen."
  vfb.3.e:0 "§Y(5)§! 5 Polararbeitsplätze pro Imperium."
  vfb.3.e.tooltip:0 "Wenn Sie dies auswählen, können Sie insgesamt bis zu 5 Polararbeitsplätze und deren Evolutionsstufen bauen."
  vfb.3.f:0 "§Y(10)§! 10 Polararbeitsplätze pro Imperium."
  vfb.3.f.tooltip:0 "Wenn Sie dies auswählen, können Sie insgesamt bis zu 10 Polararbeitsplätze und deren Evolutionsstufen bauen."

  vfb.4:0 "(VFB) Ressourcen-Zusatzlimit festlegen"
  vfb.4.name:0 "(VFB) Ressourcen-Zusatzlimit festlegen"
  vfb.4.desc:0 "§YIch schwöre, ich bin fast fertig§!, Sie haben die Möglichkeit, wie viele Ressourcen-Zusatzmodule Sie pro Planet bauen können. Das kann ziemlich schnell verrückt werden, aber jetzt habe ich gelernt, wie man diese Grenzen codiert, und ich habe Spaß dabei. 2 für Basisressourcen und 1 für fortgeschrittene Ressourcen sind das, was Sie gewohnt sind, wenn Sie dieses Mod zuvor gespielt haben, aber ich denke, die meisten Leute würden sagen, dass 1-1 ausgewogener ist. Ich persönlich spiele mit 3-2.!\n\nDies ist das Bau-Limit pro Planet für die Meteoritenmühlen, Wärmeübertragungsstationen und Saccharideseparatoren (Basisressourcen), Neonat-Nomogramme, Drag-Destillierer, Gitter-Liquidatoren und Resonante Verkleidungen (fortgeschrittene Ressourcen). Dies ist ebenfalls dauerhaft und betrifft die KI!"
  vfb.4.a:0 "§Y(Die ausgewogenste Option)§! 1-1, 1 Basisressource und 1 fortgeschrittene Ressource pro Planet."
  vfb.4.a.tooltip:0 "Dies ist die langweiligste Option und die, die ich empfehle, wenn Sie eher ein ernsthafter Spieler sind. Sie ermöglicht Ihnen den Bau von 1 Meteoritenmühle, 1 Wärmeübertragungsstation oder 1 Saccharideseparator und 1 Neonat-Nomogramm, 1 Drag-Destillierer, 1 Gitter-Liquidator und 1 Resonante Verkleidung pro Planet."
  vfb.4.b:0 "§G(Empfohlen)§! 3-2, 3 Basisressourcen und 2 fortgeschrittene Ressourcen pro Planet."
  vfb.4.b.tooltip:0 "Dies ist die empfohlene Option in Bezug darauf, wie ich mir vorstelle, dass die Wirtschaft in Stellaris funktionieren sollte. Sie ermöglicht Ihnen den Bau von 2 Meteoritenmühlen, 2 Wärmeübertragungsstationen oder 2 Saccharideseparatoren und 1 Neonat-Nomogramm, 1 Drag-Destillierer, 1 Gitter-Liquidator oder 1 Resonante Verkleidung pro Planet."
  vfb.4.c:0 "§R(Der meiste Spaß)§! 3-2, 3 Basisressourcen und 2 fortgeschrittene Ressourcen pro Planet."
  vfb.4.c.tooltip:0 "Dies ist die spaßigsten Option und die, die ich empfehle, wenn Sie eher ein Gelegenheitsspieler sind, schnell gegen FEs antreten möchten oder eines dieser Mods spielen, für die Sie Dunkle Materie für alles verwenden müssen. Sie ermöglicht Ihnen den Bau von 3 Meteoritenmühlen, 3 Wärmeübertragungsstationen oder 3 Saccharideseparatoren und 2 Neonat-Nomogrammen, 2 Drag-Destillierern, 2 Gitter-Liquidatoren oder 2 Resonante Verkleidungen pro Planet."

  tech_building_vfb_base:0 "Geosynchrone Technik"
  tech_building_vfb_base_desc:0 "Um den Herausforderungen des Weltraumzeitalters zu begegnen, muss unsere Zivilisation große Projekte unternehmen, die aufgrund ihrer Größe mehr als nur bodenständige Mechanik erfordern, um erfolgreich zu sein."
  
  tech_building_vfb_armory:0 "Koloniale Pionierarbeit"
  tech_building_vfb_armory_desc:0 "Die Ausstattung gepanzerter Einrichtungen mit medizinischen, Forschungs- und persönlichen Verteidigungsausrüstungen sowie die Schulung der Kolonisten in deren Nutzung wird den Prozess der planetaren Besetzung beschleunigen und verbessern. Wichtig ist auch, dass wir lokale Fertigungseinrichtungen hinzufügen müssen, um sicherzustellen, dass unsere Kolonisten die notwendige Ausrüstung und Versorgung vor Ort produzieren können. Idealerweise wollen wir die Abhängigkeit von fernen Lieferketten für frühe Kolonien beseitigen, es sei denn, es handelt sich um strategische oder unzugängliche Planeten."

  tech_building_vfb_workshop:0 "Bedarfsgerechte Produktion"
  tech_building_vfb_workshop_desc:0 "Eine übermäßige Menge an Waren zu produzieren, in der Hoffnung, die Bestände zu liquidieren und oft zu scheitern, ist absurd ineffizient. Fortschritte in der Vorlagentechnologie machen die bedarfsgerechte Artisanry bemerkenswert schneller, materialell günstiger, sauberer und effizienter."
  
  tech_building_vfb_harbor:0 "Solarportbehörde"
  tech_building_vfb_harbor_desc:0 "Das exponentielle Wachstum unserer Wirtschaft erfordert ständig wachsende infrastrukturelle und administrative Innovationen."
  
  tech_building_vfb_logistichub:0 "Zentralisierte Verteilung"
  tech_building_vfb_logistichub_desc:0 "'Extraktion, Verarbeitung, Herstellung und Verbrauch' ist eine immens komplexe Kette. Wir können sie ein wenig organisierter gestalten."
  
  tech_building_vfb_orbitalhub:0 "Transorbitaler Logistik"
  tech_building_vfb_orbitalhub_desc:0 "Transport. Im Weltraum."
  
  tech_building_vfb_refinery:0 "Konzentrierte Raffinationsanlagen"
  tech_building_vfb_refinery_desc:0 "Jetzt, wo wir die Technologien zur Synthese strategischer Ressourcen gemeistert haben, ist uns klar geworden, dass wir nicht so viele Gebäude benötigen, um sie zum Laufen zu bringen."
  
  tech_building_vfb_resort:0 "Epikureische Logik"
  tech_building_vfb_resort_desc:0 "Eine zufriedene Bevölkerung ist eine produktive Bevölkerung. Es ist fern von Hedonismus, aber wir sind keine Ungeheuer."
  
  tech_building_vfb_preserve:0 "Bio-Lebensräume"
  tech_building_vfb_preserve_desc:0 "Es ist unsere Pflicht, einheimische Flora und Fauna zu schützen, aber das bedeutet nicht, dass wir überhaupt nicht kolonisieren sollten."
  
  tech_building_vfb_asteroid_station:0 "Weltraumprospektion"
  tech_building_vfb_asteroid_station_desc:0 "Asteroiden und diverses zirkumstellare Material sind unglaublich ressourcenreich. Sie in unseren Planetenparkplätzen zu parken, anstatt sie im Weltraum abzubauen, ermöglicht es uns, diese Mineralien besser zu recyceln und zu verteilen."
  
  tech_building_vfb_asteroid_hub_b:0 "Verarbeitungsprotokoll-Überarbeitungen"
  tech_building_vfb_asteroid_hub_b_desc:0 "Bedeutende Fortschritte in der Mahltechnik bedeuten, dass jedes einzelne Gramm wertvoll ist. Nun ja, nicht buchstäblich, aber wir können wahrscheinlich einige Verwendungen dafür finden."
  
  tech_building_vfb_fusion_plant:0 "Entropische Dynamos"
  tech_building_vfb_fusion_plant_desc:0 "Die effiziente Umwandlung anorganischer Materie in Energie war für die meisten Zivilisationen schon immer ein Traum."
  
  tech_building_vfb_fusion_complex_b:0 "Isokline Einspeisenetzwerke"
  tech_building_vfb_fusion_complex_b_desc:0 "Einen riesigen Tunnel zu haben, um Dinge hineinzuwerfen, und sie dann einzeln hineinzuworfen, klingt unglaublich langweilig."
  
  tech_building_vfb_plastic_plant:0 "Kunststoffnutzungen"
  tech_building_vfb_plastic_plant_desc:0 "Während der Verzicht auf Kunststoff vor Jahrhunderten entscheidend dafür war, dass unsere Heimatwelt nicht zu einer Tomb World wurde - falls sie es nicht schon ist - werden Polymerisationen, die nicht aus Erdölchemikalien stammen, sondern aus Erzeugnissen, in unserer Zivilisation ihre Verwendung finden. Wichtig ist, dass sie viel schneller und entscheidend biologisch abbaubar sind."
  
  tech_building_vfb_plastic_facility_b:0 "Dedizierte De-Polymerisationsanlagen"
  tech_building_vfb_plastic_facility_b_desc:0 "Einige Zucker sind schwer zu knacken. Bewahren Sie sie einfach irgendwo in einem Fass auf, bis wir uns etwas einfallen lassen."
  
  tech_building_vfb_siderurgy:0 "Neo-Siderurgie"
  tech_building_vfb_siderurgy_desc:0 "Die Stahlbearbeitung wurde vor vielen Jahren zugunsten besserer Legierungen aufgegeben, aber unsere alte Praxis, Wärme und rohes Eisen zu konzentrieren, um so viel Stahl wie möglich zu gewinnen, hat immer noch ihre Lehren."
  
  tech_building_vfb_lyceum:0 "Neo-Philosophie"
  tech_building_vfb_lyceum_desc:0 "Die 'Liebe zur Weisheit' trieb unsere Vorfahren zur wissenschaftlichen Methode und schließlich zu den Sternen. Heute sind abstrakte Spekulation und das Verknüpfen von Wissen mit Empirie verloren gegangen. Oder etwa doch nicht?"
  
  tech_building_vfb_museum:0 "Dynamische Archive"
  tech_building_vfb_museum_desc:0 "Durch die Integration von Daten, das Querverweisen von Informationen und die Bereitstellung einfacher Kommunikationsmethoden für unsere Feldwissenschaftler mit ihren planetaren Forschern können wir eine viel effizientere, selbstverwirklichende und vollständige Artefakt-Datenbank aufbauen."
  
  tech_building_vfb_constructor:0 "Vorlagen-Universalisierung"
  tech_building_vfb_constructor_desc:0 "Während Kreativität uns sicherlich hierher gebracht hat, kam sie nicht mit vielen von uns."
  
  tech_building_vfb_administration:0 "Die Politik der Verwaltung"
  tech_building_vfb_administration_desc:0 "Das ist doch das Wahlkreis des Premierministers, oder?\n\nOh schau, ein Park!"
  
  tech_building_vfb_dockyard:0 "Geschichtete Andockeinrichtungen"
  tech_building_vfb_dockyard_desc:0 "Unsere Stellaren Werften und Interstellaren Häfen sind großartige Beispiele für Ingenieurskunst und administrative Genialität. Wie bei jedem großen Projekt, unabhängig von dem, werden sie überlastet sein von wachsenden Dock- und Reparaturaufträgen, die wertvolle Zeit und Platz von den Hauptkreisbuchten der Werften und Häfen abziehen. Die Anpassung der aktuellen Einrichtungen für eine doppelte Ebenenbelegung, um frei schwebende, wechselnde Raumfahrzeugbuchten unterzubringen, wird die gleichzeitige Andock-, Reparatur-, Konstruktions- und Lagerfähigkeit von Raumschiffen erhöhen.
  
  decision_vfb_buildspeed_m:0 "Pionierfronten organisieren"
  decision_vfb_buildspeed_m_desc:0 "Die Stellaren Werften haben den logistischen Zustrom von Gütern und Menschen zu und von unseren am stärksten besiedelten Planeten sowie interplanetare Reisen erleichtert. Mit den richtigen administrativen Entscheidungen können wir sie darauf ausrichten, die massiven Aufgaben der Kolonisierung neuer Welten zu unterstützen. Durch die Umleitung ihres Personals und ihrer Einrichtungen auf Bauvorlagen und Materialempfang, die Widmung von Buchten für Einwanderung und Gesundheitsmanagement und die Nutzung verbleibender Schiffsandocks als Montagelinien wird der Prozess der effektiven Besiedlung beschleunigt, obwohl die Einrichtung dadurch nicht mehr in der Lage ist, ihre üblichen Aufgaben mit normaler Leistung zu erfüllen."
  vfb_buildspeed_m:0 "Organisierte Pionierarbeit"
  vfb_buildspeed_m_desc:0 "Unsere Werften sind darauf ausgerichtet, Einwanderer zu empfangen, Roboter zu montieren, Gesundheitsversorgung bereitzustellen und bei der infrastrukturellen Konstruktion zu helfen, was erhebliche logistische, administrative und produktive Belastungen mit sich bringt."
  pm_vfb_buildspeed_m:0 "Organisierte Pionierarbeit"
  pm_vfb_buildspeed_m_desc:0 "Unsere Werften sind darauf ausgerichtet, Einwanderer zu empfangen, Roboter zu montieren, Gesundheitsversorgung bereitzustellen und bei der infrastrukturellen Konstruktion zu helfen, was erhebliche administrative Belastungen mit sich bringt."

  mod_planet_engineers_minerals_produces_mult:0 "$minerals_with_icon$ von £job_engineer£ $job_engineer_plural$"
  mod_planet_physicists_energy_produces_mult:0 "$energy_with_icon$ von £job_physicist£ $job_physicist_plural$"
