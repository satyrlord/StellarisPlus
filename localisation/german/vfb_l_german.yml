  tech_building_vfb_plastic_facility_c:0 "Aerosol-Destillationstechniken"
  tech_building_vfb_plastic_facility_c_desc:0 "Wir haben eine Methode entwickelt, um eine Synthese von Zro-ähnlichen Verbindungen zu fabrizieren, indem wir die Niederdruck-Saccharideseparationstechniken nutzen. Durch Aerosolansammlung und fortgeschrittene Destillationstechniken extrahieren diese Einrichtungen wertvolle Verbindungen auf Kosten von reduzierter Effizienz und erhöhter Abfallproduktion."

  tech_building_vfb_plastic_facility_d:0 "Kognitohazard-Induktionstechniken"
  tech_building_vfb_plastic_facility_d_desc:0 "Mit einem neuen, völlig surrealen Ansatz für die Planung der Eingabe-zu-Verarbeitung bei Naniten ist es möglich, komplexe Biomasse-Ausrichtungen zu induzieren, um die Replikationspfade der Naniten auszunutzen, was eine kontrollierte Chargenproduktion von Naniten ermöglicht. Dieser fortschrittliche Prozess erfordert ein präzises Biomasse-Management und sorgfältige Aufsicht, um die Stabilität zu gewährleisten."

  tech_building_vfb_fusion_complex_c:0 "Tangentiale Primakoff-Techniken"
  tech_building_vfb_fusion_complex_c_desc:0 "Es ist möglich, Dunkle Materie herzustellen und zu ernten, indem man die extremen Bedingungen simuliert, die in der Nähe von schwarzen Löchern herrschen. Dieser Prozess ermöglicht es, dieses schwer fassbare Material durch fortschrittliche Photonmanipulation und Gluonfeldresonanz zu extrahieren, obwohl er ressourcenintensiv ist."

  tech_building_vfb_asteroid_hub_c:0 "Ultrapneumatische Einspritztechniken"
  tech_building_vfb_asteroid_hub_c_desc:0 "Wir können spezialisierte Einrichtungen bauen, die dazu bestimmt sind, lebendes Metall herzustellen, indem sie makro-atomare Strukturen unter extremen Bedingungen zerlegen. Dieser Prozess liefert, obwohl kostspielig, einen stetigen Nachschub dieses seltenen und wertvollen Rohstoffs, der für fortgeschrittene Konstruktionen und Forschungen entscheidend ist."

  bombardment_vfb_kinectic:0 "Kinektisch"
  bombardment_vfb_kinectic_desc:3 "Kinektischer Bombardement setzt Traktorstrahltechnologie ein, um Asteroiden in Kollisionsrouten für feindliche Planeten zu ziehen.\n- §RMassive§! Schäden an §YArmeen§!\n- §RMassive§! Schäden an §YPlaneten§!\n- §RGargantuan§! Schäden an §YPops (200-400/m)§!\n- Wird ungeschützte Planeten bombardieren\n- Kann Planeten zu leblosen Tomb Worlds reduzieren\n- Die Bombardierung endet, wenn der Bodenkrieg beginnt"
  orbital_bombardment_vfb_kinectic:0 "Kinektisches Bombardement"
  orbital_bombardment_vfb_kinectic_desc:1 "Kinektischer Bombardement setzt Traktorstrahltechnologie ein, um Asteroiden in Kollisionsrouten für feindliche Planeten zu ziehen.\n- §RMassive§! Schäden an §YArmeen§!\n- §RMassive§! Schäden an §YPlaneten§!\n- §RGargantuan§! Schäden an §YPops (200-400/m)§!\n- Wird ungeschützte Planeten bombardieren\n- Kann Planeten zu leblosen Tomb Worlds reduzieren\n- Die Bombardierung endet, wenn der Bodenkrieg beginnt"
  orbital_bombardment_vfb_kinectic_name:0 "Kinektisches Bombardement"
  tech_building_vfb_asteroid_station_tooltip:0 "Schaltet die §YKinektisches Bombardement§! Haltung frei"