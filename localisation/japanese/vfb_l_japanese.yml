 tech_building_vfb_plastic_facility_c:0 "Aerosol Distillation Techniques"
 tech_building_vfb_plastic_facility_c_desc:0 "We have developed a way to fabricate a synthesis of Zro-like compounds by leveraging low-pressure Saccharide Separation networks. Through aerosol accumulation and advanced distillation techniques, these facilities extract valuable compounds at the cost of reduced efficiency and increased waste generation."

 tech_building_vfb_plastic_facility_d:0 "Cognitohazard Induction Techniques"
 tech_building_vfb_plastic_facility_d_desc:0 "With a new, completely surreal approach to input-to-processing planning in nanites, it's possible to induce intricate biomatter alignment to exploit nanite replication pathways, enabling controlled batch production of nanites. This advanced process demands precise biomatter management and careful oversight to ensure stability."

 tech_building_vfb_fusion_complex_c:0 "Tangential Primakoff Techniques"
 tech_building_vfb_fusion_complex_c_desc:0 "It's possible to manufacture and harvest Dark Matter by simulating the extreme conditions found near black holes. This process, while resource-intensive, allows for the extraction of this elusive material through advanced photon manipulation and gluon-field resonance."

 tech_building_vfb_asteroid_hub_c:0 "Ultrapneumatic Injection Techniques"
 tech_building_vfb_asteroid_hub_c_desc:0 "We can build specialized facilities designed to produce Living Metal by breaking down macro-atomic structures under extreme conditions. This process, though costly, provides a steady supply of this rare and valuable resource, essential for advanced construction and research."

 bombardment_vfb_kinectic:0 "Kinectic"
 bombardment_vfb_kinectic_desc:3 "Kinectic Bombardment employs tractor beam technology to drag asteroids into collision routes bound for hostile planets.\n- §RMassive§! damage to §YArmies§!\n- §RMassive§! damage to §YPlanet§!\n- §RGargantuan§! damage to §YPops (200-400/m)§!\n- Will bombard undefended planets\n- Can reduce planets to lifeless Tomb Worlds\n- Bombardment will cease when ground combat starts"
