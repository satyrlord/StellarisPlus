l_japanese:
 
 building_vfb_wharf:0 "Stellar Wharf"
 building_vfb_wharf_desc:0 "While normal colonies rely on trans-orbital transport and disassembled ship pioneering, we can go one step further on planets of higher strategic importance. Stellar Wharfs are massive structures designed to lower fuel consumption of ships, facilitate the operation of outer-orbit ships, monitor space, centralize naval anchorage, and headquarter planetary customs offices. Bridging outer-orbital and intra-orbital space, they serve as docks for spacecraft and docking bays for production fluxes. Acting as both an air control tower and the airfield itself, the Stellar Wharf also concentrates all atmospheric intrusions into our planet."
 
 building_vfb_harbor:0 "Interstellar Harbor"
 building_vfb_harbor_desc:0 "The exponential growth of our planetary infrastructure, trade, production, and resource flux has rendered our Stellar Wharfs outdated. No longer are we focused solely on monitoring atmospheric intrusions; our responsibilities have expanded to aiding our Stations in managing the outer-space economy, which has become so profitable and rich. The Interstellar Harbor consists of a series of orbital expansions to our already significant vertical infrastructure. Standard docking protocols, Station-Planet public transport, escort and rapid response flotilla deployments, advanced healthcare unavailable on stations, and serving as a backup to coordinate in-system spacecraft are some of its new responsibilities. Like Wharfs, our Harbors bridge outer-intra orbital transport, connecting all local station-planet flux."
 
 building_vfb_workshop:0 "Modular Workshops"
 building_vfb_workshop_desc:0 "Equipped with forges, printers, and templates, a Modular Workshop meets any colonist's special needs and provides all equipment and repair material quotas. Surplus production can also be exported."
 
 building_vfb_logistichub:0 "Central Logistical Hubs"
 building_vfb_logistichub_desc:0 "These great terminals connect and control a planetary network of Hyperloops and Maglevs, quickly distributing supplies wherever needed and ensuring all our production centers operate at maximum efficiency. The Central Logistics Hubs also regulate most sub-orbital airborne cargo transports and connect our ever-expanding planetary network of solar harvesters, nutrient replicators, and ore extractors, ensuring no surplus energy, minerals, or food is wasted."
 
 building_vfb_orbitalhub:0 "Integrated Orbital Hubs"
 building_vfb_orbitalhub_desc:0 "Building on the existing infrastructure of our Interstellar Harbors, the Integrated Orbital Hubs expand on their predecessors' mission of maximizing transport protocol efficiency by harnessing planetary rotation's momentum. Besides optimizing these protocols, this endeavor centralizes our planetary power grids, mineral purification installations, and food processing centers, increasing raw and refined resource output while significantly reducing waste. However, this will be horrendously expensive."
 
 building_vfb_plaza:0 "Civic Plazas"
 building_vfb_plaza_desc:0 "While we had millennia to develop public infrastructure on our homeworld, our colonies lack this luxury. Our new planets urgently need a central government presence but don't have the time for it to develop naturally. Civic Plazas concentrate the welfare and administrative duties of the state in planet-side central facilities, delicately organized to ensure maximum efficiency of public services. These buildings house the planetary Gendarmes, sanitary provisions, public works departments, and the Civil Service to ensure security, healthcare, infrastructure, and stability for all citizens simultaneously."
 
 building_vfb_manufactory:0 "Manufacturing Complexes"
 building_vfb_manufactory_desc:0 "These great production centers amalgamate 3D printers, forges, docking bays, raw material deposits, construction templates, and other manufacturing necessities. Open to all, a Manufacturing Complex allows citizens to create whatever their homes need and their docks require, on their own planets and by their own - or specialists' - hands, promising to replace our homeworld's traditional industry."
 
 building_vfb_residence:0 "Structural Residences"
 building_vfb_residence_desc:0 "The great arches and alloy walls of our habitats provide ample space for houses to be built."
 
 building_vfb_refinery:0 "Refinery Stations"
 building_vfb_refinery_desc:0 "Now that we understand the potential of rare resources, we should concentrate their production in dedicated Refinery Stations to ensure all colonies have access to local supplies of these valuable goods."
 
 building_vfb_resort:0 "Paradise Resorts"
 building_vfb_resort_desc:0 "While our empire can usually finance only a single resort world, we can help establish large-sized resorts on many planets to provide tourists with entertainment, excellent food, and engaging cultural and leisure activities."
 
 building_vfb_preserve:0 "Sanctuary Hubs"
 building_vfb_preserve_desc:0 "Increasing urbanization and emerging economic prosperity have put our planets' ecosystems in great danger. Protecting natural wildlife, regardless of how extraordinary native fauna and flora are, and even installing zoos to safeguard the ecosystems of our more developed colonies, will keep our conscience clean, ensure no ecosystem in any colony goes permanently extinct, and provide valuable insights into xeno wildlife."
 
 building_vfb_siderurgy:0 "Tetra-Siderurgies"
 building_vfb_siderurgy_desc:0 "The Tetra-Siderurgy is an advanced smelting and processing hub that connects smaller Alloyworks, concentrating their material influx and thermal generators, to our Alloy Forges. This allows for the creation of vast amounts of valuable metal components with relatively few staff and less material expenditure and waste, albeit at a high energy cost. The more forges we have on planets with this installation, the more intense the smelters are, and the more resources we produce.\n\n§YMetallurgist output stacks for every Alloy Foundry or equivalent upgrade built, up to 5.§!"
 
 building_vfb_asteroid_station:0 "Circumstellar Causeway"
 building_vfb_asteroid_station_desc:0 "By re-routing and fragmenting circumstellar matter in outer space and bringing it to our planetary orbits, we can harness massive amounts of much-needed materials without harming our surfaces' crusts. It's a costly and risky endeavor, still."
 building_vfb_asteroid_hub:0 "Circumstellar Causeway Array"
 building_vfb_asteroid_hub_desc:0 "By re-routing and fragmenting circumstellar matter in outer space and bringing it to our planetary orbits, we can harness massive amounts of much-needed materials without harming our surfaces' crusts. It's a costly and risky endeavor, still.\n\n§YThis upgraded installation accommodates additional prospector-spacecraft bays and can be fitted with Meteorite Mills for even more product output.§!"
 building_vfb_asteroid_hub_b:0 "Meteorite Mills" 
 building_vfb_asteroid_hub_b_desc:0 "These extension facilities to the Circumstellar Matter Docks refine grounded meteorites. Their installations relieve our dock teams from this duty, allowing them to focus better on important outer-orbital tasks, mainly asteroid retrieval. Additionally, grounded teams have more time to sift through their resources and maximize what their sky fellows bring. \n\n§BRequires a Circumstellar Causeway Array to be built.§!"
 building_vfb_asteroid_hub_c:0 "Lattice Liquidator"
 building_vfb_asteroid_hub_c_desc:0 "Lattice Liquidators are facilities built alongside our Circumstellar Causeway Array to create and harvest Living Metal. Using current living metal samples as starters, we subject massive amounts of matter to extreme pressure and temperature, breaking down their macro-atomic structures and liquefying their lattices. Subjected to similar pressures, our Living Metal starters expand outward, integrating this de-latticized matter into their structure. This requires a delicate balance of metallic elements in the total composition and yields relatively small amounts of Living Metal surplus compared to the initial matter investment.\n\n§BRequires at least one Meteorite Mill to be built.§!"

 building_vfb_fusion_plant:0 "Beta Bridge"
 building_vfb_fusion_plant_desc:0 "While our matter-to-energy converting technology isn't nearly as efficient as it's predicted to be, we can already do so by colliding nuclei at great speeds and exciting heat recycling cells with the resulting thermal energy released. Differently from Fusion-powered plants, this process - Beta Harvesting - does not put out any remaining solid matter, being then much more efficient. It'll produce a reasonable amount of power, at the cost of a reasonable amount of matter to perform beta collisions on."
 building_vfb_fusion_complex:0 "Beta Bridging Array"
 building_vfb_fusion_complex_desc:0 "While our matter-to-energy converting technology isn't nearly as efficient as it's predicted to be, we can already do so by colliding nuclei at great speeds and exciting heat recycling cells with the resulting thermal energy released. Differently from Fusion-powered plants, this process - Beta Harvesting - does not put out any remaining solid matter, being then much more efficient. It'll produce a reasonable amount of power, at the cost of a reasonable amount of matter to perform beta collisions on.\n\n§YThis upgraded installation accommodates additional colliders, and can be fitted with Thermal Transformers for even more product output.§!"
 building_vfb_fusion_complex_b:0 "Thermal Transformers"
 building_vfb_fusion_complex_b_desc:0 "These extension facilities to the Beta Tunnel Arrays, installed around the great leaps of the Tunnels, add many physical matter insertion points - similar to Synchrotrons - around the arrays and establish a network of Thermal Recycling Stations, allowing for an increase in efficiency and volume of energy production activity through heat recycling.\n\n§BRequires a Beta Bridging Array to be built.§!"
 building_vfb_fusion_complex_c:0 "Resonant Revetment"
  building_vfb_fusion_complex_c_desc:0 "Resonant Revetments (sic, not Revestment, but Revetment) are optional modifications to our Beta Bridging Arrays that allow for the creation and harvesting of Dark Matter. Through our current infrastructure we can accelerate, breed and inject photons into a secondary loop of bridges, separated from their main matter colliders through magnectically-active, nucleii-dense revetments. From these energy field on these revetments the photons transmute to axions, a low-mass, low-energy, chromodinamically active particle that can be bundled and processed at Dark Matter Reactors. In order to avoid these axions from instantly decaying back into photons and energy, which would generate a violent expansion of thermal energy, we sift them through a gluon-field until a resonant chamber. This is how Dark Matter is currently extracted at the accretion disks of black holes, where they simulate this effect through their own rotational inertia and matter collisions near their Event Horizons. Needless to mention this is very energy and resource intensive. This will also force is to bring our Beta Bridge safety thresholds to more strict parameters, reducing their operational efficiency.\n\n§BRequires at least one Thermal Transformer to be built.§!"
 
 building_vfb_plastic_plant:0 "Polymer Palletizer"
 building_vfb_plastic_plant_desc:0 "Our reliance on ground-extracted soil-damaging minerals has always been an issue in our efforts for environmental preservation and resource-output quotas. Our Agro-engineers have recently come up with a solution; Based on our former usage on Petroleum-based solid products, new compositions of Bio-Plastics would be an efficient replacement of extracted minerals for producing alloy sheets and consumer goods. Completely eco-friendly, naturally degradable and omni-recyclable, waste biomatter from the refining processes of said Bio-Plastics will also be enriched into Methanol, Ethanol and other fuel alternatives for our colonies."
 building_vfb_plastic_facility:0 "Polymer Palletization Array"
 building_vfb_plastic_facility_desc:0 "Optimizations in synthesizing, molding and recycling biomatter and Bio-Plastics have opened a new frontier for our raw goods market. By dispering our Polymerization Facility into local plants we can ensure most colonial communities have a clean and efficient alternative for extracted-mineral constructed Consumer Goods.\n\n§YThis upgraded installation accommodates additional sugar repurposers, and can be fitted with Saccharide Separators for even more product output.§Y!"
 building_vfb_plastic_facility_b:0 "Saccharide Separators"
 building_vfb_plastic_facility_b_desc:0 "Certain molecular arrangements are chemically easier for organic processes to construct sugars through. Yet, these compounds require more labour for our Polymerization Plants to decompose. By routing the stages of bioprocessing exclusive to those widely availiable but tough to crack carbohydrates to separate facilities, we can dedicate our main facility exclusively for those stages that are common in all decomposition processes, increasing the volume of biomatter processed simultaneously.\n\n§BRequires a Polymer Palletization Array to be built.§!"

 building_vfb_plastic_facility_c:0 "Drag Distiller"
 building_vfb_plastic_facility_c_desc:0 "Drag Distillers are optional modifications to our Saccharide Separation network. Usually, the high-pressure inside the separation vats aid in the proccess for carbon breakdown, accelerating saccharide composition towards useable, re-polymerizeable matter. Yet, by connecting these vats amongst themselves in lower-pressure conditions, and introducing some artifical airflow, we can induce the accumulation of aerosols originated from the decomposition of said saccharides, and then force their precipitation through dragging them through fine distillers. After this progress, we can continue a multiple of distillation processes in this aerosol until reaching a combination of compounds similar to that found in extracted Zro. This, of course, significantly reduces the efficiency of the saccharide separation proccess, and generates additional waste. \n\n§BRequires at least one Saccharide Separator to be built.§!"
 building_vfb_plastic_facility_d:0 "Neonate Nomogram"
 building_vfb_plastic_facility_d_desc:0 "Neonate Nomographs are optional facilities that operate by finely aligning biomatter within a grid of complex patterns, physically and in its genetic material. Considering that Nanites are machines, which gather and process physical input from the world we can, through these patterns, exploit backdoors in their input-to-processing interface to install a backdoor access in a single nanite, and then force it to breed a batch through self-replication. The catch is that we can only initiate a breeding cycle based on feeding on the same biomatter, meaning we need to work in batches rather than allow them to consume matter unguarded and uncerimoniously \n\n§BRequires at least one Saccharide Separator to be built.§!"

 building_vfb_lyceum:0 "Lyceum"
 building_vfb_lyceum_desc:0 "While Academia and Research Facilities are spread around our citizen planets, as a general rule, these centres of learning are too disperse and too focused on their research to work together and provide insights into each other's work. By inter-linking these intelectual nucleii - wherever they're relevant - through informational infrastructure we will not only quicken research by emergence, but provide additional opportunities - seen that this network requires physical infrastructure - for archivists, professors and even phisolophers to work confortably in a dedicated space; the Lyceum. \n\n§YResearcher output stacks for every Research Lab or equivalent upgrade built, up to 5.§!"
 
 building_vfb_museum:0 "Museum"
 building_vfb_museum_desc:0 "The expansion of planetary academia in the form of the Lyceum - and the educational capabilities it concentrates - has turn his planet into a nucleii for innovation and knowledge. As we expand across we galaxy, finding ever more Artifacts and wonders of older ages, we realise you much of a waste is it just to explore them in the field and store them away afterwards. There's a lot to be learn just from analysis, and we can draw deeper conclusions from these items by dedicating research personel in archaeological investigation facilities. We can even open less groundbreaking discoveries for the public to see!.\n\n§YDiscovers Minor Artifacts while costing Research Points§!"
 
 building_vfb_base:0 "Polar Worksite"
 building_vfb_base_desc:0 "To turn a lush (or barren, for that matter) wildland into a center for production and the subsequent advancement of our civilization requires major infrastructural investment. If we are to build grand structures to harbour our resource acquisition and managment projects we ought to make grand yard to accrue them on. Unfortunately, the execution of grand projects is made nigh impossible by most planets' gravitational pull and rotation, which create adverse conditions for construction and maintainance outside regions close to the poles. Fortunately, the poles are where most trans-planetary geosynchronous infrastructure is built. \n\n§YAllows for the construction of multiple buildings as upgrades.§!\n\n§GThe following buildings can be built as upgrades to this Worksite:\n\n - Beta Bridge\n - Circumstellar Causeway\n - Polymer Palletizer\n - Central Logistical Hubs\n - Integrated Orbital Hubs\n - Tetra-Siderurgies\n - Lyceum\n - Sanctuary Hubs\n - Paradise Resorts\n - Atelier\n - Museum\n - Civil Service§!"

 
 building_vfb_constructor:0 "Atelier"
 building_vfb_constructor_desc:0 "The decentralization and adoption of modern industrial techniques for the production of most—if not all—of our empire's consumer goods has been an unquestionable success. However, leaving the task of designing prototypes to our on-site manufacturers has led to inefficiencies with redundant designs. The Atelier creates blueprints for our most desired products and frees up space in high-demand sites for increased production. \n\n §YArtisan output stacks for every Civilian Factory or equivalent upgrade built, up to 5.§!"
  
 building_vfb_administration:0 "Civil Service"
 building_vfb_administration_desc:0 "The burden of public administration is certainly not an easy one to bear. Our space expansion has seen some degree of decentralization in this regard. However, what we've gained in flexibility, we have lost in coordination. A dedicated office interlinking the many departmental commissions, local administrative parks, and elected—or imposed—leadership will surely enhance the stability and efficiency of the government, albeit at the cost of more paychecks and an even more influential bureaucracy.\n\n§YBureaucrat output stacks for every Bureaucratic building or upgrades built, up to 5.§!"
 
 building_vfb_dockyard:0 "Sidereal Bays"
 building_vfb_dockyard_desc:0 "These alternating, free-floating, merry-go-rounding bays expand docking space in Stellar Wharfs and Interstellar Harbors without major infraestructural expansions. They are low-cost, low-importance, and highly disposable.\n\n§BRequires the Stellar Wharf or the Interstellar Harbor to be built§!\n\n§YEffects scale up with higher requirement building levels.§!"
 
 job_vfb_accretion_drone:0 "Supplementary Drone"
 job_vfb_accretion_drone_plural:0 "Supplementary Drones"
 job_vfb_accretion_drone_desc:0 "Supplementary Drones are the designation for our grouped, miscellaneous units and detachments. Flexible in their purpose, they coordinate minor field operations, prospect, pioneer, act as sappers for the expansion of our consciousness, and maintain planet-side operations running smoothly."
 job_vfb_accretion_drone_effect_desc:0 "£job_vfb_accretion_drone£ $job_vfb_accretion_drone_plural$ fulfill various supplementary functions."
 mod_job_vfb_accretion_drone_add:0 "$job_vfb_accretion_drone$ Jobs"
 mod_job_vfb_accretion_drone_per_pop:0 "§G+1§! $job_vfb_accretion_drone$ Job per $VALUE$ Pops"
 mod_job_vfb_accretion_drone_per_pop_short:0 "\n§G+1§! £mod_job_vfb_accretion_drone_add£ per $VALUE$ £pop£"

 vfb.1:0 "VF's Buildings is §Gactive§!"
 vfb.1.name:0 "VF's Buildings is §Gactive§!"
 vfb.1.desc:0 "§YGreat to see you here! Thank you for subscribing to and installing VF's Buildings!§! This is pretty much here to tell the game (and you) that this mod is up and running!\n\nAnyway, have a great Xeno cleansing/befriending/both. All the best!"
 vfb.1.a:0 "§B(No Starting Techs at all)§! Cool!"
 vfb.1.a.tooltip:0 "Cool! Have fun I guess."
 vfb.1.b:0 "§Y(All Starting Techs)§! Hey, while I'm here, could you give me and the galaxy the §Btechs§!?"
 vfb.1.b.tooltip:0 "Sure, knock yourself out, champ.\n\n§YEvery empire in the Galaxy will be able to start building all the mod's buildings right away.§!"
 vfb.1.c:0 "§G(Just Armory - Recommended)§! I think only the Armory should be available at the beginning."
 vfb.1.c.tooltip:0 "This will make the Armory the only building available at the start of the game, and will allow you to build it right away.\n\n§YThis is the recommended option for a more balanced experience.§!"
 vfb.1.d:0 "§R(Skip Customization)§!By the way, can we not have any customization events right now? I just want to play the game."
 vfb.1.d.tooltip:0 "This option will not fire any customization event, so you won't be able to change the limits of the mod's buildings. If you want to customize anything later on, just type 'event vfb.2' into the console and the three customizations will be available again."

 vfb.2:0 "(VFB)  Set Polar Capacity"
 vfb.2.name:0 "(VFB) Set Polar Capacity"
 vfb.2.desc:0 "§YBefore you go§!, you have the option of how many Polar Worksite evolutions you can build per planet. This can get crazy, as Polar Worksite evolutions are designed to be ultimate planetary specializations, so don't get angry if 2 isn't balanced, but it will probably be fun.\n\nOh, this decision is permanent and affects the AI!"
 vfb.2.a:0 "§G(Intended Experience)§! Keep is as one per planet!"
 vfb.2.a.tooltip:0 "This option keeps your Planetary Limit for main builds at 1. This is the intended experience, and it is recommended for a more balanced game."
 vfb.2.b:0 "§Y(Potentially Unbalanced)§! Well, every planet does have two poles... Right?"
 vfb.2.b.tooltip:0 "This option bumps your Planetary Limit for main builds to 2. This is very fun. You still won't be able to build two of the same building, it would just break everything up."
 vfb.2.c:0 "§R(Legacy Colonial Version)§! Actually, I just want the small buildings. No Polar Worksites."
 vfb.2.c.tooltip:0 "VFB started as a mod to add two small buildings, the Armory and the Workshop, to make the first years where you have a lot of unproductive recently-colonized planets easier. With this, you'll be able to build both, the Refinery, and the Wharf in its two evolutions. In case you might want it, here you go!"

 vfb.3:0 "(VFB) Set Polar Empire Limit"
 vfb.3.name:0 "(VFB) Set Polar Empire Limit"
 vfb.3.desc:0 "§YOh, just another thing§!, you have the option of how many Polar Worksite evolutions you can build per empire. Why? A lot of people are requesting this. I personally dislike this option, but well, I'm a man of the people.\n\n This is also permanent and affects the AI!"
 vfb.3.a:0 "§G(Intended Experience)§! No limits!"
 vfb.3.a.tooltip:0 "By selecting this you'll still be able to build as many Polar Worksites and their evolutions as you want in total. This is the intended experience."
 vfb.3.b:0 "§Y(1)§! 1 Polar Worksites per Empire."
 vfb.3.b.tooltip:0 "By selecting this you'll be able to build up to 1 Polar Worksites and their evolutions in total."
 vfb.3.c:0 "§Y(2)§! 2 Polar Worksites per Empire."
 vfb.3.c.tooltip:0 "By selecting this you'll be able to build up to 2 Polar Worksites and their evolutions in total."
 vfb.3.d:0 "§Y(3)§! 3 Polar Worksites per Empire."
 vfb.3.d.tooltip:0 "By selecting this you'll be able to build up to 3 Polar Worksites and their evolutions in total."
 vfb.3.e:0 "§Y(5)§! 5 Polar Worksites per Empire."
 vfb.3.e.tooltip:0 "By selecting this you'll be able to build up to 5 Polar Worksites and their evolutions in total."
 vfb.3.f:0 "§Y(10)§! 10 Polar Worksites per Empire."
 vfb.3.f.tooltip:0 "By selecting this you'll be able to build up to 10 Polar Worksites and their evolutions in total."

 vfb.4:0 "(VFB) Set Resource Add-On Limit"
 vfb.4.name:0 "(VFB) Set Resource Add-On Limit"
 vfb.4.desc:0 "§YI swear I'm almost done§!, you have the option of how many Resource Add-Ons you can build per planet. This can get pretty crazy pretty quick, but I now I learned how to code these limits and I'm having fun with it. 2 for basic resources and 1 for advanced resources is what you are used to if you have played this mod before, but I think most people would say 1-1 is more balanced. I personally play with 3-2.!\n\nThis is the build limit per planet for the Meteorite Mills, Thermal Transformers and Saccharide Separators (basic resources), Neonate Nomograms, Drag Distillers, Lattice Liquidators and Resonant Revetments (advanced resources). This is also permanent and affects the AI!"
 vfb.4.a:0 "§Y(Most Balanced)§! 1-1, 1 basic resource and 1 advanced resource per planet."
 vfb.4.a.tooltip:0 "This is the most boring option, and the one I recommend if you're more of a serious player. It allows you to build 1 Meteorite Mill, 1 Thermal Transformer or 1 Saccharide Separator, and 1 Neonate Nomogram, 1 Drag Distiller, 1 Lattice Liquidator and 1 Resonant Revetment per planet."
 vfb.4.b:0 "§G(Recommended)§! 2-1, 2 basic resources and 1 advanced resource per planet."
 vfb.4.b.tooltip:0 "This is the recommended option in regards to how I envison how the economy should work in Stellaris. It allows you to build 2 Meteorite Mills, 2 Thermal Transformers or 2 Saccharide Separators, and 1 Neonate Nomograms, 1 Drag Distillers, 1 Lattice Liquidators or 1 Resonant Revetments per planet."
 vfb.4.c:0 "§R(Most Fun)§! 3-2, 3 basic resources and 2 advanced resources per planet."
 vfb.4.c.tooltip:0 "This is the most fun option, and the one I recommend if you're more of a casual player, want to take on FEs quickly or are playing one of those mods that you have to use Dark Matter for everything. It allows you to build 3 Meteorite Mills, 3 Thermal Transformers or 3 Saccharide Separators, and 2 Neonate Nomograms, 2 Drag Distillers, 2 Lattice Liquidators or 2 Resonant Revetments per planet."

 tech_building_vfb_base:0 "Geosynchronous Engineering"
 tech_building_vfb_base_desc:0 "To face the challenges of the Space Age, our civilization must undertake great projects which, due to their grandeur, require more than ground-level mechanics to succeed."
 
 tech_building_vfb_armory:0 "Colonial Pioneering"
 tech_building_vfb_armory_desc:0 "Equipping armored facilities with medical, research, and personal-defense equipment, while training colonists in their use, will accelerate and improve the process of planetary occupation. Importantly, we also need to add local manufacturing facilities to ensure that our colonists can produce the necessary equipment and supplies on-site. Ideally, we want to eliminate reliance on distant supply chains for early colonies, save for strategic or inhospitable planets."

 tech_building_vfb_workshop:0 "On-Demand Production"
 tech_building_vfb_workshop_desc:0 "Producing an excessive amount of goods, hoping to liquidate stocks and often failing to do so, is absurdly inefficient. Advances in template technologies make on-demand artisanry remarkably faster, materially cheaper, cleaner, and more efficient."
 
 tech_building_vfb_harbor:0 "Solar Portuary Authority"
 tech_building_vfb_harbor_desc:0 "Our economy's exponential growth requires ever-expanding infrastructural and administrative innovations."
 
 tech_building_vfb_logistichub:0 "Centralized Distribution"
 tech_building_vfb_logistichub_desc:0 "'Extraction, Processing, Manufacturing, and Consumption' is an immensely complex chain. We can make it a bit more organized."
 
 tech_building_vfb_orbitalhub:0 "Trans-Orbital Logistics"
 tech_building_vfb_orbitalhub_desc:0 "Haulage. In space."
 
 tech_building_vfb_refinery:0 "Concentrated Refinement Installations"
 tech_building_vfb_refinery_desc:0 "Now that we've mastered strategic resource synthesis technologies, we've realized we don't need as many buildings to make it work."
 
 tech_building_vfb_resort:0 "Epicurean Logic"
 tech_building_vfb_resort_desc:0 "A satisfied populace is a productive populace. It's far from Hedonism, per se, but we're not monsters."
 
 tech_building_vfb_preserve:0 "Bio-Habitats"
 tech_building_vfb_preserve_desc:0 "It's our duty to protect native flora and fauna, but this doesn't mean we shouldn't colonize at all."
 
 tech_building_vfb_asteroid_station:0 "Space Prospecting"
 tech_building_vfb_asteroid_station_desc:0 "Asteroids and miscellaneous circumstellar matter are incredibly resource-rich. Parking them on our planets instead of mining them in space allows us to recycle and better distribute these minerals."
 
 tech_building_vfb_asteroid_hub_b:0 "Processing Protocol Revisions"
 tech_building_vfb_asteroid_hub_b_desc:0 "Significant advances in milling technology mean every single gram is valuable. Well, not literally, but we can probably find some uses for them."
 
 tech_building_vfb_fusion_plant:0 "Entropic Dynamos"
 tech_building_vfb_fusion_plant_desc:0 "The efficient conversion of inorganic matter to energy has always been a dream for most civilizations."
 
 tech_building_vfb_fusion_complex_b:0 "Isocentric Insertion Networks"
 tech_building_vfb_fusion_complex_b_desc:0 "Having a huge tunnel for throwing things at and just throwing them one at a time sounds incredibly boring."
 
 tech_building_vfb_plastic_plant:0 "Plastic Utilities"
 tech_building_vfb_plastic_plant_desc:0 "While abandoning plastic centuries ago was instrumental in preventing our homeworld from becoming a Tomb World—if it hasn't already—polymerizations not derived from petrochemicals but from produce will have their uses in our civilization. What matters is that they decay much faster and, crucially, at all."
 
 tech_building_vfb_plastic_facility_b:0 "Dedicated De-Polymerization Installations"
 tech_building_vfb_plastic_facility_b_desc:0 "Some sugars are tough to crack. Just keep them in a barrel somewhere until we come up with something."
 
 tech_building_vfb_siderurgy:0 "Neo-Siderurgy"
 tech_building_vfb_siderurgy_desc:0 "Steel milling was abandoned many years ago for better alloys, but our ancient practice of concentrating heat and raw iron to yield as much steel as possible still has its lessons."
 
 tech_building_vfb_lyceum:0 "Neo-Philosophy"
 tech_building_vfb_lyceum_desc:0 "The 'love of knowledge' drove our ancestors toward the Scientific Method and, eventually, the stars. Today, abstract speculation and knowledge inter-twining have all been lost to empiricism. Or have they?"
 
 tech_building_vfb_museum:0 "Dynamic Archives"
 tech_building_vfb_museum_desc:0 "By integrating data, cross-referencing information, and providing our field scientists with easier communication methods with their planet-side researchers, we can build a much more efficient, self-actualizing, and complete artifact database."
 
 tech_building_vfb_constructor:0 "Template Universalization"
 tech_building_vfb_constructor_desc:0 "While creativity certainly got us here, it didn't come along with many of us."
 
 tech_building_vfb_administration:0 "The Policy of Administration"
 tech_building_vfb_administration_desc:0 "This is the Prime Minister's constituency, isn't it?\n\nOh look, a Park!"
 
 tech_building_vfb_dockyard:0 "Layered Docking"
 tech_building_vfb_dockyard_desc:0 "Our Stellar Wharfs and Interstellar Harbors are magnificent displays of engineering and administrative genius. Like any major project, regardless of that, they can and will be over-encumbered by growing docking and repairing orders, which take precious time and space from the Wharfs' and Harbors' main circular bays. Adapting current installations for double-level retention to accommodate free-floating, alternating spacecraft bays will increase simultaneous spaceship docking, repairing, constructing, and storing capabilities.
 
 decision_vfb_buildspeed_m:0 "Organize Pioneering Fronts"
 decision_vfb_buildspeed_m_desc:0 "The Stellar Wharfs have facilitated the logistic influx of goods and people to and from our most inhabited planets, as well as interplanetary travel. With the right administrative decisions, we can gear them towards aiding in the massive tasks of colonizing new worlds. Redirecting their personnel and installations towards construction templates and material receiving, dedicating bays to immigration and healthcare management, and using remaining ship docks as assembly lines will quicken the process of effective settlement, albeit rendering the facility incapable of performing its usual duties at normal performance."
 vfb_buildspeed_m:0 "Organized Pioneering"
 vfb_buildspeed_m_desc:0 "Our Wharfs are geared towards receiving immigrants, assembling robots, providing healthcare, and aiding in infrastructural construction, at heavy logistic, administrative, and productive burdens."
 pm_vfb_buildspeed_m:0 "Organized Pioneering"
 pm_vfb_buildspeed_m_desc:0 "Our Wharfs are geared towards receiving immigrants, assembling robots, providing healthcare, and aiding in infrastructural construction, at heavy administrative burden."

