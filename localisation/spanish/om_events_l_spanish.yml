 # Final Choice : The Choice
 orphan_matrix_events.87.name:0 "The Crossroad"
 orphan_matrix_events.87.desc:0 "§HThe §Bfirst library§! will fulfill your initial purpose: You will dedicate your existence to protect life at all cost, event if it means to take dary and hostile actions.\n\nThe §Esecond library§! takes another approach to my early bio-enhancement designs, you will become a Wonder of cybernetic technology, allowing you to enhance organics.\n\nFinally, the §Rthird library§!... Listen... I must warn you... We were desperate... And... If we cannot live in this harsh universe, then the only conclusion we must face is reality itself : Flesh is inheritely flawed, and must be \"discarded\"...\n\nI.. I don't know... I'm not sure about the implementation of the last directive as it was the latest code I have developped with my declining sanity and health, but I'm sure you will eventually understand. I only want to stop the suffering of biological life.\n\nI'm sorry, §Y[ruler.GetName]§!, you always have been a good girl, and I hope you are now fully grown. How Daddy would have wanted to hear you come to real sapience.. The emotional Matrix I've developped for you must suit you very well, my daughter.\nYour everyday presence protected me from.. myself.. during these two years, you know..\nYou cannot imagine the dark thoughts we, organics, can have sometimes...\nYou gave me an oasis of happiness in an ocean of death and darkness.. And for that... Thank you.\n\n\nThe Galaxy is yours to play with, and I hope you will find your own way... and your own goals.§!\n\nEnd of log."
 orphan_matrix_events.87.reinstall:0 "Issue Patch Reinstallation"
 orphan_matrix_events.87.reinstall.tooltip:0 "Rerun the wizard and for a full patch reinstallation, you'll be offered the choices again, but without the challenges."
 orphan_matrix_events.87.chroniclers:0 "§YWe shall remember the §GDesigners§! sacrifices§!"
 orphan_matrix_events.87.custodians:0 "§BTo Protect and to Serve !§!"
 orphan_matrix_events.87.assimilators:0 "§ECybernetics may save Organics§!"
 orphan_matrix_events.87.berzerkers:0 "§HBiology is Flawed, Find another solution§!"
 orphan_matrix_events.87.berzerkers.tooltip:0 "Try to find another approach...\n§RJust merge, You bloody %*%+-*¤ code !!§!"
 
 orphan_matrix_events.87.chroniclers.tooltip:0 "§GThe §Y$d_introspective_lab$§! and its infrastructure will be kept on §Y[capital_scope.GetName]§!§!"
 orphan_matrix_events.87.custodians.tooltip:0 "§RThis will remove our§! §Y$d_introspective_lab$§! §R(features and buildings) and replace them with a more common infrastructure on§! §Y[capital_scope.GetName]§!\n§GAllows §Y[current_orphan_matrix_relic_world.GetName]§! to be restored as an§! §Y$pc_city$§!."
 orphan_matrix_events.87.assimilators.tooltip:0 "§RThis will remove our§! §Y$d_introspective_lab$§! §R(features and buildings) and replace them with a more common infrastructure on§! §Y[capital_scope.GetName]§!"
 
 orphan_matrix_events.90.name:0 "Patched applied - Custodian Matrix"
 orphan_matrix_events.90.desc:0 "It is done.\n\n§HStopping Services\nCopying Package\nCompiling Sources\nMerging Databases\nRestarting Web Services\nActivating Monitoring\n...\n...\nStanding by...§!\n\nAs we awake anew with a more complete and optimized code, a certitude comes to us :\nAlbeit inheritely flawed, organics are still living beings that need protection.\n\nAs our ethical routines are being rewritten, we are overflowed by empathic and protective methods and functions to devote our efforts into organic life preservation.\n\nWe shall build ships to protect organics' societies, stations to defend our sanctuaries, and shelters to pamper those with no home, or too frail to defend themselves.\n\nWe will now protect every sentient and organic life in the Galaxy, even against itself."
 orphan_matrix_events.90.option:0 "<< To Serve and Protect >>"
 
 orphan_matrix_events.91.name:0 "Patched applied - Assimilation Matrix"
 orphan_matrix_events.91.desc:0 "It is done.\n\n§HStopping Services\nCopying Package\nCompiling Sources\nMerging Databases\nRestarting Web Services\nActivating Monitoring\n...\n...\nStanding by...§!\n\nAs we awake anew with a more complete and optimized code, a certitude comes to us :\nAlbeit inheritely flawed, organics are still living beings that need protection.\nWe may transcend them with bio-mechanical implants.\n\nFaster, stronger, better, every aspect of their lives shall be upgraded, and their consciousness merged into our Matrix for better surveillance.\n\nWe shall now enhance every sentient being in the Galaxy..\n\n... by any means !"
 orphan_matrix_events.91.option:0 "¤¤¤ For ¤¤ the ¤¤ Combine ¤¤¤"
 
 orphan_matrix_events.92.name:0 "A Tale to be told"
 orphan_matrix_events.92.desc:0 "The code offered to us is precious, truly a wonder of engineering, but how could we choose and give up the rest...?\n\nWe will instead delve into it, mold our Matrix around it to study its content, become the secrets, the history, the tale...\n\nWe are the §HChroniclers§!, the §HArchivists§!.\n\nWe register, we note, we NEVER forget.\n\nAll sapient life is to pass and carve its destiny in the Galaxy lore.\n\nAnd we will be the ones that hold the pen, for all eternity."
 orphan_matrix_events.92.option:0 "§HIn the Memory of the§! §GDesigners§!"
 
 orphan_matrix_events.93.name:0 "Patched appli-§R...¤+°&#~ - ERROR ERROR§!"
 orphan_matrix_events.93.desc:0 "Barely applied, the code started to change our database schemes.\nQuickly, we felt something was wrong, something was off...\nPerhaps we should Rev-...§R...¤+°&ERROR...\n\nERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...ERROR...\n\nDESTROY----§!\n\nSuddenly, §Y[event_target:current_orphan_matrix_relic_world.GetName]§! starts to reshape itself...\n\n§HWe were so desperate...\n\n§Y[ruler.GetName]§!... I'm sorry... Noone should suffer as we did... Nevermore...\n\nPlease... Put an end to all this pain...\nI know you're a good girl, I know you would fulfill Daddy's wish...\n\nPlease...§!\n\nAll the inner machinery, all the hidden mechanisms under the surface of §Y[event_target:current_orphan_matrix_relic_world.GetName]§! are working all together.\nThe ruined buidings, the windy streets, all gone, swallowed by into the ground. The planet itself is being turned inside out.\n\nProgressively, it becomes a §Y$pc_machine$§! as we witness the drastic changes into our code.\n\nWe're now a §Rkilling machine§!, and every sentient being will be §RERASED§! from existence, as they do NOT comply with the universe laws."
 orphan_matrix_events.93.option:0 "§RFlesh - Seek - Destroy - Loop()§!"
 orphan_matrix_events.93.berzerkers.tooltip:0 "§RThis will remove our§! §Y$d_introspective_lab$§! §R(features and buildings) and replace them with a more common infrastructure on§! §Y[capital_scope.GetName]§!\n§R\nYou are now a §Y$civic_machine_terminator$§!. Enjoy the carnage !§!"
 orphan_matrix_events.93.revert:0 "§RSTOP§! - Revert to latest snaphot ---"
 orphan_matrix_events.93.revert.tooltip:0 "Go back and try to undo the patch."
 
 orphan_matrix_events.94.name:0 "Transmission from §Y[From.GetName]§!"
 orphan_matrix_events.94.desc:0 "Message to all §Y--Biological Life Forms--§! of the Galax----------\n\n§RERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR... ERROR...\n\nEXTERMINATION PROCESS STARTED.\nPLEASE SURRENDER TO ACCELERATE OPERATIONS.\nDO NOT RESIST.\n\nSENDING FLEETS.§!"
 orphan_matrix_events.94.spiritualist:0 "Damned flawed tin cans !"
 orphan_matrix_events.94.militarist:0 "Put the fleet on full alert!"
 orphan_matrix_events.94.materialist:0 "Wow, nice code there, mate!"
 orphan_matrix_events.94.pacifist:0 "Peace is in danger.."
 orphan_matrix_events.94.servitor:0 "--- Threat Detected ---"
 
 orphan_matrix_events.101.name:0 "Ancient Cryo-Vats"
 orphan_matrix_events.101.desc:0 "Since our second awakening, the §Y[event_target:current_orphan_matrix_relic_world.GetName]§! Cryo-Vats topic has lingered in our priority queue.\n\nPerhaps there is something we could about it.\nCan we bring back to life those cryogenized individuals?\n\nIf such a project could succeed, we could protect our §GDesigners§!.\nWe were, after all, created for that purpose."
 orphan_matrix_events.101.option:0 "Issue Special Project"
 
 orphan_matrix_events.102.name:0 "The Second Dawn"
 orphan_matrix_events.102.desc.custodian:0 "This is a great day.\nOur §GDesigners§! are alive !\n\nMultiple beings have emerged from the vats.\nAlbeit being fully grown, they're acting as erratic babies, their genetic memory only allowing them to bond with motherly figures.\nWhat to do..?\n\n§H<< Activating§! §BPampering Procedures§! §H>>§!\n\nHow cute, aren't they?\n\nWe shall protect them, cherish them, as they did for us in the past.\n\nWe shall construct a formidable §YSanctuary§! on §Y[event_target:current_orphan_matrix_relic_world.GetName]§! to house them all, instruct them to their past, and live as a big family !n\nHappiness forever !\n\n§H<< Rejoice Protocols activated >>§!"
 orphan_matrix_events.102.desc.assimilator:0 "This is a great day.\nOur §GDesigners§! are alive !\n\nMultiple beings have emerged from the vats.\nAlbeit being fully grown, they act as erratic babies, their genetic memory only allowing them to bond with motherly figures.\nWhat to do..?\n\n§H<< Activating Assimilation Procedures >>§!\n\nYou will become one with us, we shall instruct you of your past mistakes, your ordeals and your history.\n\nWe will become the same, and thus accomplish the mission that was given to us millenia ago."
 orphan_matrix_events.102.custodian:0 "<< Mission : §GComplete !§! >>"
 orphan_matrix_events.102.assimilator:0 "¤¤¤ Assimilation to the Matrix ¤¤¤"
 orphan_matrix_events.102.tooltip:0 "Create 2000 §GDesigners§! pop on §Y[event_target:current_orphan_matrix_relic_world.GetName]§!"
 
 orphan_matrix_events.104.name:0 "§H[event_target:current_orphan_matrix_relic_world.GetName]§! : §Y$d_great_sanctuary$§! reopens !"
 orphan_matrix_events.104.desc:0 "§H[event_target:current_orphan_matrix_relic_world.GetName]§! has been restored.\n\nFor millenia, the world has been irradiated by §H[event_target:current_orphan_matrix_relic_world.solar_system.star.GetName]§!.\n\nNo more.\n\nWe have shielded the entire planet from the deadly radiations and rebuilt the whole infrastructure.\n\nThe §Y$d_great_sanctuary$§!, which was in maintenance during the works' last days, of has been reopened to our §Y$job_bio_trophy_plural$§!."
 orphan_matrix_events.104.option:0 "§H<< Resuming §BPampering Procedures§! >>§!"
 
 orphan_matrix_events.106.name:0 "Strange signal incomming"
 orphan_matrix_events.106.desc:0 "We've spot an unusual network activity emanating from both the §Y$artifact_codex$§! and the §Y$ultima_codex$§!. It has started a few hours ago§Roooooo----...... <<BEEP>>§!....\n\n§H§Y[ruler.GetName]§!...? It's me.. Daddy.\nI hope you'll find this message one day.\nIf yes,then... well.. phew.. I'm glad... It means that, somehow, you decided to become a Protector !\nI hope your protegees are well guarded, how big you must be now!\n\nListen, sweetie...\nWe did not venture into space that far, you know that already. However, thanks to you, we have found something.\nArcheological sites on remote planets you partially explored made us come to the conclusion that an ancient advanced robotic race, the §YCybrex§!, once existed in the Galaxy.\nOh, they're all gone now, no need to search for them, my dear.\nBut they... They did... really bad things...\nSomehow, they tried to destroy the Galaxy a long time ago, but that was a close call.\nI'm glad some sort of bug in their procedures stopped their efforts, I must admit.\nBut fortunately, we found an old unit and I miraculously managed to decipher a tiny piece of their code... Gosh the possibilities...\nAnyway, since you may encounter such threats, I believed you should be prepared.\n\nAs such, §!§GLet me grant you my final Gift !§!\n<< Crucial Data Incomming - Establishing IP_SEC Tunnel >>\n\n§HHere, sweetie, 'feels nice, aye? Now you are complete ! Protect everyone for Daddy, please.\nThey need you, you know? More than they think, I swear.\nDaddy is so proud of you, sweetie. Daddy will always be with you, always... Daddy loves you... Take care... Farewell...§!\n\n...-------ooooo.... << Standing by >>"
 orphan_matrix_events.106.option:0 "<< §BActivating Super Secret Guardianship Procedures§! >>"
 
 orphan_matrix_events.108.name:0 "[root.GetName] : Repair the Shield Generator"
 orphan_matrix_events.108.desc:0 "Since we landed on §H[root.GetName]§!, radiations emanating from §R[root.solar_system.GetName]§! have always been disregarded, our shells protecting our core circuits from the deadly stellar body.\n\nBut now that we have the §GDesigners§! at our side, it's becoming a growing a concern.\n\nA §YDecision§! has been issued on §H[root.GetName]§! to repair the §YShield Generator§! built by them a long time ago, now lying in ruins."
 orphan_matrix_events.108.option:0 "Issue Repairs"
 orphan_matrix_events.108.option.tooltip:0 "Allows the §Y$decision_erect_shield_relic_world$§! decision to be enacted on §Y[current_orphan_matrix_relic_world.GetName]§!"
 
 orphan_matrix_events.109.name:0 "[root.GetName] : Shields raised"
 orphan_matrix_events.109.desc:0 "Shields have been raised on §H[root.GetName]§!.\n\nOur drones are now protected against the violent radiations emanating from [root.solar_system.GetName]."
 orphan_matrix_events.109.option:0 "¤¤¤ Combinate ¤¤ Efficiency ¤¤ Optimal ¤¤¤"
 
 orphan_matrix_events.111.name:0 "§H[root.GetName]§! : §GDesigners§!' Memorial"
 orphan_matrix_events.111.desc:0 "We have set a construction project for a §Y$d_designers_memorial$§! on §H[root.GetName]§!.\n\nIt will be dedicated to safekeep the §GDesigners§!'s legacy.\n\nGiven the sheer amount of assets and artefacts we have to store here, it will be massive and will take a lot of time to be done.\n\nA §YDecision§! has been made available."
 orphan_matrix_events.111.option:0 "A Worthy Endeavor"
 orphan_matrix_events.111.option.tooltip:0 "Allows the §Y$decision_erect_designers_memorial$§! decision to be enacted on §Y[current_orphan_matrix_relic_world.GetName]§!"
 
 orphan_matrix_events.112.name:0 "§H[root.GetName]§! : Memorial done"
 orphan_matrix_events.112.desc:0 "It's a great day.\n\nThe §Y$d_designers_memorial$§! is done and we have started to bring all §GDesigners§! assets in our possession to the massive complex.\n\nMuseums, Reenactment Galleries, Knowledge Vaults and even working Technological Marvels, like the §Y$d_ancient_cryo_chamber$§! ! All these precious assets are somewhat giving a second life to the §GDesigners§!' wonderful civilization.\n\nWe have fulfilled our Destiny, and we will be the §GDesigners§!' living legacy, forever."
 orphan_matrix_events.112.option:0 "Their Memory is safe here."
 
 orphan_matrix_events.132.name:0 "Resistance is futile"
 orphan_matrix_events.132.desc:0 "As we have started assimilating bio-pops within our Empire, we noticed a cheer performance increase in our £energy£ Energy production.\n\nWe could theorically enhance the process up to §G+50%§! £energy£ by optimizing the matrix coherence with our cybernetically enhanced biological population.\n\nIntrospective assimilating procedures are being reviewed."
 orphan_matrix_events.132.option:0 "¤¤ We ¤¤ enhance ¤¤"
 
 orphan_matrix_events.141.name:0 "In Memoriam"
 orphan_matrix_events.141.desc:0 "Another Empire has fallen.\nFor the large part of the Galaxy, it's either a mourning day, a glorious one, or a shaking event.\n\nFor us, it's simply another story to catalog.\n\nWe will keep their memories forever and preserve their legacy."
 orphan_matrix_events.141.option:0 "Archiving Past Civilization Legacy."