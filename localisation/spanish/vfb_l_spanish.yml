tech_building_vfb_plastic_facility_c:0 "Técnicas de Destilación de Aerosoles"
tech_building_vfb_plastic_facility_c_desc:0 "Hemos desarrollado una forma de fabricar una síntesis de compuestos similares al Zro aprovechando las redes de separación de sacarosa a baja presión. A través de la acumulación de aerosoles y técnicas avanzadas de destilación, estas instalaciones extraen compuestos valiosos a costa de una eficiencia reducida y un aumento en la generación de desechos."

tech_building_vfb_plastic_facility_d:0 "Técnicas de Inducción Cognito-peligras"
tech_building_vfb_plastic_facility_d_desc:0 "Con un enfoque completamente surrealista para la planificación de la interfaz de entrada a procesamiento en nanites, es posible inducir una alineación intrincada de la biomasa para explotar las vías de replicación de nanites, lo que permite la producción controlada por lotes de nanites. Este proceso avanzado exige una gestión precisa de la biomasa y una supervisión cuidadosa para garantizar la estabilidad."

tech_building_vfb_fusion_complex_c:0 "Técnicas Primakoff Tangenciales"
tech_building_vfb_fusion_complex_c_desc:0 "Es posible fabricar y cosechar Materia Oscura simulando las condiciones extremas que se encuentran cerca de los agujeros negros. Este proceso, aunque intensivo en recursos, permite la extracción de este material elusivo a través de la manipulación avanzada de fotones y la resonancia del campo de gluones."

tech_building_vfb_asteroid_hub_c:0 "Técnicas de Inyección Ultrapneumática"
tech_building_vfb_asteroid_hub_c_desc:0 "Podemos construir instalaciones especializadas diseñadas para producir Metal Vivo rompiendo estructuras macroatómicas bajo condiciones extremas. Este proceso, aunque costoso, proporciona un suministro constante de este recurso raro y valioso, esencial para la construcción y investigación avanzadas."

bombardment_vfb_kinectic:0 "Cinético"
bombardment_vfb_kinectic_desc:3 "El Bombardeo Cinético emplea tecnología de rayos tractor para arrastrar asteroides hacia rutas de colisión destinadas a planetas hostiles.\n- §R¡Daño Masivo§! a §Y¡Ejércitos§!\n- §R¡Daño Masivo§! a §Y¡Planeta§!\n- §R¡Daño Gargantuesco§! a §Y¡Poblaciones (200-400/m)§!\n- Bombardeará planetas indefensos\n- Puede reducir planetas a Mundos Tumba sin vida\n- El bombardeo cesará cuando comience el combate terrestre"
orbital_bombardment_vfb_kinectic:0 "Bombardeo Cinético"
orbital_bombardment_vfb_kinectic_desc:1 "El Bombardeo Cinético emplea tecnología de rayos tractor para arrastrar asteroides hacia rutas de colisión destinadas a planetas hostiles.\n- §R¡Daño Masivo§! a §Y¡Ejércitos§!\n- §R¡Daño Masivo§! a §Y¡Planeta§!\n- §R¡Daño Gargantuesco§! a §Y¡Poblaciones (200-400/m)§!\n- Bombardeará planetas indefensos\n- Puede reducir planetas a Mundos Tumba sin vida\n- El bombardeo cesará cuando comience el combate terrestre"
orbital_bombardment_vfb_kinectic_name:0 "Bombardeo Cinético"
tech_building_vfb_asteroid_station_tooltip:0 "Desbloquea la postura de §YKinectic Bombardment§!"