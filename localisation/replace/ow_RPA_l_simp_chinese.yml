 # Concepts
 concept_planetary_ascension_desc: "£colony£['concept_colony']的§H殖民地飞升等级§!可以提升['concept_designation']的效果，降低对£empire_sprawl£['concept_empire_size']的影响。\n\n殖民地可以飞升最多§G10§!次，且依据累计的总§H飞升等级§!，每次的£unity£['concept_unity']花费都会提升。"
