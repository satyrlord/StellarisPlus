# Planetary ascension
 PLANET_ASCENSION_EXCEED_CAP_MIN: "§R已到达最高飞升等级。§!"
 PLANET_ASCENSION_TEXT_NONE: "§B星球飞升大修§!环境下最大飞升等级固定为§G10§!。\n§H由于游戏机制原因，行星飞升效果不会显示，但会正确生效。§!"
