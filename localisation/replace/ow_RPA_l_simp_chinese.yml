 ## Jobs
 job_PRA_job_administer_DEFAULT:0 "地方长官"
 job_PRA_job_administer_DEFAULT_plural:0 "$job_PRA_job_administer_DEFAULT$"
 job_PRA_job_administer_DEFAULT_desc:0 "这些分散在各个地区的基层管理者能很好滴组织和领导人群，极大减少帝国管理负担，但会降低凝聚力。"
 mod_job_PRA_job_administer_DEFAULT_add:0 "$job_PRA_job_administer_DEFAULT$"
 job_PRA_job_administer_DEFAULT_effect_desc:0 "£job_PRA_job_administer_DEFAULT£§E地方管理者§!将£unity£§Y$unity$§!转化为$mod_PRA_smod_plnt_JOB_default$，并根据其思潮添加对应增益。£unity£§Y$unity$§!消耗量取决于星球人口数，且极端思潮获得双倍对应增益。"
 # Egalitarian
 job_PRA_job_administer_EQUAL:0 "民众委员"
 job_PRA_job_administer_EQUAL_plural:0 "$job_PRA_job_administer_EQUAL$"
 job_PRA_job_administer_EQUAL_desc:0 "通过民主协商机制协调地区事务，显著降低行政复杂度，但过度强调地方自治会削弱国家认同感。"
 mod_job_PRA_job_administer_EQUAL_add:0 "$job_PRA_job_administer_EQUAL$"
 # Militarist
 job_PRA_job_administer_MILIT:0 "政委"
 job_PRA_job_administer_MILIT_plural:0 "$job_PRA_job_administer_MILIT$"
 job_PRA_job_administer_MILIT_desc:0 "以军事纪律强化地方管控，大幅提升行政效率，但高压管理会抑制民众的集体归属意识。"
 mod_job_PRA_job_administer_MILIT_add:0 "$job_PRA_job_administer_MILIT$"
 # Spiritualist
 job_PRA_job_administer_SPIRITUAL:0 "修会长"
 job_PRA_job_administer_SPIRITUAL_plural:0 "$job_PRA_job_administer_SPIRITUAL$"
 job_PRA_job_administer_SPIRITUAL_desc:0 "通过宗教仪式凝聚社区，有效简化治理流程，但教派分歧可能导致精神共同体分裂。"
 mod_job_PRA_job_administer_SPIRITUAL_add:0 "$job_PRA_job_administer_SPIRITUAL$"
 # Materialist
 job_PRA_job_administer_TECH:0 "公共学者"
 job_PRA_job_administer_TECH_plural:0 "$job_PRA_job_administer_TECH$"
 job_PRA_job_administer_TECH_desc:0 "通过科普与技术推广，指导社会活动与生产，但可能会形成个人技术权威。"
 mod_job_PRA_job_administer_TECH_add:0 "$job_PRA_job_administer_TECH$"
 # Corporate
 job_PRA_job_administer_CORP:0 "办公经理"
 job_PRA_job_administer_CORP_plural:0 "$job_PRA_job_administer_CORP$"
 job_PRA_job_administer_CORP_desc:0 "采用KPI管理体系优化地方运营，极大压缩行政成本，但商业利益导向会稀释社会共同价值观。"
 mod_job_PRA_job_administer_CORP_add:0 "$job_PRA_job_administer_CORP$"
 # Hive
 job_PRA_job_administer_GESTALT:0 "巢穴领主"
 job_PRA_job_administer_GESTALT_plural:0 "$job_PRA_job_administer_GESTALT$"
 job_PRA_job_administer_GESTALT_desc:0 "作为意识网络的本地中继，高效协调生物质分配，但神经信号衰减会弱化主脑的绝对控制力。"
 mod_job_PRA_job_administer_GESTALT_add:0 "$job_PRA_job_administer_GESTALT$"
 job_PRA_job_administer_GESTALT_effect_desc:0 "£job_PRA_job_administer_GESTALT£§E本地节点§!将£unity£§Y$unity$§!转化为$mod_PRA_smod_plnt_JOB_default$，并根据其政体类型添加对应增益。£unity£§Y$unity$§!消耗量取决于星球人口数。"
 # Machine
 job_PRA_job_administer_MACHINE:0 "局域节点"
 job_PRA_job_administer_MACHINE_plural:0 "$job_PRA_job_administer_MACHINE$"
 job_PRA_job_administer_MACHINE_desc:0 "分布式处理单元优化区域资源调度，显著降低中央处理器负载，但数据包延迟会降低网络同步精度。"
 mod_job_PRA_job_administer_MACHINE_add:0 "$job_PRA_job_administer_MACHINE$"

