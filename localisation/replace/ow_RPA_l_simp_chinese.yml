 PRA_mod_cntr_SPRAWL_reduc: "文明进阶"
 PRA_mod_cntr_SPRAWL_reduc_desc: "每一次帝国飞升都意味着文明迈入了一个全新阶段，这会带来社会效率的显著提升，以及管理成本的大幅下降。"
