 origin_scion_desc:0 "A Fallen Empire has meddled in the development of this civilization for thousands of years, guiding them onto a path of their choosing. Yet generations spent beneath the protection and direction of their ancient benefactors have stifled the growth of a unified cultural identity, while other young civilizations view such close ties to a Fallen Empire with suspicion and unease."

