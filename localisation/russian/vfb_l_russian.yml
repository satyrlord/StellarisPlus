l_russian:
 
 #BUILDINGS
 

 building_vfb_wharf:0 "Звездный причал"
 building_vfb_wharf_desc:0 "В то время как обычные колонии полагаются на трансорбитальные перевозки и сборку разобранных кораблей, мы можем пойти еще дальше на планетах, имеющих более важное стратегическое значение. Звездные причалы - это массивные сооружения, предназначенные для снижения расхода топлива судами, облегчения эксплуатации кораблей на внешней орбите, наблюдения за космосом, централизации военно-морских стоянок и размещения штаб-квартир планетарных таможен. Соединяя внешнее и внутриорбитальное пространство, они служат доками для космических аппаратов и стыковочными отсеками для производственных потоков. Действуя одновременно как диспетчерская вышка и сам аэродром, Звездный причал также концентрирует все атмосферные воздействия на нашу планету."
 
 building_vfb_harbor:0 "Межзвездная гавань"
 building_vfb_harbor_desc:0 "Экспоненциальный рост нашей планетарной инфраструктуры, торговли, производства и притока ресурсов привел к тому, что наши Звездные причалы устарели. Мы больше не занимаемся исключительно мониторингом атмосферных вторжений. Наши обязанности расширились и включают оказание помощи нашим станциям в управлении космической экономикой, которая стала такой прибыльной и богатой. "Межзвездная гавань" представляет собой серию орбитальных расширений нашей и без того значительной вертикальной инфраструктуры. Стандартные протоколы стыковки, общественный транспорт между станциями и планетами-спутниками, развертывание флотилий сопровождения и быстрого реагирования, современное медицинское обслуживание, недоступное на станциях, а также обеспечение резервной копии для координации внутрисистемных космических аппаратов - вот некоторые из его новых обязанностей. Подобно причалам, наши гавани служат мостом между внешним и внутренним орбитальным транспортом, соединяя все местные потоки между станцией и планетой."
 
 building_vfb_workshop:0 "Модульные мастерские"
 building_vfb_workshop_desc:0 "Модульная мастерская, оснащенная кузницами, принтерами и шаблонами, удовлетворит особые потребности любого колониста и обеспечит его всем необходимым оборудованием и ремонтными материалами. Излишки продукции также можно экспортировать."
 
 building_vfb_logistichub:0 "Центральный логистический центр"
 building_vfb_logistichub_desc:0 "Эти великолепные терминалы соединяют и управляют планетарной сетью гиперлупов и магнитопланов, быстро распределяя сырье туда, где это необходимо, обеспечивая максимальную эффективность работы всех наших производственных центров. Центральные логистические центры также регулируют превозку большинства суборбитальных перевозок грузов и соединяют нашу постоянно расширяющуюся планетарную сеть солнечных панелий, репликаторов питательных веществ и рудодобывающих установок, гарантируя, что излишки энергии, минералов или продовольствия не будут потрачены впустую."
 
 building_vfb_orbitalhub:0 "Интегрированные орбитальные хабы"
 building_vfb_orbitalhub_desc:0 "Опираясь на существующую инфраструктуру наших межзвездных гаваней, интегрированные орбитальные узлы развивают миссию своих предшественников по максимальному повышению эффективности транспортных протоколов за счет использования импульса вращения планет. Помимо оптимизации этих протоколов, это предприятие централизует наши планетарные энергосистемы, установки по очистке полезных ископаемых и центры по переработке пищевых продуктов, увеличивая производство сырых и рафинированных ресурсов и значительно сокращая количество отходов. Однако это будет ужасно дорого."
 
 building_vfb_plaza:0 "Общественные площади "
 building_vfb_plaza_desc:0 "В то время как у нас на родине были тысячелетия на развитие общественной инфраструктуры, наши колонии лишены такой роскоши. Нашим новым планетам срочно требуется присутствие центрального правительства, но у нас нет времени на его естественное развитие. Общественные площади концентрируют социальные и административные функции государства в центральных учреждениях на всей планете, тщательно организованных для обеспечения максимальной эффективности общественных услуг. В этих зданиях размещаются планетарная жандармерия, санитарные службы, отделы общественных работ и государственная служба, которые обеспечивают безопасность, здравоохранение, инфраструктуру и стабильность для всех граждан одновременно."
 
 building_vfb_manufactory:0 "Производственные комплексы"
 building_vfb_manufactory_desc:0 "Эти крупные производственные центры объединяют в себе 3D-принтеры, кузнечные цеха, стыковочные отсеки, склады сырья, строительные шаблоны и другие необходимые для производства материалы. Открытый для всех, производственный комплекс позволяет гражданам создавать все, что нужно их домам и докам, на их собственных планетах и собственными руками - или руками специалистов, обещая заменить традиционную промышленность нашего родного мира."
 
 building_vfb_residence:0 "Структурные резиденции"
 building_vfb_residence_desc:0 "Огромные арки и стены из сплавов в наших местах обитания обеспечивают достаточно места для строительства домов."
 
 building_vfb_refinery:0 "Перерабатывающие станции"
 building_vfb_refinery_desc:0 "Теперь, когда мы понимаем потенциал редких ресурсов, нам следует сосредоточить их производство на специализированных перерабатывающих заводах, чтобы обеспечить всем колониям доступ к местным поставкам этих ценных товаров."
 
 building_vfb_resort:0 "Райские курорты"
 building_vfb_resort_desc:0 "В то время как наша империя обычно может финансировать только один курортный мир, мы можем помочь создать крупные курорты на многих планетах, чтобы обеспечить туристов развлечениями, отличной кухней и увлекательными культурными мероприятиями и досугом."
 
 building_vfb_preserve:0 "Центры святилищ"
 building_vfb_preserve_desc:0 "Растущая урбанизация и экономическое процветание подвергают экосистемы нашей планеты серьезной опасности. Защита дикой природы, независимо от того, насколько необычны местные фауна и флора, и даже создание зоопарков для защиты экосистем наших более развитых колоний сохранят нашу совесть чистой. Гарантируют, что ни одна экосистема в какой-либо колонии не исчезнет навсегда, и предоставят ценную информацию о дикой ксеноприроде."
 
 building_vfb_siderurgy:0 "Тетра-Металлургия"
 building_vfb_siderurgy_desc:0 "Тетра-Металлургия - это современный центр плавки и переработки, который объединяет небольшие заводы по производству сплавов, концентрирующие приток материалов и термогенераторы, с нашими кузницами сплавов. Это позволяет производить огромное количество ценных металлических компонентов при относительно небольшом количестве персонала и меньших материальных затратах и отходах, хотя и с высокими энергетическими затратами. Чем больше у нас на планетах кузниц с такой установкой, тем интенсивнее работают плавильные установки и тем больше ресурсов мы производим.\n\n§YПроизводство металлурга суммируется за каждый литейный завод или эквивалентное улучшение, построенное, до 5 раз."
 
 building_vfb_asteroid_station:0 "Околозвездная дамба"
 building_vfb_asteroid_station_desc:0 "Перенаправляя и фрагментируя околозвездную материю в космическом пространстве и доставляя ее на орбиты наших планет, мы можем использовать огромное количество столь необходимых материалов, не нанося вреда земной коре. Тем не менее, это дорогостоящее и рискованное предприятие."
 building_vfb_asteroid_hub:0 "Комплекс околозвездных дамб"
 building_vfb_asteroid_hub_desc:0 "Перенаправляя и фрагментируя околозвёздное вещество в космосе и доставляя его на наши планетарные орбиты, мы можем получить огромное количество столь необходимых материалов, не повреждая кору наших поверхностей. Это всё ещё дорогостоящее и рискованное предприятие.\n\n§YЭта модернизированная установка вмещает дополнительные отсеки для разведочных космических аппаратов и может быть оснащена метеоритными мельницами для ещё большего объёма продукции.§!"
 building_vfb_asteroid_hub_b:0 "Метеоритные мельницы" 
 building_vfb_asteroid_hub_b_desc:0 "Это возможности расширешия доков околозвездной материи. Их установка освобождает наши доковые команды от этой работы, позволяя им лучше сосредоточиться на важных задачах на внешней орбите, в основном на поиске астероидов. Кроме того, у наземных команд появляется больше времени для анализа имеющихся ресурсов и максимально эффективного использования ресурсов, предоставляемых их коллегами. \n\n§BТребуется строительство Комплекса околозвёздных дамб.§!"
 building_vfb_asteroid_hub_c:0 "Решетчатый ликвидатор"
 building_vfb_asteroid_hub_c_desc:0 "Установки, построенные рядом с нашим массивом околозвездных дамб для создания и сбора живого металла. Используя имеющиеся образцы живого металла в качестве стартеров, мы подвергаем огромные объёмы вещества экстремальному давлению и температуре, разрушая их макроатомные структуры и разжижая их решётки. Под действием аналогичного давления наши стартеры живого металла расширяются, интегрируя это нерешётчатое вещество в свою структуру. Это требует тонкого баланса металлических элементов в общем составе и даёт относительно небольшой избыток живого металла по сравнению с первоначальными вложениями в вещество.\n\n§BТребуется строительство как минимум одной Метеоритной мельницы.§!"

 building_vfb_fusion_plant:0 "Бета-мост"
 building_vfb_fusion_plant_desc:0 "Хотя наша технология преобразования материи в энергию далеко не так эффективна, как предсказывалось, мы уже можем это делать, сталкивая ядра на огромных скоростях, в результате чего выделяется тепловая энергия. В отличие от установок, работающих на термоядерном синтезе, этот процесс — бета-сбор — не оставляет после себя твёрдого вещества, что делает его гораздо более эффективным. Он будет производить разумное количество энергии, расходуя разумное количество материи для проведения бета-столкновений."
 building_vfb_fusion_complex:0 "Комплекс Бетта-мостов"
 building_vfb_fusion_complex_desc:0 "Хотя наша технология преобразования материи в энергию далеко не так эффективна, как предсказывалось, мы уже можем это делать, сталкивая ядра на огромных скоростях, в результате чего выделяется тепловая энергия. В отличие от установок, работающих на термоядерном синтезе, этот процесс — бета-сбор — не оставляет после себя твёрдого вещества, что делает его гораздо более эффективным. Он будет производить разумное количество энергии, расходуя разумное количество материи для проведения бета-столкновений.\n\n§YЭта модернизированная установка может быть оснащена дополнительными коллайдерами и тепловыми трансформаторами для ещё большего выхода продукта.§!"
 building_vfb_fusion_complex_b:0 "Тепловые трансформаторы"
 building_vfb_fusion_complex_b_desc:0 "Эти дополнительные устройства к массивам туннелей Бетта, установленные вокруг больших туннелей, добавляют много точек ввода физической материи - аналогично синхротронам - вокруг массивов и создают сеть станций термической переработки, позволяя повысить эффективность и объемы производства энергии за счет утилизации тепла.\n\n§BТребуется создание Комплекса бетта-мостов.§!"
 building_vfb_fusion_complex_c:0 "Резонансная облицовка"
  building_vfb_fusion_complex_c_desc:0 "Дополнительные модификации наших Массивов Бета-мостов, позволяющие создавать и собирать тёмную материю. Благодаря нашей текущей инфраструктуре мы можем ускорять, размножать и инжектировать фотоны во вторичный контур мостов, отделённых от основных коллайдеров материи магнитно-активными, ядерно-плотными облицовками. Из этих энергетических полей на этих облицовках фотоны преобразуются в аксионы – маломассивные, низкоэнергетические, хромодинамически активные частицы, которые могут быть объединены и обработаны в реакторах тёмной материи. Чтобы избежать мгновенного распада этих аксионов на фотоны и энергию, что привело бы к резкому расширению тепловой энергии, мы просеиваем их через глюонное поле до резонансной камеры. Именно таким образом тёмная материя в настоящее время извлекается из аккреционных дисков чёрных дыр, где они имитируют этот эффект посредством собственной инерции вращения и столкновений материи вблизи своих горизонтов событий. Само собой разумеется, это очень энерго и ресурсоёмко. Это также вынудит нас ужесточить требования к безопасности нашего Бета-моста, что снизит его эксплуатационную эффективность.\n\n§BТребуется строительство как минимум одного Теплового трансформатора.§!"
 
 building_vfb_plastic_plant:0 "Паллетайзер полимеров"
 building_vfb_plastic_plant_desc:0 "Наша зависимость от добываемых из недр земли минералов, разрушающих почву, всегда была проблемой в наших усилиях по охране окружающей среды. Наши агроинженеры недавно предложили решение: основанные на нашем предыдущем опыте использования твердых продуктов на основе нефти, новые составы биопластика станут эффективной заменой извлеченных минералов для производства сплавов и потребительских товаров. Полностью экологичные, естественным образом разлагаемые и пригодные для вторичной переработки биоматериалы, получаемые в процессе переработки биопластика, также будут обогащены до метанола, этанола и других альтернативных видов топлива для наших колоний."
 building_vfb_plastic_facility:0 "Комплекс паллетайзеров полимеров"
 building_vfb_plastic_facility_desc:0 "Оптимизация процессов синтеза, формования и переработки биоматериалов и биопластиков открыла новые горизонты для нашего рынка сырья. Распределив нашу установку полимеризации по местным заводам, мы можем обеспечить большинство колониальных общин чистой и эффективной альтернативой потребительским товарам, изготовленным из добытых минералов.\n\n§YЭта модернизированная установка позволяет использовать дополнительные установки для переработки сахара и может быть оснащена Сепараторами сахарида для еще большего увеличения выхода продукции.§Y!"
 building_vfb_plastic_facility_b:0 "Сепараторы сахаридов"
 building_vfb_plastic_facility_b_desc:0 "Определенные молекулярные структуры химически более удобны для органических процессов синтеза сахаров. Однако для разложения этих соединений на наших полимеризационных заводах требуется больше труда. Перенаправляя этапы биопереработки, предназначенные исключительно для широкодоступных, но трудноразлагаемых углеводов, на отдельные объекты, мы можем выделить наш основной объект исключительно для тех этапов, которые являются общими для всех процессов разложения, увеличивая объем одновременно обрабатываемого биоматериала.\n\n§BТребуется создание Комплекса паллетайзеров полимеров.§!"

 building_vfb_plastic_facility_c:0 "Перегонный аппарат"
 building_vfb_plastic_facility_c_desc:0 "Дополнительные модификации нашей системы разделения сахаридов. Обычно высокое давление внутри разделительных ванн способствует процессу расщепления углерода, ускоряя преобразование сахаридов в пригодные для использования реполимеризующиеся вещества. Однако, соединяя эти ванночки между собой в условиях более низкого давления и создавая искусственный поток воздуха, мы можем вызвать накопление аэрозолей, образующихся при разложении указанных сахаридов, а затем принудительно пропустить их через тонкие дистилляторы для перегонки. После этого мы можем продолжить несколько процессов перегонки этого аэрозоля до достижения комбинации соединений, аналогичной той, что содержится в извлеченном Зро. Это, конечно, значительно снижает эффективность процесса разделения сахаридов и приводит к образованию дополнительных отходов. \n\n§BТребуется строительство как минимум одного Сепаратора сахаридов.§!"
 building_vfb_plastic_facility_d:0 "Номограмма новорожденных"
 building_vfb_plastic_facility_d_desc:0 "Дополнительные устройства, работающие за счёт точного выравнивания биоматерии в сетке сложных структур, как физической, так и генетической. Учитывая, что наниты — это машины, собирающие и обрабатывающие физические данные из окружающего мира, мы можем, используя эти структуры, использовать бэкдоры в их интерфейсе ввода-вывода, чтобы установить бэкдор в одном наните и затем заставить его размножить партию путём саморепликации. Проблема в том, что мы можем инициировать цикл размножения, основанный только на питании одной и той же биоматерией, а значит, нам нужно работать партиями, а не позволять им бесконтрольно и беззаботно поглощать материал. \n\n§BТребуется постройка как минимум одного Сепаратора сахаридов.§!"

 building_vfb_lyceum:0 "Лицей"
 building_vfb_lyceum_desc:0 "Хотя академические учреждения и исследовательские центры разбросаны по всем нашим планетам, эти центры, как правило, слишком разбросаны и слишком сосредоточены на своих исследованиях, чтобы работать вместе и обмениваться опытом. Объединяя эти интеллектуальные центры везде, где это необходимо, посредством информационной инфраструктуры, мы не только ускорим исследования, но и предоставим дополнительные возможности – учитывая, что эта сеть требует физической инфраструктуры – для архивариусов, профессоров и даже философов, чтобы они могли комфортно работать в специально отведенном помещении – Лицее. \n\n§YВыходные данные исследователей накапливаются за каждую построенную исследовательскую лабораторию или эквивалентное улучшение, до 5 раз.§!"
 
 building_vfb_museum:0 "Музей"
 building_vfb_museum_desc:0 "Расширение планетарной академии в лице Лицея и сосредоточенные в нем образовательные возможности превратили его планету в центр инноваций и знаний. По мере того, как мы исследуем свою галактику, находя всё больше артефактов и чудес древних эпох, мы понимаем, насколько бессмысленно просто исследовать их в полевых условиях и затем хранить. Многое можно узнать только из анализа, и мы можем сделать более глубокие выводы, направив исследователей в археологические центры. Мы даже можем представить публике менее новаторские открытия!\n\n§YОбнаруживает малые артефакты, тратя очки исследований§!"
 
 building_vfb_base:0 "Полярная станция"
 building_vfb_base_desc:0 "Превращение пышной (или, если на то пошло, бесплодной) дикой местности в центр производства и последующего развития нашей цивилизации требует крупных инвестиций в инфраструктуру. Если мы хотим построить грандиозные сооружения для наших проектов по добыче и управлению ресурсами, нам необходимо создать огромные площадки для их накопления. К сожалению, реализация таких грандиозных проектов практически невозможна из-за гравитационного притяжения и вращения большинства планет, что создает неблагоприятные условия для строительства и обслуживания объектов за пределами приполярных регионов. К счастью, именно на полюсах строится большая часть транспланетной геосинхронной инфраструктуры. \n\n§YПозволяет строить несколько зданий в качестве улучшений.§!\n\n§GСледующие здания могут быть построены в качестве улучшений на этой рабочей площадке:\n\n - Бетта-мост\n - Околозвездная дамба\n - Паллетайзер полимеров\n - Центральный логистический центр\n - Интегрированные орбитальные хабы\n - Тетра-Металлургия\n - Лицей\n - Центры святилищ\n - Райские курорты\n - Мастерская\n - Музей\n - Гражданская служба§!"

 
 building_vfb_constructor:0 "Мастерская"
 building_vfb_constructor_desc:0 "Децентрализация и внедрение современных промышленных технологий для производства большинства, если не всех, потребительских товаров нашей империи стали несомненным успехом. Однако передача разработки прототипов нашим местным производителям привела к неэффективности и избыточности проектов. Мастерская создаёт чертежи для наших самых востребованных товаров и освобождает место на востребованных объектах для увеличения производства. \n\n §YРемесленник производит продукцию, накапливающуюся за каждую построенную гражданскую фабрику или эквивалентное улучшение, до 5 раз.§!"
  
 building_vfb_administration:0 "Гражданская служба"
 building_vfb_administration_desc:0 "Бремя государственного управления, безусловно, нелёгкое. В этом отношении наше расширение пространства привело к некоторой децентрализации. Однако, приобретя гибкость, мы лишились координации. Отдельный офис, связывающий многочисленные ведомственные комиссии, местные административные парки и выборное — или навязанное — руководство, несомненно, повысит стабильность и эффективность работы правительства, пусть даже ценой увеличения зарплат и ещё большего влияния бюрократии.\n\n§YВыпуск бюрократами накапливается с каждым построенным бюрократическим зданием или его улучшением, вплоть до 5 раз.§!"
 
 building_vfb_dockyard:0 "Звездный залив"
 building_vfb_dockyard_desc:0 "Эти чередующиеся, свободно плавающие карусельные ангары расширяют пространство для стыковки в Звездных причалах и Межзвездных гаванях без значительного расширения инфраструктуры. Они недорогие, не требуют особого значения и легко поддаются утилизации.\n\n§BТребуется строительство Звездного причала или Межзвездной гавани§!\n\n§YЭффекты масштабируются с ростом требований к зданиям.§!"
 
 job_vfb_accretion_drone:0 "Вспомогательные дрон"
 job_vfb_accretion_drone_plural:0 "Вспомогательные дроны"
 job_vfb_accretion_drone_desc:0 "Вспомогательные дроны - это обозначение наших группированных, разнородных подразделений. Гибкие по своему назначению, они координируют мелкие полевые операции, поиск, разведку, выступают в качестве саперов для расширения нашего сознания и поддерживают бесперебойную работу на планете."
 job_vfb_accretion_drone_effect_desc:0 "£job_vfb_accretion_drone£ $job_vfb_accretion_drone_plural$ fulfill various supplementary functions."
 mod_job_vfb_accretion_drone_add:0 "$job_vfb_accretion_drone$ Jobs"
 mod_job_vfb_accretion_drone_per_pop:0 "§G+1§! $job_vfb_accretion_drone$ Job per $VALUE$ Pops"
 mod_job_vfb_accretion_drone_per_pop_short:0 "\n§G+1§! £mod_job_vfb_accretion_drone_add£ per $VALUE$ £pop£"

 job_vfb_manufacturer:0 "Фабрикант"
 job_vfb_manufacturer_plural:0 "Фабриканты"
 job_vfb_manufacturer_desc:0 "Квалифицированные рабочие, которые работают с 3D-принтерами и различным промышленным оборудованием, производят товары по заказу и перерабатывают промышленные отходы в спалвы."
 job_vfb_manufacturer_effect_desc:0 "£job_vfb_manufacturer£ $job_vfb_manufacturer_plural$ turn £energy£ §Y$energy$§! and £minerals£ §Y$minerals$§! into £consumer_goods£ §Y$consumer_goods$§! and £alloys£ §Yalloys$§!."
 mod_job_vfb_manufacturer_add:0 "$job_vfb_manufacturer$ Jobs"
 mod_job_vfb_manufacturer_per_pop:0 "§G+1§! $job_vfb_manufacturer$ Job per $VALUE$ Pops"
 mod_job_vfb_manufacturer_per_pop_short:0 "\n§G+1§! £mod_job_vfb_manufacturer_add£ per $VALUE$ £pop£"
 
 job_vfb_enricher:0 "Обогатитель"
 job_vfb_enricher_plural:0 "Обогатители"
 job_vfb_enricher_desc:0 "Отходы — универсальный спутник как первобытных, так и развитых цивилизаций. Расширение производства и физической инфраструктуры наших производственных комплексов, независимо от того, насколько мы оптимизируем эффективность использования материалов, неизбежно приведёт к образованию большого количества отходов. Обогатители перерабатывают — обогащают — отбракованные товары и неиспользованное сырье с этих заводов, превращая их в сплавы. В любом случае, только производственные центры разумного размера способны удовлетворить такие потребности."
 job_vfb_enricher_effect_desc:0 "£job_vfb_enricher£ $job_vfb_enricher_plural$ turn £energy£ §Y$energy$§! and Waste into £alloys£ §Yalloys$§!."
 mod_job_vfb_enricher_add:0 "$job_vfb_enricher$ Jobs"
 mod_job_vfb_enricher_per_pop:0 "§G+1§! $job_vfb_enricher$ Job per $VALUE$ Pops"
 mod_job_vfb_enricher_per_pop_short:0 "\n§G+1§! £mod_job_vfb_enricher_add£ per $VALUE$ £pop£"
 
 job_vfb_logistician:0 "Логист"
 job_vfb_logistician_plural:0 "Логисты"
 job_vfb_logistician_desc:0 "Логисты организуют распределение ресурсов и протоколируют улучшения на месте, повышая общую эффективность всех производственных линий и суборбитального транспорта."
 job_vfb_logistician_effect_desc:0 "£job_vfb_logistician£ $job_vfb_logistician_plural$ create §Y$Trade Value$§! and increase §YJob Production Efficiency$§!."
 mod_job_vfb_logistician_add:0 "$job_vfb_logistician$ Jobs"
 mod_job_vfb_logistician_per_pop:0 "§G+1§! $job_vfb_logistician$ Job per $VALUE$ Pops"
 mod_job_vfb_logistician_per_pop_short:0 "\n§G+1§! £mod_job_vfb_logistician_add£ per $VALUE$ £pop£"
 
 job_vfb_prospector_bio:0 "Старатель"
 job_vfb_prospector_bio_plural:0 "Старатели"
 job_vfb_prospector_bio_desc:0 "Астроинженеры и специализированные операторы, которые перенаправляют вращающуюся вокруг звезд материю на планетарные орбиты, фрагментируя ее и извлекая ценные минералы."
 job_vfb_prospector_bio_effect_desc:0 "£job_vfb_prospector_bio£ $job_vfb_prospector_bio_plural$ turn £energy£ §Y$energy$§! into £engineering_research£ §Y$engineering_research$§!, £alloys£ §Y$alloys$§! and £minerals£ §Y$minerals$§!."
