 job_vfb_prospector_bot:0 "Дрон-Старатель"
 job_vfb_prospector_bot_plural:0 "Дроны-Старатели"
 job_vfb_prospector_bot_desc:0 "Специализированные дроны, которые управляют центрами перенаправления астероидов, которые направляют вращающееся вокруг звезд вещество на планетарные орбиты, фрагментируя его и извлекая ценные минералы."
 job_vfb_prospector_bot_effect_desc:0 "£job_vfb_prospector_bot£ $job_vfb_prospector_bot_plural$ turn £energy£ §Y$energy$§! into £engineering_research£ §Y$engineering_research$§!, £alloys£ §Y$alloys$§! and £minerals£ §Y$minerals$§!."
