 mod_job_vfb_siderurgist_bot_per_pop_short:0 "\n§G+1§! £mod_job_vfb_siderurgist_bot_add£ per $VALUE$ £pop£"
 
 
 vfb.1:0 "VF's Buildings is §GАктивация§!"
 vfb.1.name:0 "VF's Buildings is §GАктивация§!"
 vfb.1.desc:0 "§YРад вас здесь видеть! Спасибо, что подписались и установили VF Buildings!§! Это, по сути, сообщение игре (и вам) о том, что мод запущен!\n\nВ любом случае, желаю вам отличной чистки/дружбы с ксеноморфами/и того, и другого. Всего наилучшего!"
 vfb.1.a:0 "Круто"
 vfb.1.a.tooltip:0 "Круто! Развлекайтесь, я думаю."
 vfb.1.b:0 "Эй, пока я здесь, не мог бы ты дать мне и галактике §Bтехи§!?"
 vfb.1.b.tooltip:0 "Конечно, покажи себя, чемпион.\n\n§YКаждая империя в Галактике сможет начать строительство всех зданий мода прямо сейчас.§!"
 vfb.1.c:0 "§Y(Рекомендуется)§! Думаю, в начале игры должен быть доступен только Оружейная."
 vfb.1.c.tooltip:0 "Это сделает Оружейную единственным зданием, доступным в начале игры, и вы сможете построить ее сразу же.\n\n§YЭто рекомендуемый вариант для более сбалансированного игрового процесса.§!"
 
 vfb.2:0 "(VFB)  Установить количество Полярных станций "
 vfb.2.name:0 "(VFB) Установить количество Полярных станций"
 vfb.2.desc:0 "§YПрежде чем вы уйдёте§!, вы можете выбрать, сколько Полярных рабочих площадок можно построить на каждой планете. Это может сбить с толку, поскольку эволюции полярных рабочих мест разработаны как предельные планетарные специализации, так что не сердитесь, если 2 — это не сбалансировано, но, вероятно, будет весело.\n\nО, это решение окончательное и повлияет на ИИ!"
 vfb.2.a:0 "§G(Предполагаемый опыт)§! Оставьте по одному на планету!"
 vfb.2.a.tooltip:0 "Эта опция сохраняет ваш Планетарный лимит для основных построек на уровне 1. Это задумано и рекомендовано для более сбалансированной игры."
 vfb.2.b:0 "§Y (Потенциально несбалансированный)§! Что ж, у каждой планеты два полюса... Верно?"
 vfb.2.b.tooltip:0 "Эта опция увеличивает ваш планетарный лимит для основных построек до 2. Это очень весело. Вы всё равно не сможете построить два одинаковых здания, это просто всё испортит."
 vfb.2.c:0 "§R (Устаревшая колониальная версия)§! На самом деле, мне нужны только небольшие здания. Никаких полярных рабочих площадок."
 vfb.2.c.tooltip:0 "VFB начинался как мод, добавляющий два небольших здания, Арсенал и Мастерскую, чтобы облегчить первые годы, когда у вас много непродуктивных недавно колонизированных планет. С ним вы сможете построить и Очистительный завод, и Верфь в двух его модификациях. Если вам это нужно, вот!"

 vfb.3:0 "(VFB) Установить количество Полярных станций для Империи"
 vfb.3.name:0 "(VFB) Установить количество Полярных станций для Империи"
 vfb.3.desc:0 "§YО, ещё кое-что§! У вас есть возможность выбрать, сколько Полярных станций можно построить в каждой империи. Зачем? Многие просят об этом. Лично мне эта опция не нравится, но я человек из народа.\n\n Это изменение также постоянное и влияет на ИИ!"
 vfb.3.a:0 "§G (Предполагаемый опыт)§! Без ограничений!"
 vfb.3.a.tooltip:0 "Выбрав этот вариант, вы по-прежнему сможете построить столько Полярных станций и их модификаций, сколько захотите. Именно так и задумано."
 vfb.3.b:0 "§Y(1)§! 1 Полярная станция на империю."
 vfb.3.b.tooltip:0 "Выбрав этот вариант, вы сможете построить в общей сложности до 1 Полярных станций и их усовершенствований."
 vfb.3.c:0 "§Y(2)§! 2 Полярная станция на империю."
 vfb.3.c.tooltip:0 "Выбрав этот вариант, вы сможете построить в общей сложности до 2 Полярных станций и их усовершенствований."
 vfb.3.d:0 "§Y(3)§! 3 Полярная станция на империю."
 vfb.3.d.tooltip:0 "Выбрав этот вариант, вы сможете построить в общей сложности до 3 Полярных станций и их усовершенствований."
 vfb.3.e:0 "§Y(5)§! 5 Полярная станция на империю."
 vfb.3.e.tooltip:0 "Выбрав этот вариант, вы сможете построить в общей сложности до 5 Полярных станций и их усовершенствований."
 vfb.3.f:0 "§Y(10)§! 10 Полярная станция на империю."
 vfb.3.f.tooltip:0 "Выбрав этот вариант, вы сможете построить в общей сложности до 10 Полярных станций и их усовершенствований."

 
 tech_building_vfb_base:0 "Геосинхронная инженерия"
 tech_building_vfb_base_desc:0 "Чтобы ответить вызовам космической эры, наша цивилизация должна осуществить великие проекты, успех которых, ввиду их грандиозности, потребует чего-то большего, чем просто наземная механика."
 
 tech_building_vfb_armory:0 "Колониальное изыскание"
 tech_building_vfb_armory_desc:0 "Оснащение бронированных объектов медицины, исследовательским оборудованием и средствами индивидуальной защиты, а также обучение колонистов их использованию ускорят и улучшат процесс заселения планеты. Важно отметить, что нам также необходимо добавить местные производственные мощности, чтобы наши колонисты могли производить необходимое оборудование и расходные материалы на месте. В идеале мы хотим исключить зависимость от отдаленных цепочек поставок для ранних колоний, за исключением стратегических или негостеприимных планет."

 tech_building_vfb_workshop:0 "Производство по запросу"
 tech_building_vfb_workshop_desc:0 "Производство избыточного количества товаров в надежде распродать запасы, зачастую безуспешно, абсурдно неэффективно. Развитие технологий изготовления шаблонов делает производство изделий на заказ значительно быстрее, значительно дешевле, чище и эффективнее."
 
 tech_building_vfb_harbor:0 "Управление солнечной энергетики"
 tech_building_vfb_harbor_desc:0 "Экспоненциальный рост нашей экономики требует постоянно расширяющихся инфраструктурных и административных инноваций."
 
 tech_building_vfb_logistichub:0 "Централизованное распределение"
 tech_building_vfb_logistichub_desc:0 "Добыча, переработка, производство и потребление — невероятно сложная цепочка. Мы можем сделать её немного более организованной."
 
 tech_building_vfb_orbitalhub:0 "Трансорбитальная логистика"
 tech_building_vfb_orbitalhub_desc:0 "Перевозка. В космосе."
 
 tech_building_vfb_refinery:0 "Установки концентрированной очистки"
 tech_building_vfb_refinery_desc:0 "Теперь, когда мы освоили технологии стратегического синтеза ресурсов, мы поняли, что нам не нужно так много зданий, чтобы все это работало."
 
 tech_building_vfb_resort:0 "Эпикурейская логика"
 tech_building_vfb_resort_desc:0 "Довольный народ — продуктивный народ. Это далеко от гедонизма, но мы не монстры."
 
 tech_building_vfb_preserve:0 "Био-среды обитания"
 tech_building_vfb_preserve_desc:0 "Наш долг — защищать местную флору и фауну, но это не значит, что нам вообще не следует заниматься колонизацией."
 
 tech_building_vfb_asteroid_station:0 "Космическая разведка"
 tech_building_vfb_asteroid_station_desc:0 "Астероиды и прочее околозвёздное вещество невероятно богаты ресурсами. Размещение на наших планетах вмест их добычи в космосе позволяет нам перерабатывать и эффективнее распределять эти полезные ископаемые."
 
 tech_building_vfb_asteroid_hub_b:0 "Изменения в протоколе обработки"
 tech_building_vfb_asteroid_hub_b_desc:0 "Значительный прогресс в технологии измельчения означает, что каждый грамм имеет ценность. Ну, не в буквальном смысле, но, вероятно, мы найдём им применение."
 
 tech_building_vfb_fusion_plant:0 "Энтропийные динамо"
 tech_building_vfb_fusion_plant_desc:0 "Эффективное преобразование неорганической материи в энергию всегда было мечтой большинства цивилизаций."
 
 tech_building_vfb_fusion_complex_b:0 "Изоцентрические инсерционные сети"
 tech_building_vfb_fusion_complex_b_desc:0 "Огромный туннель, в который можно бросать предметы, и просто бросать их по одному за раз — это звучит невероятно скучно."
 
 tech_building_vfb_plastic_plant:0 "Выгодные полимеры"
 tech_building_vfb_plastic_plant_desc:0 "Хотя отказ от пластика несколько столетий назад сыграл решающую роль в предотвращении превращения нашей родной планеты в мир-гробницу (если это уже не произошло), полимеры, получаемые не из нефтехимических продуктов, а из растительных продуктов, найдёт своё применение в нашей цивилизации. Важно то, что они разлагаются гораздо быстрее и, что особенно важно, разлагаются вообще."
 
 tech_building_vfb_plastic_facility_b:0 "Специализированные установки деполимеризации"
 tech_building_vfb_plastic_facility_b_desc:0 "Некоторые виды сахара трудно расколоть. Просто храните их где-нибудь в бочке, пока мы что-нибудь не придумаем."
 
 tech_building_vfb_siderurgy:0 "Нео-Металлургия"
 tech_building_vfb_siderurgy_desc:0 "Прокатку стали забросили много лет назад в пользу более качественных сплавов, но наша древняя практика концентрирования тепла и чугуна-сырца для получения как можно большего количества стали все еще учит нас."
 
 tech_building_vfb_lyceum:0 "Неофилософия"
 tech_building_vfb_lyceum_desc:0 "Любовь к знанию вела наших предков к научному методу и, в конечном итоге, к звёздам. Сегодня абстрактные рассуждения и переплетение знаний полностью уступили место эмпиризму. Или нет?"
 
 tech_building_vfb_museum:0 "Динамические архивы"
 tech_building_vfb_museum_desc:0 "Объединяя данные, перекрестно ссылаясь на информацию и предоставляя нашим полевым ученым более простые способы общения с исследователями на планете, мы можем создать гораздо более эффективную, самоактуализирующуюся и полную базу данных артефактов."
 
 tech_building_vfb_constructor:0 "Универсализация шаблонов"
 tech_building_vfb_constructor_desc:0 "Хотя креативность, безусловно, помогла нам достичь этого, не всем из нас она досталась легко."
 
 tech_building_vfb_administration:0 "Политика администрации"
 tech_building_vfb_administration_desc:0 "Это избирательный округ премьер-министра, не так ли?\n\nО, смотрите, Парк!"
 
 tech_building_vfb_dockyard:0 "Многоуровневая стыковка"
 tech_building_vfb_dockyard_desc:0 "Наши Звездные верфи и Межзвездные гавани – великолепные образцы инженерного и административного гения. Как и любой крупный проект, независимо от этого, они могут и будут перегружены растущим количеством заказов на стыковку и ремонт, которые отнимают драгоценное время и пространство у основных кольцевых отсеков верфей и гаваней. Адаптация существующих сооружений для двухуровневого хранения с учетом свободно плавающих, чередующихся отсеков космических кораблей увеличит возможности одновременной стыковки, ремонта, строительства и хранения кораблей..
 
 decision_vfb_buildspeed_m:0 "Организовать фронты первооткрывателей"
 decision_vfb_buildspeed_m_desc:0 "Звёздные верфи способствовали логистическому потоку товаров и людей на наши самые обжитые планеты и обратно, а также межпланетным путешествиям. Приняв правильные административные решения, мы можем направить их на решение масштабных задач колонизации новых миров. Перенаправление их персонала и оборудования на строительные шаблоны и приём материалов, выделение отсеков для иммиграции и управления здравоохранением, а также использование оставшихся корабельных доков в качестве сборочных линий ускорит процесс эффективного заселения, хотя и сделает объект неспособным выполнять свои обычные функции в нормальном режиме."
 vfb_buildspeed_m:0 "Организация первооткрывателей"
 vfb_buildspeed_m_desc:0 "Наши причалы предназначены для приёма иммигрантов, сборки роботов, оказания медицинской помощи и содействия в строительстве инфраструктуры, что сопряжено с серьёзной логистической, административной и производственной нагрузкой."
 pm_vfb_buildspeed_m:0 "Организация первооткрывателей"
 pm_vfb_buildspeed_m_desc:0 "Наши причалы предназначены для приема иммигрантов, сборки роботов, оказания медицинской помощи и оказания помощи в строительстве инфраструктуры, что сопряжено с большой административной нагрузкой."

