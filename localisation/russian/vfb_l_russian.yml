 job_vfb_synthesizer_bio:0 "Синтезатор"
 job_vfb_synthesizer_bio_plural:0 "SСинтезаторы"
 job_vfb_synthesizer_bio_desc:0 "Цитобиологи и специализированные формовщики, которые обогащают биоматериал, превращая его в биопластик, а отходы нефтепереработки — в биотопливо."
 job_vfb_synthesizer_bio_effect_desc:0 "£job_vfb_synthesizer_bio£ $job_vfb_synthesizer_bio_plural$ turn £minerals£ §Y$minerals$§! into £physics_research£ §Y$physics_research$§!, £trade_value£ §Y$trade_value$§! and £energy£ §Y$energy$§!."
