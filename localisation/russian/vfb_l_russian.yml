 mod_job_vfb_prospector_bot_per_pop:0 "§G+1§! $job_vfb_prospector_bot$ Job per $VALUE$ Pops"
 mod_job_vfb_prospector_bot_per_pop_short:0 "\n§G+1§! £mod_job_vfb_prospector_bot_add£ per $VALUE$ £pop£"
 
 job_vfb_tunneller_bio:0 "Тунельщик"
 job_vfb_tunneller_bio_plural:0 "Тунельщики"
 job_vfb_tunneller_bio_desc:0 "Квантовые физики и технические специалисты, которые преобразуют материю в энергию с помощью метода бета-сбора, сталкивая частицы внутри туннелей с тепловыми ячейками и повторно используя полученную энергию."
 job_vfb_tunneller_bio_effect_desc:0 "£job_vfb_tunneller_bio£ $job_vfb_tunneller_bio_plural$ turn £minerals£ §Y$minerals$§! into £physics_research£ §Y$physics_research$§!, £trade_value£ §Y$trade_value$§! and £energy£ §Y$energy$§!."
 mod_job_vfb_tunneller_bio_add:0 "$job_vfb_tunneller_bio$ Jobs"
 mod_job_vfb_tunneller_bio_per_pop:0 "§G+1§! $job_vfb_tunneller_bio$ Job per $VALUE$ Pops"
 mod_job_vfb_tunneller_bio_per_pop_short:0 "\n§G+1§! £mod_job_vfb_tunneller_bio_add£ per $VALUE$ £pop£"
 
 job_vfb_tunneller_bot:0 "Дрон-Тунельщик"
 job_vfb_tunneller_bot_plural:0 "Дроны-Тунельщики"
 job_vfb_tunneller_bot_desc:0 "Специализированные дроны, которые управляют коллайдерами, преобразуя материю в энергию с помощью бета-сбора, сталкивая частицы внутри туннелей с тепловыми ячейками и повторно используя полученную энергию."
 job_vfb_tunneller_bot_effect_desc:0 "£job_vfb_tunneller_bot£ $job_vfb_tunneller_bot_plural$ turn £minerals£ §Y$minerals$§! into £physics_research£ §Y$physics_research$§!, £unity£ §Y$unity$§! and £energy£ §Y$energy$§!."
 mod_job_vfb_tunneller_bot_add:0 "$job_vfb_tunneller_bot$ Jobs"
 mod_job_vfb_tunneller_bot_per_pop:0 "§G+1§! $job_vfb_tunneller_bot$ Job per $VALUE$ Pops"
