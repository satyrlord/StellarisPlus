tech_building_vfb_asteroid_station_tooltip:0 "Открывает режим §YКинетической бомбардировки§!"
building_vfb_comms_a:0 "Сеть глубокого космоса"
building_vfb_comms_a_desc:0 "Сеть глубокого космоса — это наземная сеть оптических и радиокоммуникационных массивов, лидаров, радаров и телескопов, которая позволяет наблюдать за космосом и координировать наши внутристелларные операции. Она также дает скромное представление об окружающем космосе при пропускной способности около сотен мегаосцилляций в секунду."
tech_building_vfb_comms_a:0 "Радиоастрономия"
tech_building_vfb_comms_a_desc:0 "Радиотелескопы — это оборудование высшего класса, которое позволяет нам отслеживать наше внутристелларное и ближнее межзвездное положение и немного заглянуть в бескрайность космоса."
building_vfb_comms_b:0 "Сеть сверхсветовой связи"
building_vfb_comms_b_desc:0 "Сеть сверхсветовой связи использует передовые технологии варпа, чтобы обеспечить связь быстрее света на огромных межзвездных расстояниях. Создавая сеть оптических повторителей на наших планетах, мы можем передавать данные с беспрецедентной скоростью, значительно повышая безопасность, пропускную способность и задержку нашей межзвездной связи, возможно, до нескольких сотен тераосцилляций в секунду."
tech_building_vfb_comms_b:0 "Саморазрушающееся фотонное удержание"
tech_building_vfb_comms_b_desc:0 "Поскольку сверхсветовые перелеты давно стали реальностью космических путешествий, для большинства межзвездных коммуникаций мы полагаемся на субпространственную связь. Этот энергозатратный, небезопасный и малопроизводительный способ связи не идеален, но это наше лучшее решение для далеких кораблей и станций, точного местоположения которых мы не знаем и потому не можем прицельно 'наводиться' на них с других планет, а они могут принимать сигналы откуда угодно. К счастью, мы пришли к идее использовать нашу варп-технологию для связи, создав сеть оптических повторителей по всем нашим планетам. По сути, мы упаковывали бы фотоны в пригодную к варпу оболочку — SDPC, — которая сама открывалась бы за несколько нанометров до достижения другой антенны. Стабильная структура протона может быть нанесена на карту приемником и 'воссоздана' как пакет данных. Таким образом, мы фактически проложим волоконную оптику между звездами. Это значительно улучшит безопасность, пропускную способность и задержку нашей межзвездной связи."
building_vfb_comms_c:0 "Сеть запутанной связи"
building_vfb_comms_c_desc:0 "Сеть запутанной связи — это передовая система связи, использующая квантовую запутанность для мгновенной передачи информации на огромные межзвездные расстояния. Создавая пары запутанных частиц и распределяя их по нашим планетам, мы можем передавать информацию мгновенно, независимо от расстояния между отправителем и получателем. Эта революционная технология способна преобразить нашу межзвездную связь, обеспечивая непревзойденную надежность и практически непроницаемую одноранговую безопасность при скорости в сотни петаосцилляций в секунду."
tech_building_vfb_comms_c:0 "Запутанные передающие частицы"
tech_building_vfb_comms_c_desc:0 "Одно из фундаментальных свойств нашей Вселенной заключается в том, что она не является локально реальной. Это означает, что состояние запутанных частиц мгновенно влияет друг на друга независимо от расстояния между ними. Хотя сама сверхсветовая передача информации уже имеет множество последствий, надежное создание частиц, квантово запутанных друг с другом, означает, что мы можем распределять двусторонние коммуникаторы, полностью взаимно исключающие друг друга, полностью не перехватываемые и не отслеживаемые, которые могут передавать информацию практически так же быстро, как мы способны изменять их квантовое состояние посредством наблюдения. При очень малой избыточности, поскольку наблюдение принимающей частицы запускает еще одно изменение квантового состояния передающей частицы, этот метод также избавляет от многоходовых рукопожатий как способа минимизации потери пакетов и позволяет бесшовно связываться с самыми ненадежными и подвижными объектами."
    building_vfb_comms_d:0 "Гиперпространственная сеть связи"
    building_vfb_comms_d_desc:0 "Гиперпространственная сеть связи — это революционная система связи, которая использует и манипулирует пространством более высоких измерений, чтобы модулировать и распределять готовые к запутыванию частицы на огромных межзвездных расстояниях, а также хранить и обрабатывать данные с миллиардов устройств. Планетарный центр данных для космического интернета!"
    tech_building_vfb_comms_d:0 "Гиперпространственное спаривание частиц" 
    tech_building_vfb_comms_d_desc:0 "Благодаря манипуляции пространством более высоких измерений мы можем связывать готовые к запутыванию частицы на огромных межзвездных расстояниях независимо от их исходных пар. Это, разумеется, колоссально. Это означает не только, что передающие пары не придется создавать вместе и выбрасывать, если одна из них потеряется, но и что мы можем многократно в секунду связывать и разъединять каждый передатчик с другим, позволяя децентрализованной сети связи работать через адреса, протоколы, рукопожатия и т. д. По сути, это означает, что мы можем иметь полностью децентрализованную, одноранговую, не перехватываемую, не отслеживаемую мгновенную сеть связи по всей галактике со скоростью в сотни экзаосцилляций в секунду, подобно современной внутрипланетной связи."
    mod_job_clerk_automated_workforce_mult:0 "£job_clerk£ Автоматизированная рабочая сила клерков"
vfb.4:0 "(VFB) Set Resource Add-On Limit"
vfb.4.name:0 "(VFB) Set Resource Add-On Limit"
vfb.4.desc:0 "§YI swear I'm almost done§!, you have the option of how many Resource Add-Ons you can build per planet. This can get pretty crazy pretty quick, but I now I learned how to code these limits and I'm having fun with it. 2 for basic resources and 1 for advanced resources is what you are used to if you have played this mod before, but I think most people would say 1-1 is more balanced. I personally play with 3-2.!\n\nThis is the build limit per planet for the Meteorite Mills, Thermal Transformers and Saccharide Separators (basic resources), Neonate Nomograms, Drag Distillers, Lattice Liquidators and Resonant Revetments (advanced resources). This is also permanent and affects the AI!"
vfb.4.a:0 "§Y(Most Balanced)§! 1-1, 1 basic resource and 1 advanced resource per planet."
vfb.4.a.tooltip:0 "This is the most boring option, and the one I recommend if you're more of a serious player. It allows you to build 1 Meteorite Mill, 1 Thermal Transformer or 1 Saccharide Separator, and 1 Neonate Nomogram, 1 Drag Distiller, 1 Lattice Liquidator and 1 Resonant Revetment per planet."
vfb.4.b:0 "§G(Recommended)§! 2-1, 2 basic resources and 1 advanced resource per planet."
vfb.4.b.tooltip:0 "This is the recommended option in regards to how I envison how the economy should work in Stellaris. It allows you to build 2 Meteorite Mills, 2 Thermal Transformers or 2 Saccharide Separators, and 1 Neonate Nomograms, 1 Drag Distillers, 1 Lattice Liquidators or 1 Resonant Revetments per planet."
vfb.4.c:0 "§R(Most Fun)§! 3-2, 3 basic resources and 2 advanced resources per planet."
vfb.4.c.tooltip:0 "This is the most fun option, and the one I recommend if you're more of a casual player, want to take on FEs quickly or are playing one of those mods that you have to use Dark Matter for everything. It allows you to build 3 Meteorite Mills, 3 Thermal Transformers or 3 Saccharide Separators, and 2 Neonate Nomograms, 2 Drag Distillers, 2 Lattice Liquidators or 2 Resonant Revetments per planet."
