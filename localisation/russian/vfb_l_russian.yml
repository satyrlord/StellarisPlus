 job_vfb_synthesizer_bot:0 "Дрон-Синтезатор"
 job_vfb_synthesizer_bot_plural:0 "Дроны-Синтезаторы"
 job_vfb_synthesizer_bot_desc:0 "Специализированные дроны, которые обогащают биоматериал в биопластик и превращают отходы нефтепереработки в биотопливо."
 job_vfb_synthesizer_bot_effect_desc:0 "£job_vfb_synthesizer_bot£ $job_vfb_synthesizer_bot_plural$ turn £minerals£ §Y$minerals$§! into £physics_research£ §Y$physics_research$§!, £unity£ §Y$unity$§! and £energy£ §Y$energy$§!."
 mod_job_vfb_synthesizer_bot_add:0 "$job_vfb_synthesizer_bot$ Jobs"
 mod_job_vfb_synthesizer_bot_per_pop:0 "§G+1§! $job_vfb_synthesizer_bot$ Job per $VALUE$ Pops"
 mod_job_vfb_synthesizer_bot_per_pop_short:0 "\n§G+1§! £mod_job_vfb_synthesizer_bot_add£ per $VALUE$ £pop£"
 
 job_vfb_functionary:0 "Попечитель"
 job_vfb_functionary_plural:0 "Попечители"
 job_vfb_functionary_desc:0 "Попечители содержат организованные государством жилищные комплексы и частные кондоминиумы, предоставляя жилье гражданам, заставляя их вносить непосредственный вклад в поддержание жилой инфраструктуры и других предметов роскоши."
 job_vfb_functionary_effect_desc:0 "£job_vfb_functionary£ $job_vfb_functionary_plural$ turn £energy£ §Y$Energy$§! and £consumer_goods£ §Y$Consumer Goods$§! into §Y$Housing$§!."
 mod_job_vfb_functionary_add:0 "$job_vfb_functionary$ Jobs"
 mod_job_vfb_functionary_per_pop:0 "§G+1§! $job_vfb_functionary$ Job per $VALUE$ Pops"
 mod_job_vfb_functionary_per_pop_short:0 "\n§G+1§! £mod_job_vfb_functionary_add£ per $VALUE$ £pop£"
 
 job_vfb_lifter:0 "Грузчик"
 job_vfb_lifter_plural:0 "Грузчики"
 job_vfb_lifter_desc:0 "Грузчики – это высококвалифицированные врачи, администраторы и таможенники, которые координируют повседневную работу трансорбитальной транспортной инфраструктуры. Их задача – обеспечить максимально быструю доставку гражданских лиц, военного имущества и товаров через терминалы. Этот опыт также является обязательным для логиста-новобранеца."
 job_vfb_lifter_effect_desc:0 "£job_vfb_lifter£ $job_vfb_lifter_plural$ turn £consumer_goods£ §Y$Consumer Goods$§! into §Y$Amenities$§!, §Y$ Pop Growth Speed$§! and §Y$Crime Reduction$§!."
 mod_job_vfb_lifter_add:0 "$job_vfb_lifter$ Jobs"
 mod_job_vfb_lifter_per_pop:0 "§G+1§! $job_vfb_lifter$ Job per $VALUE$ Pops"
 mod_job_vfb_lifter_per_pop_short:0 "\n§G+1§! £mod_job_vfb_lifter_add£ per $VALUE$ £pop£"
 
 job_vfb_preserver:0 "Хранитель"
 job_vfb_preserver_plural:0 "Хранители"
 job_vfb_preserver_desc:0 "В состав хранителей входят высококвалифицированные биологи и егеря, которые охраняют местные и иностранные экосистемы, находящиеся в наших заповедниках, организуют сафари для развлечения и являются информационным центром в еженедельных журналах о дикой природе."
 job_vfb_preserver_effect_desc:0 "£job_vfb_preserver£ $job_vfb_preserver_plural$ turn £energy£ §Y$Energy$§!, £food£ §Y$Food$§! and £consumer_goods£ §Y$Consumer Goods$§! into §Y$Amenities$§!, §Y$Amenities$§! and §Y$Stability$§!."
 mod_job_vfb_preserver_add:0 "$job_vfb_preserver$ Jobs"
 mod_job_vfb_preserver_per_pop:0 "§G+1§! $job_vfb_preserver$ Job per $VALUE$ Pops"
 mod_job_vfb_preserver_per_pop_short:0 "\n§G+1§! £mod_job_vfb_preserver_add£ per $VALUE$ £pop£"
 
 job_vfb_sybarite:0 "Сибарит"
 job_vfb_sybarite_plural:0 "Сибариты"
 job_vfb_sybarite_desc:0 "Сибариты (хорошие прожигатели жизни) — это категория, в которую входят музыкальные дирижеры, повара, аниматоры бассейнов, спасатели и многие другие работники сферы развлечений, которые обеспечивают туристам полноценное, непрерывное веселье и радостные впечатления во время отпуска."
 job_vfb_sybarite_effect_desc:0 "£job_vfb_sybarite£ $job_vfb_sybarite_plural$ turn £energy£ §Y$Energy$§!, £food£ §Y$Food$§! and £consumer_goods£ §Y$Consumer Goods$§! into §Y$Amenities$§!, §Y$Amenities$§! and §Y$Trade Value$§!."
 mod_job_vfb_sybarite_add:0 "$job_vfb_sybarite$ Jobs"
 mod_job_vfb_sybarite_per_pop:0 "§G+1§! $job_vfb_sybarite$ Job per $VALUE$ Pops"
 mod_job_vfb_sybarite_per_pop_short:0 "\n§G+1§! £mod_job_vfb_sybarite_add£ per $VALUE$ £pop£"
 
 job_vfb_siderurgist_bio:0 "Сидерург"
 job_vfb_siderurgist_bio_plural:0 "Сидерурги"
 job_vfb_siderurgist_bio_desc:0 "Сидерургисты (небесные кузнецы/железные кузнецы) — изначально сталевары — металлурги, которые выполняют более тяжелые обязанности по управлению тетрасидерургией, взаимодействуя с кузницами сплавов для производства гораздо большего количества сплава, чем это было возможно ранее, в очень энергетически затратном процессе."
 job_vfb_siderurgist_bio_effect_desc:0 "£job_vfb_siderurgist_bio£ $job_vfb_siderurgist_bio_plural$ turn £minerals£ §Y$minerals$§! into £alloys£ §Y$alloys$§!"
 mod_job_vfb_siderurgist_bio_add:0 "$job_vfb_siderurgist_bio$ Jobs"
 mod_job_vfb_siderurgist_bio_per_pop:0 "§G+1§! $job_vfb_siderurgist_bio$ Job per $VALUE$ Pops"
 mod_job_vfb_siderurgist_bio_per_pop_short:0 "\n§G+1§! £mod_job_vfb_siderurgist_bio_add£ per $VALUE$ £pop£"
 
 job_vfb_siderurgist_bot:0 "Дрон-сидерург"
 job_vfb_siderurgist_bot_plural:0 "Дроны-сидерурги"
 job_vfb_siderurgist_bot_desc:0 "Дроны-сидерурги (небесные кузнецы/кузнецы из железа) — по сути, сталевары — это производители, которые выполняют более тяжелые обязанности по управлению тетрасидерургией, взаимодействуя с кузницами сплавов для производства гораздо большего количества сплава, чем это было возможно ранее, в рамках очень энергозатратного процесса."
 job_vfb_siderurgist_bot_effect_desc:0 "£job_vfb_siderurgist_bot£ $job_vfb_siderurgist_bot_plural$ turn £minerals£ §Y$minerals$§! into £alloys£ §Y$alloys$§!"
 mod_job_vfb_siderurgist_bot_add:0 "$job_vfb_siderurgist_bot$ Jobs"
