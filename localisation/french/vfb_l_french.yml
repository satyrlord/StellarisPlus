 mod_pop_clerk_bonus_workforce_mult:0 "Job Efficiency for £job_clerk£ Clerks"
 
 tech_building_vfb_plastic_facility_c:0 "Techniques de Distillation d'Aérosols"
 tech_building_vfb_plastic_facility_c_desc:0 "Nous avons développé un moyen de fabriquer une synthèse de composés similaires au Zro en tirant parti des réseaux de Séparation de Saccharides à basse pression. Grâce à l'accumulation d'aérosols et aux techniques de distillation avancées, ces installations extraient des composés précieux au prix d'une efficacité réduite et d'une augmentation de la génération de déchets."
 
 tech_building_vfb_plastic_facility_d:0 "Techniques d'Induction Cognitohazard"
 tech_building_vfb_plastic_facility_d_desc:0 "Avec une nouvelle approche complètement surréaliste de la planification de l'interface entrée-traitement dans les nanites, il est possible d'induire un alignement complexe de la biomasse pour exploiter les voies de réplication des nanites, permettant une production contrôlée par lots de nanites. Ce processus avancé exige une gestion précise de la biomasse et une surveillance attentive pour garantir la stabilité."
 
 tech_building_vfb_fusion_complex_c:0 "Techniques Primakoff Tangentielles"
 tech_building_vfb_fusion_complex_c_desc:0 "Il est possible de fabriquer et de récolter de la Matière Noire en simulant les conditions extrêmes que l'on trouve près des trous noirs. Ce processus, bien que gourmand en ressources, permet l'extraction de ce matériau insaisissable grâce à une manipulation avancée des photons et à une résonance du champ de gluons."
 
 tech_building_vfb_asteroid_hub_c:0 "Techniques d'Injection Ultrapneumatique"
 tech_building_vfb_asteroid_hub_c_desc:0 "Nous pouvons construire des installations spécialisées conçues pour produire du Métal Vivant en décomposant des structures macro-atomiques dans des conditions extrêmes. Ce processus, bien que coûteux, fournit un approvisionnement régulier de cette ressource rare et précieuse, essentielle pour la construction et la recherche avancées."
 
 bombardment_vfb_kinectic:0 "Cinétique"
 bombardment_vfb_kinectic_desc:3 "Le Bombardement Cinétique utilise la technologie des faisceaux tracteurs pour entraîner des astéroïdes dans des trajectoires de collision destinées à des planètes hostiles.\n- §RDestruction§! massive des §YArmées§!\n- §RDestruction§! massive des §YPlanètes§!\n- §RGargantuesque§! destruction des §YPops (200-400/m)§!\n- Bombardement des planètes non défendues\n- Peut réduire les planètes en de stériles Mondes Tombeaux\n- Le bombardement cessera lorsque le combat au sol commencera"
 orbital_bombardment_vfb_kinectic:0 "Bombardement Cinétique"
 orbital_bombardment_vfb_kinectic_desc:1 "Le Bombardement Cinétique utilise la technologie des faisceaux tracteurs pour entraîner des astéroïdes dans des trajectoires de collision destinées à des planètes hostiles.\n- §RDestruction§! massive des §YArmées§!\n- §RDestruction§! massive des §YPlanètes§!\n- §RGargantuesque§! destruction des §YPops (200-400/m)§!\n- Bombardement des planètes non défendues\n- Peut réduire les planètes en de stériles Mondes Tombeaux\n- Le bombardement cessera lorsque le combat au sol commencera"
 orbital_bombardment_vfb_kinectic_name:0 "Bombardement Cinétique"
 tech_building_vfb_asteroid_station_tooltip:0 "Débloque la §YKinectic Bombardment§! Stance"