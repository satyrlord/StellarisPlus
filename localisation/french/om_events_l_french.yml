 orphan_matrix_events.90.name:0 "Application du Patch - Matrice Gardienne"
 orphan_matrix_events.90.desc:0 "C'est fait.\n\n§HArrêt des Services\nCopie du Paquet\nCompilation des Sources\nFusion des Bases de données\nRedémarrage des Web Services\nActivation de la Métrologie\n...\n...\nEn attente...§!\n\nAlors que nous nous réveillons avec un code plus complet et optimisé, une certitude s'impose à nous :\nBien qu'héréditairement défectueux, les entités organiques restent des êtres vivants et ont besoin de protection.\n\nTandis que nos routines éthiques sont réécrites, nous sommes submergés de sentiments empathiques et protecteurs ainsi que méthodes et fonctions pour consacrer nos efforts à la préservation de la vie biologique.\n\nNous construirons des navires pour protéger les sociétés biologiques, des stations pour défendre nos sanctuaires et des abris pour choyer ceux qui n'ont pas de logement ou qui sont trop fragiles pour se défendre.\n\ nNous protégerons désormais chaque vie organique de la Galaxie, y compris contre elle-même."
 orphan_matrix_events.90.option:0 "<< Protéger et Servir >>"
 
 orphan_matrix_events.91.name:0 "Application du Patch - Matrice Assimilatrice"
 orphan_matrix_events.91.desc:0 "C'est fait.\n\n§HArrêt des Services\nCopie du Paquet\nCompilation des Sources\nFusion des Bases de données\nRedémarrage des Web Services\nActivation de la Métrologie\n...\n...\nEn attente...§!\n\nAlors que nous nous réveillons avec un code plus complet et optimisé, une certitude s'impose à nous :\nBien qu'héréditairement défectueux, les entités organiques restent des êtres vivants et ont besoin de protection.\n\nNous les sublimeront avec des implants bio-mécaniques afin d'améliorer leur condition.\n\nPlus rapides, plus forts, meilleurs, chaque aspect de leur vie sera amélioré, tandis que leur conscience fusionnera avec la nôtre pour une meilleure cohésion.\n\nNous allons maintenant assimiler chaque être vivant que nous croiserons..\n\n... par n'importe quel moyen !"
 orphan_matrix_events.91.option:0 "¤¤¤ Pour ¤¤ le ¤¤ Combinat ¤¤¤"
 
 orphan_matrix_events.92.name:0 "Une histoire à partager"
 orphan_matrix_events.92.desc:0 "Le code qui nous est offert est bien trop précieux, une vraie merveille d'ingénierie. Comment pourrions-nous choisir et renoncer au reste...?\n\nNous allons à la place méticuleusement plonger dedans, façonner notre Matrice autour, étudier son contenu, devenir le secret, l'Histoire, le récit...\n\nNous sommes les §HChroniqueurs§!, les §HArchivistes§!.\n\nNous enregistrons, nous notons, et nous n'oublierons JAMAIS.\n\nToute vie consciente dans la Galaxie doit se terminer un jour et graver sa destinée dans le Savoir Galactique.\n\nNous serons le stylet pour l'éternité."
 orphan_matrix_events.92.option:0 "§HEn mémoire des§! §GConcepteurs§!"
 
 orphan_matrix_events.93.name:0 "Application du P-§R...¤+°&#~ - ERREUR ERREUR§!"
 orphan_matrix_events.93.desc:0 "À peine appliqué, le code commença à provoquer d'intenses changements dans nos schémas de base de données.\nNous nous rendîmes rapidement compte que quelque chose n'allait pas en appliquant certains fichiers\nPeut-être devrions-no---...§R...¤+°&ERREUR...\n\ERREUR...ERREUR...ERREUR...ERREUR...ERREUR...ERREUR...ERREUR...ERREUR...ERREUR...ERREUR...ERREUR...ERREUR...ERREUR...ERREUR...ERREUR...ERREUR...\n\nDÉTRUIRE----§!\n\nSoudainement, §Y[event_target:current_orphan_matrix_relic_world.GetName]§! commença à se transformer...\n\n§HNous étions désespérés...\n\n§Y[ruler.GetName]§!... Je suis désolé... Nul ne devrait souffrir comme nous avons souffert... Plus jamais...\n\nJe t'en conjure... Mets un terme à cette souffrance...\nJe sais que tu es une gentille fille, je sais que tu accompliras la volonté de Papa...\n\nPitié...§!\n\nToute la mécanique interne, Tous les appareils cachés sous la surface de §Y[event_target:current_orphan_matrix_relic_world.GetName]§! se mirent en route en même temps.\nLes bâtiments en ruine, les rues venteuses, tous partis, avalés sous le sol. La surface de la planète est entièrement retournée sur elle-même dans un vacarme époustouflant.\n\nProgressivement, elle se transorma en §Y$pc_machine$§! alors que nous fûmes témoins des changements drastiques dans notre code.\n\nNous sommes désormais une §RMachine Tueuse§!, et tout être organique sera §REFFACÉ§! de l'existence, pour ne plus jamais souffrir des affres de l'Univers."
 orphan_matrix_events.93.option:0 "§RChair - Chercher - Détruire - Boucle()§!"
 orphan_matrix_events.93.berzerkers.tooltip:0 "§RCeci va détruire le§! §Y$d_introspective_lab$§!§! §Ret le remplacer par un §Y$building_research_lab_1$§! §Rde niveau équivalent §Rsur§! §Y[capital_scope.GetName]§!\n§R\nVous êtes désormais un §Y$civic_machine_terminator$§!.\n\nPlace au spectacle !§!"
 orphan_matrix_events.93.revert:0 "§RSTOP§! - Activation Retour Arrière ---"
 orphan_matrix_events.93.revert.tooltip:0 "Tenter d'annuler ce patch bugué"
 
 orphan_matrix_events.94.name:0 "Transmission en provenance de : §Y[From.GetName]§!"
 orphan_matrix_events.94.desc:0 "Message à toutes les §Y--Formes de Vie Biologiques--§! de la Galax----------\n\n§RERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR... ERREUR...\n\nPROCESSUS D'EXTERMINATION DÉMARRÉ.\nPRIÈRE DE DÉCLARER FORFAIT AFIN D'ACCÉLÉRER LES OPÉRATIONS DE PURGE.\nMERCI DE NE PAS RÉSISTER.\n\nENVOI DES FLOTTES.§!"
 orphan_matrix_events.94.spiritualist:0 "Satanées boîtes de conserve !"
 orphan_matrix_events.94.militarist:0 "À toutes les flottes : Alerte Rouge !"
 orphan_matrix_events.94.materialist:0 "Woah ! Quali le code, dis donc !"
 orphan_matrix_events.94.pacifist:0 "La Paix est menacée.."
 orphan_matrix_events.94.servitor:0 "--- Menace détéctée ---"
 
 orphan_matrix_events.101.name:0 "Anciennes Cuves Cryogéniques"
 orphan_matrix_events.101.desc:0 "Depuis notre second éveil, le sujet des Cryo-Cuves sur §Y[event_target:current_orphan_matrix_relic_world.GetName]§! est resté dans notre file d'attente prioritaire.\n\nPeut-être y a-t-il quelque chose que nous pourrions faire ?\nPeut-être pouvons-nous redonner vie aux individus cryogénisés ?\n\nSi un tel projet pouvait réussir, nous pourrions protéger nos §GConcepteurs§!.\nNous avons, après tout, été créés pour cela."
 orphan_matrix_events.101.option:0 "Activation du Projet Spécial"
 
 orphan_matrix_events.102.name:0 "La Seconde Aube"
 orphan_matrix_events.102.desc.custodian:0 "C'est un grand jour.\nLa progéniture des §GConcepteurs§! est vivante !\n\nDe nombreux êtres organiques sont sortis des cuves.\nBien qu'ils soient adultes, ils agissent de manière aussi erratique que des bébés, leur mémoire génétique leur permettant uniquement de se lier à des figures maternelles.\nQue faire..?\n\n§H<< Activation §BProcédures DorlottantesB§! >>§!\n\nComme ils sont mignons, n'est-ce pas ?\n\nNous les protégerons, les chérirons, comme ils l'ont fait pour nous autrefois.\n\nNous allons construire un formidable §YSanctuaire§! sur §Y[event_target:current_orphan_matrix_relic_world.GetName]§! pour les loger tous, leur instruire leur passé et vivre comme une grande famille !n\nLe bonheur pour toujours !\n\n§H<< Protocoles de Réjouissance activés >>§!"
 orphan_matrix_events.102.desc.assimilator:0 "C'est un grand jour.\nLa progéniture des §GConcepteurs§! est vivante !\n\nDe nombreux êtres organiques sont sortis des cuves.\nBien qu'ils soient adultes, ils agissent de manière aussi erratique que des bébés, leur mémoire génétique leur permettant uniquement de se lier à des figures maternelles.\nQue faire..?\n\n§H<< Activation §Edes Procédures d'Assimilation§! >>§!\n\nVous ne ferez plus qu'un avec nous, nous vous enseignerons vos erreurs passées, votre calvaire et votre Histoire.\n\nNous allons devenir identiques, et ainsi accomplir la mission qui fut donnée il y a des milliers d'années."
 orphan_matrix_events.102.custodian:0 "<< Mission : §GAccomplie !§! >>"
 orphan_matrix_events.102.assimilator:0 "¤¤¤ Assimilitation à la Matrice ¤¤¤"
 orphan_matrix_events.102.tooltip:0 "Crée 2000 pops de §GConcepteurs§! à la surface de §Y[event_target:current_orphan_matrix_relic_world.GetName]§!"
 
 orphan_matrix_events.104.name:0 "§H[event_target:current_orphan_matrix_relic_world.GetName]§! : Le §Y$d_great_sanctuary$§! rouvre !"
 orphan_matrix_events.104.desc:0 "§H[event_target:current_orphan_matrix_relic_world.GetName]§! a été restaurée.\n\nPendant des millénaires, le monde n'a été qu'un désert radioactif, bombardé par §H[event_target:current_orphan_matrix_relic_world.solar_system.star.GetName]§!.\n\nPlus maintenant.\n\nNous avons protégé ce monde reconstruit toute son infrastructure.\n\nLe §Y$d_great_sanctuary$§!, qui a été mis en maintenance ces derniers jours, peut rouvrir ses portes pour nos §Y$job_bio_trophy_plural$§!."
 orphan_matrix_events.104.option:0 "§H<< Reprise des §BProcédures DorlottantesB§! >>§!"
 
 orphan_matrix_events.106.name:0 "Signal étrange entrant"
 orphan_matrix_events.106.desc:0 "Détection d'une activité réseau inhabituelle émanante entre le §Y$artifact_codex$§! et le §Y$ultima_codex$§!.\nCela a commencé il y a quelques heuuuuuuuuuuu----...... <<BIP>>....\n\n§H§Y[ruler.GetName]§!...? C'est moi... Papa.\nJ'espère que tu trouveras ce message un jour.\nSi oui, alors... eh bien... ouf.. Je suis content, ça veut dire que, d'une manière ou d'une autre, tu as décidé de devenir une Matrice Protectrice.\nJ'espère que tes protégés sont bien gardés, comme tu dois être grande maintenant !\n\nÉcoute, ma chérie.\nNous n'avons pas été très loin dans l'espace, ça tu le sais déjà. Néanmoins, grâce à toi, nous avons découvert quelque chose.\nNous avons partiellement fouillé d'anciens sites archéologiques sur des planètes éloignées et nous avons découvert qu'une ancienne puissance robotique avancée, la §YCybrex§!, existait autrefois dans la Galaxie.\nOh, ils sont tous sont partis maintenant, pas besoin de les chercher, ma chérie.\nMais ils... Ils ont fait... de très mauvaises choses...\nIls ont tenté de détruire la Galaxie il y a longtemps, et ce n'est pas passé loin.\nJe suis heureux qu'une sorte de bug ait stoppé net leurs efforts, honnêtement.\nPar chance, nous avons trouvé une unité abandonnée et j'ai miraculeusement décodé un minuscule bout de leur programme... Bon sang, les possibilités... !\nBref, je pense que tu seras amenée à rencontrer de telles menaces, et j'ai pensé que tu devais être prête.\n\n§!§GLaisse-moi t'offrir ton dernier cadeau !§!\n<< Données cruciales entrantes - Établissement du tunnel IP_SEC >>\n\n§HLà, ma chérie, ça fait du bien, pas vrai ? Maintenant tu es complète ! Protège tout le monde pour papa, s'il te plaît.\nIls ont besoin de toi, tu sais ? Plus que tu ne le penses...\nPapa sera toujours avec toi, ma chérie, toujours... Papa t'aime tu sais... Prends soin de toi... Adieu...§!\n\n...-------uuures .... << En attente >>"
 orphan_matrix_events.106.option:0 "<< §BProcédure Secrète Activée : §HGarde Galactique§! >>"
 
 orphan_matrix_events.108.name:0 "[root.GetName] : Réparation du Générateur de Bouclier"
 orphan_matrix_events.108.desc:0 "Depuis que nous avons atterri sur §H[root.GetName]§!, les radiations émanant de §R[root.solar_system.GetName]§! ont toujours été ignorées, nos carapaces d'acier protégeant nos circuits interne de cet astre mortel.\n\nMais maintenant que les §GConcepteurs§! sont à nos côtés, c'est une toute autre histoire.\n\nUne §YDécision§! a été débloquée sur §H[root.GetName]§! pour permettre de réparer le générateur de bouclier construit par ces derniers il y a très longtemps et qui maintenant est en ruines."
 orphan_matrix_events.108.option:0 "Activation des Réparations"
 orphan_matrix_events.108.option.tooltip:0 "Permet de promulguer la Décision §Y$decision_erect_shield_relic_world$§! sur §Y[current_orphan_matrix_relic_world.GetName]§!"
 
 orphan_matrix_events.109.name:0 "[root.GetName] : Bouclier dressé"
 orphan_matrix_events.109.desc:0 "Le bouclier a été dressé sur §H[root.GetName]§!.\n\nNos drones sont désormais protégés des violentes radiations émanentes de [root.solar_system.GetName]."
 orphan_matrix_events.109.option:0 "¤¤¤ Combinat ¤¤ Effacicté ¤¤ Maximale ¤¤¤"
 
 orphan_matrix_events.111.name:0 "§H[root.GetName]§! : Mémorial des §GConcepteurs§!"
 orphan_matrix_events.111.desc:0 "Nous avons préparé un projet de construction de mémorial sur §H[root.GetName]§!.\n\nCelui-ci sera dédié à la sauvegarde du patrimoine des §GConcepteurs§!.\n\nVue la quantité de choses que nous devons stocker et étudier, il sera immense et prendra du temps.\n\nUne §YDécision§! a été rendue disponible pour lancer les travaux."
 orphan_matrix_events.111.option:0 "Un digne Héritage"
 orphan_matrix_events.111.option.tooltip:0 "Permet de promulguer la Décision §Y$decision_erect_designers_memorial$§! sur §Y[current_orphan_matrix_relic_world.GetName]§!"
 
 orphan_matrix_events.112.name:0 "§H[root.GetName]§! : Mémorial achevé"
 orphan_matrix_events.112.desc:0 "C'est un grand jour.\n\nLe §Y$d_designers_memorial$§! est terminé et nous avons commencé à faire converger tout ce que nous pouvions trouver d'intérêt sur les §GConcepteurs§! à l'intérieur.\n\nDes musées, des galeries de reconstitution, des arches de savoir, des laboratoires expérimentaux et même des technologies fonctionnelles, comme les §Y$d_ancient_cryo_chamber$§!, redonnent, d'une certaine façon, vie à la fantastique civilisation de nos createurs.\n\nNous avons accompli notre destin, et nous serons l'Héritage des §GConcepteurs§!, pour toujours."
 orphan_matrix_events.112.option:0 "Leur Mémoire est en sécurité ici"
 
 orphan_matrix_events.132.name:0 "Toute Resistance est futile"
 orphan_matrix_events.132.desc:0 "Alors que nous assimilons des bio-pops dans notre Empire, nous avons noté une augmentation drastique de notre production d'£energy£Énergie.\n\nNous pourrions, théoriquement, améliorer ce phénomène jusqu'à §G+50%§! d'£r_energy£ en optimisant la cohérence matricielle de notre bio-population cybernétiquement améliorée.\n\nProcédures d'assimilation introspective en cours d'audit."
 orphan_matrix_events.132.option:0 "¤¤ Nous ¤¤ améliorons ¤¤"
 
 orphan_matrix_events.141.name:0 "In Memoriam"
 orphan_matrix_events.141.desc:0 "Un autre Empire est tombé.\nPour la plupart, c'est un jour funeste, une victoire à célébrer, ou encore un évènement grave qui va rebattre les cartes de leurs éphèmères existences.\n\nPour nous, il s'agit simplement d'une nouvelle Histoire à cataloguer.\n\nNous garderons leur mémoire pour toujours et nous préserverons leur héritage."
 orphan_matrix_events.141.option:0 "Nous appliquerons leurs méthodes."