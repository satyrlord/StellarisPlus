 situation_apply_patch_ram_allocated:0 "RAM Allocated"
 situation_apply_patch_ram_allocated_desc:0 "To prevent Memory Leaks in the §Hpatch§! installation procedure, a fair amount of RAM has been allocated, slowing down our Directives Core performances."
 
 situation_apply_patch_security_vuln_ignored:0 "Security Breach Ignored"
 situation_apply_patch_security_vuln_ignored_desc:0 "By diregarding an important Security Breach, we're temporarily exposed to malicious cyber-attacks from foreign empires."
 
 situation_apply_patch_process_terminated:0 "Process on Hold"
 situation_apply_patch_process_terminated_desc:0 "An important Core Process is currently not responding during the §Hpatch§! installation procedure, resulting in a halt in the setup."
