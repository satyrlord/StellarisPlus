 underperforming_introspective_calculators.desc:0 "Our §Y$job_introspective_calculator_plural$§! are overloaded. We're trying to fix the situation with more §Y$r_energy$§!"
 
 partial_codex_bonus:0 "Connected $artifact_codex$"
