 orphan_matrix_production_doctrine_balanced_production:0 "Balanced Production"
 orphan_matrix_production_doctrine_balanced_production_desc:0 "A subtle mix of the §GDesigners§! codex directives have been applied to our inner code to balance production and ecology matters."
 
