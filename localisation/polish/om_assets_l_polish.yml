 orphaned_matrix_megastructure_expertise:0 "Megastructure Expertise"
 orphaned_matrix_megastructure_expertise_desc:0 "Upon discovering a §Y$orbital_arc_furnace_destroyed$§! in their Precursor Homesystem, this Matrix is temporarily able to build Megastructures with an unprecedent rate."
 
 orphaned_matrix_arc_furnace_restored_mega:0 "Precursor Space-engineering Procedures"
 orphaned_matrix_arc_furnace_restored_mega_desc:0 "This Matrix has developped important engineering techniques from its precursors."
 
 orphaned_matrix_arc_furnace_restored_stations:0 "Precursor Space-mining Procedures"
 orphaned_matrix_arc_furnace_restored_stations_desc:0 "This Matrix has developped important industrial techniques from its precursors."
 
 orphaned_matrix_arc_furnace_restored_alloys:0 "Precursor-Enhanced Metallurgy"
 orphaned_matrix_arc_furnace_restored_alloys_desc:0 "Enhanced pseudo-cryptic Precursors alloys refining techniques allowed this Matrix to supply among the sturdiest alloys of the Galaxy."
 
 irradiated_relic:0 "Deadly Radiations"
 irradiated_relic_desc:0 "This world is irradiated by the nearby pulsar. Organic life can barely survive here without proper infrastructure."
 
 motivated_drones:0 "Boosted $pop_cat_complex_drone_plural$"
 motivated_drones_desc:0 "Our $pop_cat_complex_drone_plural$ have been boosted by the sheer amount of resources we've invested on their workforce."
 
 demotivated_drones:0 "Weary $pop_cat_complex_drone_plural$"
 demotivated_drones_desc:0 "$pop_cat_complex_drone_plural$ have been underperforming recently due to the resources we have deprived them from in order to study the §Y$artifact_codex$§!"
 
 orphan_matrix_berzerker_code_reverted:0 "$machine_empire_code_bugs$"
 orphan_matrix_berzerker_code_reverted_desc:0 "By reverting the 3rd Librabry of the §GDesigners§!, we have triggered several discrepancies in our code and database.\nIt will take some time to repair everything.\n§RThat will teach you to never work directly in Production environments !§!"
 
 pm_shield_generator:0 "Shield Generator"
