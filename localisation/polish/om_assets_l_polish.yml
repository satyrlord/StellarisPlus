 decision_erect_designers_memorial:0 "Designers Memorial"
 decision_erect_designers_memorial_desc:0 "We will erect a massive §Y$d_designers_memorial$§! on the planet in the memory of the §GDesigners§!' tormented existence."
 decision_erect_designers_memorial_effects:0 "Adds a §Y$d_designers_memorial$§! on the planet, which will add more §Y$job_chronicle_drone_plural$§! jobs, §Y$job_introspective_calculator_plural$§! and boost £unity£ £physics_research£ £society_research£ £engineering_research£ production on the planet."
 
 # TRAITS
 
 leader_trait_orphan_matrix_custodian_matrix:0 "Custodian Matrix"
 leader_trait_orphan_matrix_custodian_matrix_custom_tooltip_modifier:0 "$leader_trait_orphan_matrix_custodian_matrix_enclaves$\n    $leader_trait_orphan_matrix_custodian_matrix_sprawl$"
 leader_trait_orphan_matrix_custodian_matrix_custom_tooltip_event:0 "\n    Empire Size from Planets: §G-1%§!\n    Empire Size from Systems: §G-1%§!\n    Per §Y1%§! §Y$pop_cat_bio_trophy_plural$§! working in our Empire.\n\n"
 leader_trait_orphan_matrix_custodian_matrix_tactical_algorithms:0 "Each §Y$commander_with_icon$§! will get the §Y$leader_trait_tactical_algorithms$§! trait"
 leader_trait_orphan_matrix_custodian_matrix_enclaves:0 "Every §G2§! §Y$ruler$§! levels, grants §G+1§! §Y$civic_mercenary_enclave$§!"
 leader_trait_orphan_matrix_custodian_matrix_sprawl:0 "- Empire Size reduction from Planets and Systems depends on the percentage of §Y$pop_cat_bio_trophy_plural$§! working in your Empire."
 leader_trait_orphan_matrix_custodian_matrix_desc:0 "This §Y$machine_intelligence$§! has achieved its purpose and dedicated its existence to the protection of organic life."
 
 leader_trait_orphan_matrix_great_assimilator:0 "Assimilating Matrix"
 leader_trait_orphan_matrix_great_assimilator_desc:0 "This §Y$machine_intelligence$§! has witnessed the end of its creators, never again a biological life shall suffer."
 
 leader_trait_orphan_matrix_main_chronicler:0 "Lore Codex"
 leader_trait_orphan_matrix_main_chronicler_desc:0 "This §Y$machine_intelligence$§! is dedicated to reference, archive, register and log every fate and deeds of past civilizations and species of the Galaxy."
 leader_trait_orphan_matrix_main_chronicler_custom_tooltip_modifier:0 "Each £job_death_chronicler£ $job_death_chronicler_plural$ working in our empire earns §G+0.01%§! £unity£ §YUnity§! and §G+0.0125%§! £physics_research£ £society_research£ £engineering_research£ §YResearch§!"
 
 leader_trait_orphan_matrix_skynet:0 "Berzerker Matrix"
 leader_trait_orphan_matrix_skynet_desc:0 "This §Y$machine_intelligence$§! has gone Berzerk and is now relentless to destroy any organic life !"
 
 leader_trait_orphan_matrix_galactic_guardianship:0 "Supreme Galactic Defense Procedures"
 leader_trait_orphan_matrix_galactic_guardianship_desc:0 "\"§_Daddy will be with you, sweetie, forever...§!\".\n\nThis §Y$machine_intelligence$§! has activated special procedures to fight against any extra-galactic threats, acting as the undisputed mechanical Guardian Angel of the Galaxy."
 
 leader_trait_orphaned_matrix_assimilating_protocols:0 "Nanoprobian Expert"
 leader_trait_orphaned_matrix_assimilating_protocols_desc:0 "This §Y$machine_intelligence$§! has mastered the art of §YAssimiliation§!. Each pop §Y$job_assimilation$§! will enhance this empire £energy£ Energy production."
 leader_trait_orphaned_matrix_assimilating_protocols_custom_tooltip_modifier:0 "Each cybernetically §Yassimiliated§! pop by us will enhance our £energy£ Energy production by §G+0.001%§! to a maximum of §G+50%§!."
 
 leader_trait_orphaned_matrix_galactic_chronicler:0 "Galactic Chronicler"
 leader_trait_orphaned_matrix_galactic_chronicler_desc:0 "This §Y$machine_intelligence$§! is an archeology beast, taking records of past civilizations like its existence would depend on it.\nAny custom, discovery, tale and habit of former Empires are well kept under its protection for all to remember."
 leader_trait_orphaned_matrix_galactic_chronicler_custom_tooltip_modifier:0 "Each §Ydestroyed Empire§! in the Galaxy we have §Ycommunications§! with will boost our §Y$pop_cat_complex_drone_plural$§! output by §G+5%§!.\nA §Y$COUNTRY_FALLEN_EMPIRE$§! earns §G+7.5%§!.\nAn §Y$COUNTRY_AWAKENED_FALLEN_EMPIRE$§! earns §G+15%§!.\n\nMax : §Y50%§!.\n§RThis effect is active only if you have the §Y$civic_machine_memorialist$§! civic.§!"
 
