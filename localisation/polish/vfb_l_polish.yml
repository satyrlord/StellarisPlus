  mod_planet_engineers_sr_living_metal_produces_add:0 "$i_living_metal$ per 100 £job_engineer£ $job_engineer_plural$"
  mod_planet_physicists_sr_dark_matter_produces_add:0 "$i_dark_matter$ per 100 £job_physicist£ $job_physicist_plural$"
  mod_pop_clerk_bonus_workforce_mult:0 "Job Efficiency for £job_clerk£ Clerks"

  tech_building_vfb_plastic_facility_c:0 "Techniki Destylacji Aerozolowej"
  tech_building_vfb_plastic_facility_c_desc:0 "Opracowaliśmy sposób na wytwarzanie syntezy związków podobnych do Zro, wykorzystując sieci Separacji Sacharydów w niskim ciśnieniu. Dzięki akumulacji aerozoli i zaawansowanym technikom destylacji, te instalacje wydobywają cenne związki kosztem zmniejszonej wydajności i zwiększonej produkcji odpadów."

  tech_building_vfb_plastic_facility_d:0 "Techniki Indukcji Kognitohazardowej"
  tech_building_vfb_plastic_facility_d_desc:0 "Dzięki nowemu, całkowicie surrealistycznemu podejściu do planowania wejścia-do-przetwarzania w nanitach, możliwe jest wywołanie skomplikowanego wyrównania biomasy w celu wykorzystania ścieżek replikacji nanitów, co umożliwia kontrolowane rozmnażanie nanitów. Ten zaawansowany proces wymaga precyzyjnego zarządzania biomasą i starannego nadzoru, aby zapewnić stabilność."

  tech_building_vfb_fusion_complex_c:0 "Techniki Primakoffa Stycznych"
  tech_building_vfb_fusion_complex_c_desc:0 "Możliwe jest wytwarzanie i pozyskiwanie Ciemnej Materii poprzez symulację skrajnych warunków występujących w pobliżu czarnych dziur. Proces ten, choć zasobożerny, pozwala na ekstrakcję tego nieuchwytnego materiału poprzez zaawansowaną manipulację fotonami i rezonans pola gluonowego."

  tech_building_vfb_asteroid_hub_c:0 "Techniki Wstrzykiwania Ultrapneumatycznego"
  tech_building_vfb_asteroid_hub_c_desc:0 "Możemy budować wyspecjalizowane obiekty zaprojektowane do produkcji Żywego Metalu poprzez rozkładanie struktur makroatomowych w ekstremalnych warunkach. Proces ten, choć kosztowny, zapewnia stały dopływ tego rzadkiego i cennego zasobu, niezbędnego do zaawansowanej budowy i badań."

  bombardment_vfb_kinectic:0 "Kinetyczny"
  bombardment_vfb_kinectic_desc:3 "Bombardowanie Kinetyczne wykorzystuje technologię trakcyjnych wiązek do wciągania asteroid w trajektorie kolizyjne skierowane na wrogie planety.\n- §ROgromne§! obrażenia dla §YArmii§!\n- §ROgromne§! obrażenia dla §YPlanety§!\n- §RGargantuiczne§! obrażenia dla §YPops (200-400/m)§!\n- Będzie bombardować niebronione planety\n- Może przekształcić planety w bezlitosne Światy Grobowców\n- Bombardowanie ustanie, gdy rozpocznie się walka na powierzchni"
